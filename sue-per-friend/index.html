<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sue-per Friend!</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Press Start 2P', monospace;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
            border: 4px solid #ff00ff;
            box-shadow: 0 0 20px #ff00ff, 0 0 40px #00ffff, inset 0 0 20px rgba(255, 0, 255, 0.1);
            image-rendering: pixelated;
        }

        canvas {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.85);
            z-index: 10;
            color: #fff;
            text-align: center;
        }

        #gameOverScreen {
            display: none;
        }

        .title {
            font-size: 28px;
            color: #ff00ff;
            text-shadow: 3px 3px #00ffff, -1px -1px #ffff00;
            margin-bottom: 10px;
            animation: titlePulse 1.5s ease-in-out infinite;
        }

        .subtitle {
            font-size: 12px;
            color: #00ffff;
            margin-bottom: 40px;
        }

        .instructions {
            font-size: 8px;
            color: #ffff00;
            line-height: 2.5;
            margin-bottom: 30px;
        }

        .start-btn {
            font-family: 'Press Start 2P', monospace;
            font-size: 14px;
            padding: 15px 30px;
            background: transparent;
            color: #00ff00;
            border: 3px solid #00ff00;
            cursor: pointer;
            animation: blink 1s step-end infinite;
            transition: all 0.1s;
        }

        .start-btn:hover {
            background: #00ff00;
            color: #000;
            animation: none;
        }

        .final-score {
            font-size: 20px;
            color: #ffff00;
            margin: 20px 0;
        }

        @keyframes titlePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        .scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15) 0px,
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 3px
            );
            z-index: 5;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="640" height="480"></canvas>
        <div class="scanlines"></div>

        <div id="startScreen">
            <div class="title">SUE-PER FRIEND!</div>
            <div class="subtitle">~ A Heroic Adventure ~</div>
            <div class="instructions">
                ARROW KEYS / WASD - MOVE<br>
                SPACEBAR - SHOOT EYE LASERS<br>
                DEFEAT THE BAD GUYS!<br>
                DON'T LET THEM TOUCH YOU!
            </div>
            <button class="start-btn" id="startBtn">PRESS START</button>
        </div>

        <div id="gameOverScreen">
            <div class="title">GAME OVER</div>
            <div class="final-score" id="finalScore">SCORE: 0</div>
            <div class="instructions" id="highScoreText">HIGH SCORE: 0</div>
            <button class="start-btn" id="restartBtn">PLAY AGAIN</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
