<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lucky Leprechaun: Rainbow Run</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: monospace; }
  canvas { display: block; image-rendering: pixelated; border: 3px solid #444; cursor: pointer; }
  #instructions { color: #aaa; font-size: 13px; margin-top: 10px; text-align: center; }
</style>
</head>
<body>
<canvas id="game" width="800" height="500"></canvas>
<div id="instructions">Arrow Keys / WASD to move &nbsp;|&nbsp; Space / Up to jump &nbsp;|&nbsp; Double-jump allowed</div>
<script>
// ─────────────────────────────────────────────
//  CANVAS SETUP
// ─────────────────────────────────────────────
const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');
const W = canvas.width;
const H = canvas.height;

// ─────────────────────────────────────────────
//  AUDIO — Irish background music (Web Audio chiptune)
// ─────────────────────────────────────────────
let audioCtx = null;
let musicPlaying = false;

// Simple Irish jig melody using Web Audio
function startMusic() {
  if (musicPlaying) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  musicPlaying = true;
  playJig();
}

function playJig() {
  if (!audioCtx || !musicPlaying) return;
  // Irish jig in 6/8 time — notes as [freq, duration]
  // D major pentatonic jig melody
  const BPM = 180;
  const eighth = 60 / BPM / 2;
  const melody = [
    // Bar 1
    [587, eighth], [523, eighth], [587, eighth], [659, eighth], [587, eighth], [523, eighth],
    // Bar 2
    [440, eighth], [392, eighth], [440, eighth], [523, eighth], [440, eighth], [392, eighth],
    // Bar 3
    [349, eighth], [392, eighth], [440, eighth], [523, eighth], [587, eighth], [659, eighth],
    // Bar 4
    [587, eighth], [523, eighth], [440, eighth], [392, eighth], [349, eighth], [392, eighth],
    // Bar 5
    [440, eighth], [523, eighth], [587, eighth], [659, eighth], [698, eighth], [659, eighth],
    // Bar 6
    [587, eighth], [523, eighth], [440, eighth], [523, eighth], [587, eighth], [523, eighth],
    // Bar 7
    [440, eighth], [392, eighth], [349, eighth], [392, eighth], [440, eighth], [523, eighth],
    // Bar 8
    [587, eighth*2], [440, eighth*2], [349, eighth*2],
  ];

  let t = audioCtx.currentTime + 0.05;
  melody.forEach(([freq, dur]) => {
    // melody voice
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.08, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + dur * 0.9);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + dur);

    // harmony (fifth below, quieter)
    const osc2 = audioCtx.createOscillator();
    const gain2 = audioCtx.createGain();
    osc2.type = 'triangle';
    osc2.frequency.value = freq * 0.667;
    gain2.gain.setValueAtTime(0.04, t);
    gain2.gain.exponentialRampToValueAtTime(0.001, t + dur * 0.9);
    osc2.connect(gain2);
    gain2.connect(audioCtx.destination);
    osc2.start(t);
    osc2.stop(t + dur);

    t += dur;
  });

  // Loop the jig
  const totalDur = melody.reduce((sum, [,d]) => sum + d, 0);
  setTimeout(() => { if (musicPlaying) playJig(); }, totalDur * 1000);
}

function stopMusic() {
  musicPlaying = false;
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
}

// ─────────────────────────────────────────────
//  CONSTANTS
// ─────────────────────────────────────────────
const GRAVITY      = 0.55;
const JUMP_FORCE   = -13;
const MOVE_SPEED   = 4;
const MAX_LIVES    = 3;
const WORLD_WIDTH  = 5000;

// ─────────────────────────────────────────────
//  PIXEL ART SPRITES
//  0=transparent, 1=skin, 2=green(coat), 3=gold,
//  5=brown, 6=dark-green(hat), C=orange(beard),
//  D=dark(eyes/shoes), E=brown(pants), F=buckle-gold
// ─────────────────────────────────────────────
const PALETTE = {
  0: null,
  1: '#f5c5a3',
  2: '#2e7d32',
  3: '#ffd600',
  4: '#ffffff',
  5: '#5d4037',
  6: '#1b5e20',
  7: '#c62828',
  8: '#ffb300',
  9: '#ff8f00',
  A: '#4caf50',
  B: '#81c784',
  C: '#e65100',
  D: '#111111',
  E: '#795548',
  F: '#ffc107',
};

// 16×18 improved leprechaun — hat with buckle, eyes, orange beard, brown pants, dark shoes
const LEP_IDLE = [
  '0000066660000000',
  '0000666666000000',
  '0000F66F66000000',
  '0066666666660000',
  '0000111111000000',
  '0001D11D11000000',
  '0001111111000000',
  '00011CCCC1000000',
  '00000CCCC0000000',
  '0002222222000000',
  '0022232322200000',
  '0022222222200000',
  '0022222222200000',
  '0002222222000000',
  '0000EE0EE0000000',
  '0000EE0EE0000000',
  '0000DD0DD0000000',
  '0000DD0DD0000000',
];

const LEP_RUN1 = [
  '0000066660000000',
  '0000666666000000',
  '0000F66F66000000',
  '0066666666660000',
  '0000111111000000',
  '0001D11D11000000',
  '0001111111000000',
  '00011CCCC1000000',
  '00000CCCC0000000',
  '0002222222000000',
  '0022232322200000',
  '0022222222200000',
  '0022222222200000',
  '0002222222000000',
  '00EE000EE0000000',
  '0EE0000EE0000000',
  '0DD00000DD000000',
  '0000000000000000',
];

const LEP_RUN2 = [
  '0000066660000000',
  '0000666666000000',
  '0000F66F66000000',
  '0066666666660000',
  '0000111111000000',
  '0001D11D11000000',
  '0001111111000000',
  '00011CCCC1000000',
  '00000CCCC0000000',
  '0002222222000000',
  '0022232322200000',
  '0022222222200000',
  '0022222222200000',
  '0002222222000000',
  '0000EE000EE00000',
  '0000EE0000EE0000',
  '00000DD0000DD000',
  '0000000000000000',
];

const LEP_JUMP = [
  '0000066660000000',
  '0000666666000000',
  '0000F66F66000000',
  '0066666666660000',
  '0000111111000000',
  '0001D11D11000000',
  '0001111111000000',
  '00011CCCC1000000',
  '00000CCCC0000000',
  '0022222222200000',
  '0022232322200000',
  '2222222222220000',
  '0222222222200000',
  '0022222222000000',
  '000EE0000E000000',
  '000DD000EE000000',
  '00000000DD000000',
  '0000000000000000',
];

function drawSprite(sprite, x, y, scale, flipX) {
  const rows = sprite;
  const cols = rows[0].length;
  ctx.save();
  if (flipX) {
    ctx.translate(x + cols * scale, y);
    ctx.scale(-1, 1);
    ctx.translate(-x, -y);
  }
  for (let r = 0; r < rows.length; r++) {
    for (let c = 0; c < cols; c++) {
      const ch = rows[r][c];
      if (ch === '0') continue;
      ctx.fillStyle = PALETTE[ch];
      ctx.fillRect(x + c * scale, y + r * scale, scale, scale);
    }
  }
  ctx.restore();
}

// ─────────────────────────────────────────────
//  CLOUD DRAWING
// ─────────────────────────────────────────────
function drawCloud(x, y, w, h, camX) {
  const sx = x - camX;
  ctx.fillStyle = '#dce8f5';
  ctx.beginPath(); ctx.ellipse(sx + w*0.2, y + h*0.5, w*0.25, h*0.55, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(sx + w*0.5, y + h*0.3, w*0.3,  h*0.6,  0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(sx + w*0.8, y + h*0.5, w*0.22, h*0.5,  0, 0, Math.PI*2); ctx.fill();
  ctx.fillRect(sx, y + h*0.55, w, h*0.45);
  ctx.fillStyle = '#eef4fb';
  ctx.beginPath(); ctx.ellipse(sx + w*0.45, y + h*0.22, w*0.18, h*0.25, 0, 0, Math.PI*2); ctx.fill();
}

// ─────────────────────────────────────────────
//  RAINBOW — large arc landing on the final cloud
// ─────────────────────────────────────────────
const RAINBOW_COLORS = ['#f8a0a0','#f8c89a','#f8e8a0','#a0dca0','#a0c8f0','#c8a0e0'];
const FINAL_CLOUD = { x: 2060, y: 270, w: 250 };
const RAINBOW_LAND_X = FINAL_CLOUD.x + FINAL_CLOUD.w * 0.4; // centered on final cloud
const RAINBOW_LAND_Y = FINAL_CLOUD.y + 10;
const RAINBOW_RADIUS = 420;
// Arc center: right foot of arc is at (landX, landY), so cx = landX - R
const RAINBOW_CX = RAINBOW_LAND_X - RAINBOW_RADIUS;
const RAINBOW_CY = RAINBOW_LAND_Y;

function drawRainbow(camX) {
  const sx = RAINBOW_CX - camX;
  ctx.save();
  ctx.globalAlpha = 0.85;
  for (let i = 0; i < RAINBOW_COLORS.length; i++) {
    ctx.strokeStyle = RAINBOW_COLORS[i];
    ctx.lineWidth = 14;
    ctx.beginPath();
    ctx.arc(sx, RAINBOW_CY, RAINBOW_RADIUS - i * 16, Math.PI, 0);
    ctx.stroke();
  }
  // soft glow behind the rainbow
  ctx.globalAlpha = 0.12;
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = RAINBOW_COLORS.length * 16 + 20;
  ctx.beginPath();
  ctx.arc(sx, RAINBOW_CY, RAINBOW_RADIUS - RAINBOW_COLORS.length * 8, Math.PI, 0);
  ctx.stroke();
  ctx.restore();
}

// ─────────────────────────────────────────────
//  POT OF GOLD DRAWING (no mini-rainbow, the big one lands here)
// ─────────────────────────────────────────────
function drawPot(x, y, camX) {
  const sx = x - camX;
  // sparkle effect
  const t = Date.now() / 200;
  for (let i = 0; i < 5; i++) {
    const angle = t + i * 1.3;
    const dist = 20 + Math.sin(t * 0.5 + i) * 8;
    const px = sx + 20 + Math.cos(angle) * dist;
    const py = y + 5 + Math.sin(angle) * dist * 0.5;
    ctx.globalAlpha = 0.5 + Math.sin(t + i * 2) * 0.3;
    ctx.fillStyle = '#ffd600';
    ctx.fillRect(px - 2, py - 2, 4, 4);
    ctx.fillStyle = '#fff';
    ctx.fillRect(px - 1, py - 1, 2, 2);
  }
  ctx.globalAlpha = 1;
  // pot body
  ctx.fillStyle = '#212121';
  ctx.beginPath();
  ctx.moveTo(sx, y + 20);
  ctx.lineTo(sx + 5, y + 50);
  ctx.lineTo(sx + 35, y + 50);
  ctx.lineTo(sx + 40, y + 20);
  ctx.closePath();
  ctx.fill();
  // pot rim
  ctx.fillStyle = '#424242';
  ctx.fillRect(sx - 3, y + 17, 46, 8);
  // gold coins overflowing
  ctx.fillStyle = '#ffd600';
  ctx.beginPath(); ctx.ellipse(sx + 20, y + 18, 18, 8, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ffb300';
  ctx.beginPath(); ctx.ellipse(sx + 12, y + 14, 6, 6, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(sx + 22, y + 11, 6, 6, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(sx + 32, y + 13, 5, 5, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ffe082';
  ctx.beginPath(); ctx.ellipse(sx + 17, y + 8, 4, 4, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(sx + 27, y + 9, 4, 4, 0, 0, Math.PI*2); ctx.fill();
}

// ─────────────────────────────────────────────
//  PARTICLES (coin burst)
// ─────────────────────────────────────────────
let particles = [];
function spawnCoins(x, y) {
  for (let i = 0; i < 30; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 5;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 3,
      life: 1,
      color: Math.random() > 0.5 ? '#ffd600' : '#ffb300',
      size: 4 + Math.random() * 6,
    });
  }
}
function updateParticles() {
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x  += p.vx;
    p.y  += p.vy;
    p.vy += 0.2;
    p.life -= 0.02;
  });
}
function drawParticles(camX) {
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - camX - p.size/2, p.y - p.size/2, p.size, p.size);
  });
  ctx.globalAlpha = 1;
}

// ─────────────────────────────────────────────
//  LEVEL 1 LAYOUT
// ─────────────────────────────────────────────
const LEVEL1_CLOUDS = [
  { x: 0,    y: 340, w: 220, h: 60 },
  { x: 280,  y: 320, w: 160, h: 55 },
  { x: 500,  y: 300, w: 140, h: 55 },
  { x: 700,  y: 280, w: 150, h: 55 },
  { x: 910,  y: 310, w: 130, h: 50 },
  { x: 1100, y: 290, w: 140, h: 50 },
  { x: 1300, y: 260, w: 130, h: 50 },
  { x: 1490, y: 300, w: 120, h: 50 },
  { x: 1680, y: 270, w: 140, h: 50 },
  { x: 1880, y: 290, w: 130, h: 50 },
  { x: FINAL_CLOUD.x, y: FINAL_CLOUD.y, w: FINAL_CLOUD.w, h: 60 },
];

const POT_X = 2230;
const POT_Y = 220;

// ─────────────────────────────────────────────
//  GAME STATE
// ─────────────────────────────────────────────
let state;
let lives;
let player;
let camX;
let animFrame;
let animTick;
let deadTimer;
let winTimer;
let celebrationDone;

function initGame() {
  lives = MAX_LIVES;
  resetLevel();
  state = 'title';
}

function resetLevel() {
  const startCloud = LEVEL1_CLOUDS[0];
  player = {
    x:       startCloud.x + 60,
    y:       startCloud.y - 36,
    vx:      0,
    vy:      0,
    w:       26,
    h:       36,
    onGround: false,
    jumpsLeft: 2,
    facingLeft: false,
    won:     false,
  };
  camX        = 0;
  animFrame   = 0;
  animTick    = 0;
  particles   = [];
  celebrationDone = false;
}

function startPlaying() {
  resetLevel();
  state = 'playing';
  startMusic();
}

// ─────────────────────────────────────────────
//  INPUT
// ─────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => {
  const wasDown = keys[e.code];
  keys[e.code] = true;

  if (state === 'title' || state === 'gameover') {
    if (['Space','Enter','ArrowUp','KeyW'].includes(e.code)) {
      if (state === 'gameover') { lives = MAX_LIVES; }
      startPlaying();
    }
    return;
  }

  if (state === 'win' && ['Space','Enter'].includes(e.code)) {
    lives = MAX_LIVES;
    startPlaying();
    return;
  }

  if (state === 'dead' && deadTimer <= 0) {
    startPlaying();
    return;
  }

  if (state === 'playing' && !wasDown) {
    if (['Space','ArrowUp','KeyW'].includes(e.code)) {
      if (player.jumpsLeft > 0) {
        player.vy = JUMP_FORCE;
        player.jumpsLeft--;
        player.onGround = false;
      }
    }
  }
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// Also start music on click (for autoplay policy)
canvas.addEventListener('click', () => { if (state === 'title') startPlaying(); });

// ─────────────────────────────────────────────
//  PHYSICS & COLLISION
// ─────────────────────────────────────────────
function update() {
  if (state !== 'playing') {
    if (state === 'dead') {
      deadTimer -= 1/60;
      updateParticles();
    }
    if (state === 'win') {
      updateParticles();
    }
    return;
  }

  const movingLeft  = keys['ArrowLeft']  || keys['KeyA'];
  const movingRight = keys['ArrowRight'] || keys['KeyD'];

  if (movingLeft)  { player.vx = -MOVE_SPEED; player.facingLeft = true; }
  else if (movingRight) { player.vx =  MOVE_SPEED; player.facingLeft = false; }
  else             { player.vx = 0; }

  player.vy += GRAVITY;
  player.x += player.vx;
  player.y += player.vy;

  if (player.x < 0) player.x = 0;

  const targetCamX = player.x - W * 0.35;
  camX = Math.max(0, Math.min(targetCamX, WORLD_WIDTH - W));

  player.onGround = false;
  if (player.vy >= 0) {
    for (const c of LEVEL1_CLOUDS) {
      const playerBottom = player.y + player.h;
      const prevBottom   = playerBottom - player.vy;
      if (
        player.x + player.w > c.x &&
        player.x             < c.x + c.w &&
        prevBottom <= c.y + 4 &&
        playerBottom >= c.y
      ) {
        player.y       = c.y - player.h;
        player.vy      = 0;
        player.onGround = true;
        player.jumpsLeft = 2;
      }
    }
  }

  if (player.y > H + 80) {
    lives--;
    particles = [];
    if (lives <= 0) {
      state = 'gameover';
    } else {
      state     = 'dead';
      deadTimer = 1.5;
    }
    return;
  }

  if (
    !player.won &&
    player.x + player.w > POT_X &&
    player.x             < POT_X + 40 &&
    player.y + player.h > POT_Y &&
    player.y             < POT_Y + 50
  ) {
    player.won = true;
    spawnCoins(POT_X + 20, POT_Y + 10);
    state    = 'win';
    winTimer = 0;
  }

  animTick++;
  if (animTick % 8 === 0) animFrame = (animFrame + 1) % 4;

  updateParticles();
}

// ─────────────────────────────────────────────
//  BACKGROUND DRAWING
// ─────────────────────────────────────────────
function drawBackground() {
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0,   '#87ceeb');
  sky.addColorStop(0.7, '#b0e0f5');
  sky.addColorStop(1,   '#d4f5c0');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  // hills (parallax)
  ctx.fillStyle = '#6dbf5b';
  const hillOff = -(camX * 0.3) % W;
  for (let hx = hillOff - W; hx < W * 2; hx += W) {
    ctx.beginPath();
    ctx.ellipse(hx + W*0.25, H + 10, 200, 110, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath();
    ctx.ellipse(hx + W*0.6,  H + 10, 260, 130, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath();
    ctx.ellipse(hx + W*0.9,  H + 10, 180, 100, 0, 0, Math.PI*2); ctx.fill();
  }

  ctx.fillStyle = '#5aad48';
  ctx.fillRect(0, H - 30, W, 30);

  // distant clouds (cosmetic, parallax)
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  const bgCloudOff = -(camX * 0.15) % W;
  [[bgCloudOff + 80, 60], [bgCloudOff + 350, 90], [bgCloudOff + 600, 50], [bgCloudOff - 200, 110]].forEach(([cx, cy]) => {
    ctx.beginPath(); ctx.ellipse(cx, cy, 60, 22, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx+50, cy+10, 45, 18, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx-40, cy+8, 40, 16, 0, 0, Math.PI*2); ctx.fill();
  });
}

// ─────────────────────────────────────────────
//  HUD
// ─────────────────────────────────────────────
function drawHUD() {
  ctx.font = 'bold 14px monospace';
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 3;
  ctx.strokeText('LIVES', 12, 28);
  ctx.fillText('LIVES', 12, 28);
  for (let i = 0; i < MAX_LIVES; i++) {
    drawClover(70 + i * 28, 16, i < lives ? '#28b839' : '#555');
  }
}

function drawClover(x, y, color) {
  ctx.fillStyle = color;
  const r = 7;
  // four lobes (original shamrock)
  ctx.beginPath(); ctx.arc(x,   y-r, r, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x,   y+r, r, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x-r, y,   r, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+r, y,   r, 0, Math.PI*2); ctx.fill();
  // small stem (same color as shamrock)
  ctx.strokeStyle = color;
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(x, y + r);
  ctx.lineTo(x + 2, y + r + 10);
  ctx.stroke();
}

// ─────────────────────────────────────────────
//  SCREEN OVERLAYS
// ─────────────────────────────────────────────
function drawTitleScreen() {
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffd600';
  ctx.font = 'bold 48px monospace';
  ctx.strokeStyle = '#5d4037';
  ctx.lineWidth = 5;
  ctx.strokeText('Lucky Leprechaun', W/2, 150);
  ctx.fillText('Lucky Leprechaun', W/2, 150);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 26px monospace';
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 3;
  ctx.strokeText('Rainbow Run', W/2, 190);
  ctx.fillText('Rainbow Run', W/2, 190);

  // draw leprechaun on title
  drawSprite(LEP_IDLE, W/2 - 32, 220, 4, false);

  ctx.fillStyle = '#ffe082';
  ctx.font = 'bold 18px monospace';
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 2;
  const blink = Math.floor(Date.now() / 500) % 2 === 0;
  if (blink) {
    ctx.strokeText('Press SPACE or Click to Start!', W/2, 330);
    ctx.fillText('Press SPACE or Click to Start!', W/2, 330);
  }

  ctx.fillStyle = '#ccc';
  ctx.font = '14px monospace';
  ctx.fillText('Arrow Keys / WASD to move  |  Space / Up to jump  |  Double-jump!', W/2, 375);
  ctx.textAlign = 'left';
}

function drawDeadScreen() {
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ff5252';
  ctx.font = 'bold 36px monospace';
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 4;
  ctx.strokeText('Whoops!', W/2, H/2 - 20);
  ctx.fillText('Whoops!', W/2, H/2 - 20);
  ctx.fillStyle = '#fff';
  ctx.font = '18px monospace';
  if (deadTimer <= 0.5) {
    ctx.fillText('Press any key to try again...', W/2, H/2 + 20);
  }
  ctx.textAlign = 'left';
}

function drawGameOverScreen() {
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ff1744';
  ctx.font = 'bold 52px monospace';
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 5;
  ctx.strokeText('GAME OVER', W/2, H/2 - 30);
  ctx.fillText('GAME OVER', W/2, H/2 - 30);
  ctx.fillStyle = '#ffe082';
  ctx.font = '20px monospace';
  const blink = Math.floor(Date.now() / 500) % 2 === 0;
  if (blink) ctx.fillText('Press SPACE to play again!', W/2, H/2 + 30);
  ctx.textAlign = 'left';
}

function drawWinScreen() {
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';

  ctx.fillStyle = '#ffd600';
  ctx.font = 'bold 48px monospace';
  ctx.strokeStyle = '#5d4037';
  ctx.lineWidth = 5;
  ctx.strokeText('You Found It!', W/2, 160);
  ctx.fillText('You Found It!', W/2, 160);

  ctx.fillStyle = '#fff';
  ctx.font = '22px monospace';
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 2;
  ctx.strokeText("The Pot of Gold is yours!", W/2, 210);
  ctx.fillText("The Pot of Gold is yours!", W/2, 210);

  const blink = Math.floor(Date.now() / 500) % 2 === 0;
  ctx.fillStyle = '#ffe082';
  ctx.font = '18px monospace';
  if (blink) ctx.fillText('Press SPACE to play again!', W/2, 290);
  ctx.textAlign = 'left';
}

// ─────────────────────────────────────────────
//  MAIN DRAW
// ─────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();

  // draw big rainbow (behind clouds, in front of background)
  drawRainbow(camX);

  for (const c of LEVEL1_CLOUDS) {
    drawCloud(c.x, c.y, c.w, c.h, camX);
  }

  drawPot(POT_X, POT_Y, camX);
  drawParticles(camX);

  if (state === 'playing' || state === 'dead' || state === 'win') {
    const moving = player.vx !== 0;
    let sprite;
    if (!player.onGround) {
      sprite = LEP_JUMP;
    } else if (moving) {
      const frames = [LEP_RUN1, LEP_IDLE, LEP_RUN2, LEP_IDLE];
      sprite = frames[animFrame % 4];
    } else {
      sprite = LEP_IDLE;
    }
    const scale = 2;
    const sx = player.x - camX;
    const sy = player.y;
    drawSprite(sprite, sx, sy, scale, player.facingLeft);
  }

  drawHUD();

  if (state === 'title')    drawTitleScreen();
  if (state === 'dead')     drawDeadScreen();
  if (state === 'gameover') drawGameOverScreen();
  if (state === 'win')      drawWinScreen();
}

// ─────────────────────────────────────────────
//  GAME LOOP
// ─────────────────────────────────────────────
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// ─────────────────────────────────────────────
//  BOOT
// ─────────────────────────────────────────────
initGame();
loop();
</script>
</body>
