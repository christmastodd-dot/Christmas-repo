<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Leprechaun">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Lucky Leprechaun: Rainbow Run</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { overflow: hidden; touch-action: none; }
  body { background: #1a1a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: monospace; }
  canvas { display: block; image-rendering: pixelated; border: 3px solid #444; cursor: pointer; max-width: 100%; }
  #instructions { color: #aaa; font-size: 13px; margin-top: 6px; text-align: center; }

  /* touch controls — below canvas by default (portrait) */
  #touch-controls {
    display: none;
    width: 100%; max-width: 800px;
    margin-top: 8px;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    padding: 0 10px;
    -webkit-user-select: none; user-select: none;
    z-index: 10;
  }
  .touch-btn {
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 16px;
    color: rgba(255,255,255,0.7);
    font-family: monospace;
    font-size: 28px;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-user-select: none; user-select: none;
    touch-action: none;
  }
  .touch-btn:active { background: rgba(255,255,255,0.35); color: #fff; }
  .touch-btn-arrow { width: 90px; height: 90px; }
  .touch-btn-jump  { flex: 1; height: 72px; font-size: 22px; }
  .touch-group { display: flex; gap: 10px; }

  /* landscape overlay mode */
  @media (orientation: landscape) and (max-height: 500px) {
    body { justify-content: flex-start; position: relative; }
    #instructions { display: none !important; }
    canvas { border: none; }
    #touch-controls {
      position: fixed !important;
      bottom: 12px;
      left: 0; right: 0;
      margin: 0 auto;
      max-width: 100%;
      padding: 0 16px;
    }
    .touch-btn {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.18);
      color: rgba(255,255,255,0.45);
      height: 60px !important;
    }
    .touch-btn:active {
      background: rgba(255,255,255,0.22);
      color: rgba(255,255,255,0.8);
    }
    .touch-btn-arrow { width: 80px; }
  }
</style>
</head>
<body>
<canvas id="game" width="800" height="500"></canvas>
<div id="touch-controls">
  <div class="touch-group">
    <button class="touch-btn touch-btn-arrow" id="btn-left">&larr;</button>
    <button class="touch-btn touch-btn-arrow" id="btn-right">&rarr;</button>
  </div>
  <button class="touch-btn touch-btn-jump" id="btn-jump">JUMP</button>
</div>
<div id="instructions">Arrow Keys / WASD to move &nbsp;|&nbsp; Space / Up to jump &nbsp;|&nbsp; Double-jump allowed</div>
<script>
// ─────────────────────────────────────────────
//  CANVAS SETUP & RESPONSIVE SCALING
// ─────────────────────────────────────────────
const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');
const W = canvas.width;
const H = canvas.height;

// detect touch device and show controls
const isTouchDevice = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
const touchControls = document.getElementById('touch-controls');
const instrDiv = document.getElementById('instructions');
if (isTouchDevice) {
  touchControls.style.display = 'flex';
  instrDiv.style.display = 'none';
}

// responsive canvas: fit to screen, landscape fills viewport
function resizeCanvas() {
  const landscape = window.innerWidth > window.innerHeight && window.innerHeight <= 500;
  if (landscape && isTouchDevice) {
    // fill viewport in landscape
    const scaleW = window.innerWidth / W;
    const scaleH = window.innerHeight / H;
    const scale = Math.min(scaleW, scaleH);
    canvas.style.width  = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  } else {
    const maxW = Math.min(window.innerWidth - 6, 800);
    const scale = maxW / W;
    canvas.style.width  = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
  }
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);
window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 100));

// ─────────────────────────────────────────────
//  TOUCH INPUT
// ─────────────────────────────────────────────
const touchState = { left: false, right: false, jump: false };

function bindTouch(id, key) {
  const el = document.getElementById(id);
  if (!el) return;
  el.addEventListener('touchstart', e => { e.preventDefault(); touchState[key] = true; }, { passive: false });
  el.addEventListener('touchend',   e => { e.preventDefault(); touchState[key] = false; }, { passive: false });
  el.addEventListener('touchcancel',e => { e.preventDefault(); touchState[key] = false; }, { passive: false });
}
bindTouch('btn-left',  'left');
bindTouch('btn-right', 'right');
bindTouch('btn-jump',  'jump');

// track previous jump touch state for edge detection
let prevTouchJump = false;

// tap canvas to start on mobile
function getLevelFromTap(x, y) {
  const cols = 4;
  const btnW = 150; const btnH = 50;
  const padX = 18; const padY = 16;
  const gridW = cols * btnW + (cols - 1) * padX;
  const startX = (W - gridW) / 2;
  const startY = 85;
  for (let i = 0; i < LEVELS.length; i++) {
    const col = i % cols;
    const row = Math.floor(i / cols);
    const bx = startX + col * (btnW + padX);
    const by = startY + row * (btnH + padY);
    if (x >= bx && x <= bx + btnW && y >= by && y <= by + btnH) return i;
  }
  return -1;
}

function canvasTapCoords(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const touch = e.changedTouches ? e.changedTouches[0] : e;
  return { x: (touch.clientX - rect.left) * scaleX, y: (touch.clientY - rect.top) * scaleY };
}

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (state === 'levelselect') {
    const { x, y } = canvasTapCoords(e);
    const idx = getLevelFromTap(x, y);
    if (idx >= 0) { currentLevel = idx; lives = START_LIVES; startPlaying(); }
    return;
  }
  if (state === 'title') {
    currentLevel = START_LEVEL; lives = START_LIVES; startPlaying();
  } else if (state === 'gameover') {
    currentLevel = START_LEVEL; lives = START_LIVES; startPlaying();
  } else if (state === 'levelcomplete') {
    currentLevel++; startPlaying();
  } else if (state === 'gamecomplete') {
    currentLevel = START_LEVEL; lives = START_LIVES; startPlaying();
  } else if (state === 'dead' && deadTimer <= 0) {
    startPlaying();
  }
}, { passive: false });

// ─────────────────────────────────────────────
//  AUDIO — Irish background music (Web Audio chiptune)
// ─────────────────────────────────────────────
let audioCtx = null;
let musicPlaying = false;

function startMusic() {
  if (musicPlaying) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  musicPlaying = true;
  playJig();
}

function playJig() {
  if (!audioCtx || !musicPlaying) return;
  const BPM = 180;
  const eighth = 60 / BPM / 2;
  const melody = [
    [587, eighth], [523, eighth], [587, eighth], [659, eighth], [587, eighth], [523, eighth],
    [440, eighth], [392, eighth], [440, eighth], [523, eighth], [440, eighth], [392, eighth],
    [349, eighth], [392, eighth], [440, eighth], [523, eighth], [587, eighth], [659, eighth],
    [587, eighth], [523, eighth], [440, eighth], [392, eighth], [349, eighth], [392, eighth],
    [440, eighth], [523, eighth], [587, eighth], [659, eighth], [698, eighth], [659, eighth],
    [587, eighth], [523, eighth], [440, eighth], [523, eighth], [587, eighth], [523, eighth],
    [440, eighth], [392, eighth], [349, eighth], [392, eighth], [440, eighth], [523, eighth],
    [587, eighth*2], [440, eighth*2], [349, eighth*2],
  ];

  let t = audioCtx.currentTime + 0.05;
  melody.forEach(([freq, dur]) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.08, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + dur * 0.9);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + dur);

    const osc2 = audioCtx.createOscillator();
    const gain2 = audioCtx.createGain();
    osc2.type = 'triangle';
    osc2.frequency.value = freq * 0.667;
    gain2.gain.setValueAtTime(0.04, t);
    gain2.gain.exponentialRampToValueAtTime(0.001, t + dur * 0.9);
    osc2.connect(gain2);
    gain2.connect(audioCtx.destination);
    osc2.start(t);
    osc2.stop(t + dur);

    t += dur;
  });

  const totalDur = melody.reduce((sum, [,d]) => sum + d, 0);
  setTimeout(() => { if (musicPlaying) playJig(); }, totalDur * 1000);
}

function stopMusic() {
  musicPlaying = false;
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
}

// ─────────────────────────────────────────────
//  CONSTANTS
// ─────────────────────────────────────────────
const GRAVITY      = 0.55;
const JUMP_FORCE   = -13;
const MOVE_SPEED   = 4;
const MAX_LIVES    = 10;
const START_LIVES  = 3;
const START_LEVEL  = 0;

// ─────────────────────────────────────────────
//  PIXEL ART SPRITES
// ─────────────────────────────────────────────
const PALETTE = {
  0: null,
  1: '#f5c5a3', 2: '#2e7d32', 3: '#ffd600', 4: '#ffffff',
  5: '#5d4037', 6: '#1b5e20', 7: '#c62828', 8: '#ffb300',
  9: '#ff8f00', A: '#4caf50', B: '#81c784', C: '#e65100',
  D: '#111111', E: '#795548', F: '#ffc107',
};

const LEP_IDLE = [
  '0000066660000000','0000666666000000','0000F66F66000000','0066666666660000',
  '0000111111000000','0001D11D11000000','0001111111000000','00011CCCC1000000',
  '00000CCCC0000000','0002222222000000','0022232322200000','0022222222200000',
  '0022222222200000','0002222222000000','0000EE0EE0000000','0000EE0EE0000000',
  '0000DD0DD0000000','0000DD0DD0000000',
];
const LEP_RUN1 = [
  '0000066660000000','0000666666000000','0000F66F66000000','0066666666660000',
  '0000111111000000','0001D11D11000000','0001111111000000','00011CCCC1000000',
  '00000CCCC0000000','0002222222000000','0022232322200000','0022222222200000',
  '0022222222200000','0002222222000000','00EE000EE0000000','0EE0000EE0000000',
  '0DD00000DD000000','0000000000000000',
];
const LEP_RUN2 = [
  '0000066660000000','0000666666000000','0000F66F66000000','0066666666660000',
  '0000111111000000','0001D11D11000000','0001111111000000','00011CCCC1000000',
  '00000CCCC0000000','0002222222000000','0022232322200000','0022222222200000',
  '0022222222200000','0002222222000000','0000EE000EE00000','0000EE0000EE0000',
  '00000DD0000DD000','0000000000000000',
];
const LEP_JUMP = [
  '0000066660000000','0000666666000000','0000F66F66000000','0066666666660000',
  '0000111111000000','0001D11D11000000','0001111111000000','00011CCCC1000000',
  '00000CCCC0000000','0022222222200000','0022232322200000','2222222222220000',
  '0222222222200000','0022222222000000','000EE0000E000000','000DD000EE000000',
  '00000000DD000000','0000000000000000',
];

function drawSprite(sprite, x, y, scale, flipX) {
  const rows = sprite;
  const cols = rows[0].length;
  ctx.save();
  if (flipX) {
    ctx.translate(x + cols * scale, y);
    ctx.scale(-1, 1);
    ctx.translate(-x, -y);
  }
  for (let r = 0; r < rows.length; r++) {
    for (let c = 0; c < cols; c++) {
      const ch = rows[r][c];
      if (ch === '0') continue;
      ctx.fillStyle = PALETTE[ch];
      ctx.fillRect(x + c * scale, y + r * scale, scale, scale);
    }
  }
  ctx.restore();
}

// ─────────────────────────────────────────────
//  CLOUD DRAWING — varied puffs with rounded bottom
// ─────────────────────────────────────────────
// simple seeded random per cloud so each looks unique but stable
function cloudSeed(x) {
  let s = x * 2654435761 >>> 0;
  return () => { s ^= s << 13; s ^= s >> 17; s ^= s << 5; return (s >>> 0) / 4294967296; };
}

function drawCloud(x, y, w, h, camX, seedX) {
  const sx = x - camX;
  const rng = cloudSeed(seedX !== undefined ? seedX : x);

  // --- bottom: rounded belly ellipses ---
  ctx.fillStyle = '#cfe0f0';
  const bellyY = y + h * 0.6;
  ctx.beginPath(); ctx.ellipse(sx + w*0.3, bellyY, w*0.32, h*0.38, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(sx + w*0.7, bellyY, w*0.28, h*0.35, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(sx + w*0.5, bellyY + h*0.05, w*0.25, h*0.3, 0, 0, Math.PI*2); ctx.fill();

  // --- top puffs: 3-5 varied puffs ---
  ctx.fillStyle = '#dce8f5';
  const puffCount = 3 + Math.floor(rng() * 3); // 3 to 5
  for (let i = 0; i < puffCount; i++) {
    const t = (i + 0.5) / puffCount; // 0..1 spread
    const px = sx + w * (0.1 + t * 0.8);
    const py = y + h * (0.25 + rng() * 0.2);
    const rx = w * (0.14 + rng() * 0.12);
    const ry = h * (0.35 + rng() * 0.2);
    ctx.beginPath(); ctx.ellipse(px, py, rx, ry, 0, 0, Math.PI*2); ctx.fill();
  }

  // --- highlight puff on top ---
  ctx.fillStyle = '#eef4fb';
  const hlX = sx + w * (0.3 + rng() * 0.3);
  const hlY = y + h * (0.15 + rng() * 0.1);
  ctx.beginPath(); ctx.ellipse(hlX, hlY, w*0.14, h*0.2, 0, 0, Math.PI*2); ctx.fill();
}

// ─────────────────────────────────────────────
//  RAINBOW — dynamically positioned per level
// ─────────────────────────────────────────────
const RAINBOW_COLORS = ['#f8a0a0','#f8c89a','#f8e8a0','#a0dca0','#a0c8f0','#c8a0e0'];

function drawRainbow(camX) {
  const clouds = levelData.clouds;
  const fc = clouds[clouds.length - 1]; // final cloud
  const pc = clouds[clouds.length - 2]; // second-to-last cloud

  // right foot on center of final cloud, left foot on center of previous cloud
  const rightX = fc.x + fc.w * 0.5;
  const leftX  = pc.x + pc.w * 0.5;
  const landY  = fc.y; // top of final cloud

  // arc center is midpoint of feet, radius is half the span
  const arcCx = (leftX + rightX) / 2;
  const radius = (rightX - leftX) / 2;
  const sx = arcCx - camX;

  ctx.save();
  ctx.globalAlpha = 0.85;
  for (let i = 0; i < RAINBOW_COLORS.length; i++) {
    ctx.strokeStyle = RAINBOW_COLORS[i];
    ctx.lineWidth = 14;
    ctx.beginPath();
    ctx.arc(sx, landY, radius - i * 16, Math.PI, 0);
    ctx.stroke();
  }
  ctx.globalAlpha = 0.12;
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = RAINBOW_COLORS.length * 16 + 20;
  ctx.beginPath();
  ctx.arc(sx, landY, radius - RAINBOW_COLORS.length * 8, Math.PI, 0);
  ctx.stroke();
  ctx.restore();
}

// ─────────────────────────────────────────────
//  POT OF GOLD DRAWING
// ─────────────────────────────────────────────
function drawPot(x, y, camX) {
  const sx = x - camX;
  const t = Date.now() / 200;
  for (let i = 0; i < 5; i++) {
    const angle = t + i * 1.3;
    const dist = 20 + Math.sin(t * 0.5 + i) * 8;
    const px = sx + 20 + Math.cos(angle) * dist;
    const py = y + 5 + Math.sin(angle) * dist * 0.5;
    ctx.globalAlpha = 0.5 + Math.sin(t + i * 2) * 0.3;
    ctx.fillStyle = '#ffd600';
    ctx.fillRect(px - 2, py - 2, 4, 4);
    ctx.fillStyle = '#fff';
    ctx.fillRect(px - 1, py - 1, 2, 2);
  }
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#212121';
  ctx.beginPath();
  ctx.moveTo(sx, y + 20); ctx.lineTo(sx + 5, y + 50);
  ctx.lineTo(sx + 35, y + 50); ctx.lineTo(sx + 40, y + 20);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#424242';
  ctx.fillRect(sx - 3, y + 17, 46, 8);
  ctx.fillStyle = '#ffd600';
  ctx.beginPath(); ctx.ellipse(sx + 20, y + 18, 18, 8, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ffb300';
  ctx.beginPath(); ctx.ellipse(sx + 12, y + 14, 6, 6, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(sx + 22, y + 11, 6, 6, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(sx + 32, y + 13, 5, 5, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ffe082';
  ctx.beginPath(); ctx.ellipse(sx + 17, y + 8, 4, 4, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(sx + 27, y + 9, 4, 4, 0, 0, Math.PI*2); ctx.fill();
}

// ─────────────────────────────────────────────
//  PARTICLES (coin burst)
// ─────────────────────────────────────────────
let particles = [];
function spawnCoins(x, y) {
  for (let i = 0; i < 30; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 5;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 3,
      life: 1,
      color: Math.random() > 0.5 ? '#ffd600' : '#ffb300',
      size: 4 + Math.random() * 6,
    });
  }
}
function updateParticles() {
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x  += p.vx;
    p.y  += p.vy;
    p.vy += 0.2;
    p.life -= 0.02;
  });
}
function drawParticles(camX) {
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - camX - p.size/2, p.y - p.size/2, p.size, p.size);
  });
  ctx.globalAlpha = 1;
}

// ─────────────────────────────────────────────
//  CROW ENEMIES
// ─────────────────────────────────────────────
const CROW_W = 24;
const CROW_H = 18;

function drawCrow(x, y, camX, dir, frame) {
  const sx = x - camX;
  const flip = dir < 0;
  ctx.save();
  if (flip) {
    ctx.translate(sx + CROW_W, y);
    ctx.scale(-1, 1);
    ctx.translate(-sx, -y);
  }
  // body
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.ellipse(sx + 12, y + 11, 11, 7, 0, 0, Math.PI*2);
  ctx.fill();
  // head
  ctx.beginPath();
  ctx.ellipse(sx + 21, y + 7, 6, 5, 0, 0, Math.PI*2);
  ctx.fill();
  // beak (yellow, larger)
  ctx.fillStyle = '#ffd600';
  ctx.beginPath();
  ctx.moveTo(sx + 26, y + 5);
  ctx.lineTo(sx + 32, y + 8);
  ctx.lineTo(sx + 26, y + 11);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#ffb300';
  ctx.beginPath();
  ctx.moveTo(sx + 26, y + 8);
  ctx.lineTo(sx + 32, y + 8);
  ctx.lineTo(sx + 26, y + 11);
  ctx.closePath();
  ctx.fill();
  // eye
  ctx.fillStyle = '#ff1744';
  ctx.beginPath();
  ctx.arc(sx + 22, y + 6, 2, 0, Math.PI*2);
  ctx.fill();
  // wings (larger, more visible, flap animation)
  const wingY = frame % 2 === 0 ? -5 : 2;
  // outer wing
  ctx.fillStyle = '#444';
  ctx.beginPath();
  ctx.moveTo(sx + 16, y + 10);
  ctx.quadraticCurveTo(sx + 6, y + 2 + wingY, sx - 2, y + 4 + wingY);
  ctx.quadraticCurveTo(sx + 4, y + 8 + wingY, sx + 16, y + 10);
  ctx.fill();
  // inner wing
  ctx.fillStyle = '#555';
  ctx.beginPath();
  ctx.moveTo(sx + 14, y + 10);
  ctx.quadraticCurveTo(sx + 8, y + 4 + wingY, sx + 2, y + 6 + wingY);
  ctx.quadraticCurveTo(sx + 6, y + 9 + wingY, sx + 14, y + 10);
  ctx.fill();
  // feet
  ctx.fillStyle = '#ffd600';
  ctx.fillRect(sx + 7,  y + 16, 2, 3);
  ctx.fillRect(sx + 14, y + 16, 2, 3);
  ctx.restore();
}

function spawnPoof(x, y) {
  for (let i = 0; i < 12; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      life: 0.7,
      color: ['#555','#888','#aaa','#fff'][Math.floor(Math.random()*4)],
      size: 3 + Math.random() * 5,
    });
  }
}

// ─────────────────────────────────────────────
//  EXTRA LIFE PICKUP
// ─────────────────────────────────────────────
function drawExtraLife(x, y, camX) {
  const sx = x - camX;
  const t = Date.now() / 300;
  const bobY = y + Math.sin(t * 0.8) * 5;

  // glow
  ctx.save();
  ctx.globalAlpha = 0.2 + Math.sin(t * 1.2) * 0.1;
  const glow = ctx.createRadialGradient(sx, bobY, 3, sx, bobY, 22);
  glow.addColorStop(0, '#4cff4c');
  glow.addColorStop(1, 'rgba(40,184,57,0)');
  ctx.fillStyle = glow;
  ctx.beginPath(); ctx.arc(sx, bobY, 22, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;

  // clover (same style as HUD but smaller)
  const r = 5;
  ctx.fillStyle = '#28b839';
  ctx.beginPath(); ctx.arc(sx, bobY-r, r, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(sx, bobY+r, r, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(sx-r, bobY, r, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(sx+r, bobY, r, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#28b839';
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(sx, bobY+r); ctx.lineTo(sx+1, bobY+r+7); ctx.stroke();

  // +1 text
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'center';

  ctx.textAlign = 'left';
  ctx.restore();
}

const UNICORN_DURATION = 8; // seconds
const UNICORN_FLY_SPEED = 5;
const GRACE_DURATION = 60;   // frames (1 second)
const TRAIL_COLORS = ['#f8a0a0','#f8c89a','#f8e8a0','#a0dca0','#a0c8f0','#c8a0e0'];
let trailColorIdx = 0;

function drawUnicornOrb(x, y, camX) {
  const sx = x - camX;
  const t = Date.now() / 300;
  const bobY = y + Math.sin(t) * 6;

  // outer glow
  ctx.save();
  ctx.globalAlpha = 0.25 + Math.sin(t * 1.5) * 0.1;
  const glow = ctx.createRadialGradient(sx, bobY, 4, sx, bobY, 28);
  glow.addColorStop(0, '#fff');
  glow.addColorStop(1, 'rgba(200,160,255,0)');
  ctx.fillStyle = glow;
  ctx.beginPath(); ctx.arc(sx, bobY, 28, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;

  // rainbow ring
  for (let i = 0; i < 6; i++) {
    const a = t * 2 + i * Math.PI / 3;
    const rx = sx + Math.cos(a) * 14;
    const ry = bobY + Math.sin(a) * 14;
    ctx.fillStyle = TRAIL_COLORS[i];
    ctx.globalAlpha = 0.8;
    ctx.beginPath(); ctx.arc(rx, ry, 4, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // center orb
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(sx, bobY, 8, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ffe082';
  ctx.beginPath(); ctx.arc(sx, bobY, 5, 0, Math.PI*2); ctx.fill();

  // sparkle cross
  ctx.fillStyle = '#fff';
  ctx.globalAlpha = 0.7 + Math.sin(t * 3) * 0.3;
  ctx.fillRect(sx - 1, bobY - 12, 2, 24);
  ctx.fillRect(sx - 12, bobY - 1, 24, 2);
  ctx.globalAlpha = 1;
  ctx.restore();
}

// draw the unicorn mount underneath the player while flying
function drawUnicornMount(px, py, flipX) {
  ctx.save();
  const ux = px - 6;   // offset so unicorn is centered under player
  const uy = py + 20;  // below the leprechaun
  if (flipX) {
    ctx.translate(ux + 44, 0);
    ctx.scale(-1, 1);
    ctx.translate(-ux, 0);
  }
  const t = Date.now() / 200;

  // body
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.ellipse(ux + 22, uy + 12, 18, 10, 0, 0, Math.PI*2); ctx.fill();

  // neck + head
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.ellipse(ux + 38, uy + 2, 7, 10, 0.4, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(ux + 43, uy - 6, 8, 6, 0.2, 0, Math.PI*2); ctx.fill();

  // horn (rainbow gradient)
  ctx.strokeStyle = '#ffd600';
  ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(ux + 47, uy - 10); ctx.lineTo(ux + 53, uy - 22); ctx.stroke();
  ctx.strokeStyle = '#f8a0a0';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(ux + 48, uy - 13); ctx.lineTo(ux + 50, uy - 18); ctx.stroke();

  // eye
  ctx.fillStyle = '#7b1fa2';
  ctx.beginPath(); ctx.arc(ux + 45, uy - 6, 2, 0, Math.PI*2); ctx.fill();

  // ear
  ctx.fillStyle = '#eee';
  ctx.beginPath(); ctx.moveTo(ux + 42, uy - 10); ctx.lineTo(ux + 44, uy - 17); ctx.lineTo(ux + 46, uy - 10); ctx.fill();

  // mane (rainbow wisps)
  const maneColors = ['#f8a0a0','#f8c89a','#a0dca0','#a0c8f0','#c8a0e0'];
  for (let i = 0; i < maneColors.length; i++) {
    ctx.strokeStyle = maneColors[i];
    ctx.lineWidth = 2;
    ctx.beginPath();
    const mx = ux + 36 - i * 3;
    const my = uy - 4 + i * 2;
    const wave = Math.sin(t + i * 0.8) * 3;
    ctx.moveTo(mx, my);
    ctx.quadraticCurveTo(mx - 6, my - 8 + wave, mx - 12, my - 4 + wave);
    ctx.stroke();
  }

  // wings (flapping)
  const wingFlap = Math.sin(t * 2) * 8;
  ctx.fillStyle = 'rgba(200,160,224,0.7)';
  // top wing
  ctx.beginPath();
  ctx.moveTo(ux + 18, uy + 4);
  ctx.quadraticCurveTo(ux + 10, uy - 18 + wingFlap, ux - 4, uy - 10 + wingFlap);
  ctx.quadraticCurveTo(ux + 6, uy - 4 + wingFlap/2, ux + 18, uy + 4);
  ctx.fill();
  // bottom wing edge
  ctx.fillStyle = 'rgba(160,200,240,0.5)';
  ctx.beginPath();
  ctx.moveTo(ux + 18, uy + 6);
  ctx.quadraticCurveTo(ux + 8, uy - 10 + wingFlap, ux - 2, uy - 2 + wingFlap);
  ctx.quadraticCurveTo(ux + 8, uy + 2 + wingFlap/2, ux + 18, uy + 6);
  ctx.fill();

  // legs (tucked while flying)
  ctx.fillStyle = '#eee';
  ctx.fillRect(ux + 10, uy + 18, 3, 8);
  ctx.fillRect(ux + 16, uy + 19, 3, 7);
  ctx.fillRect(ux + 28, uy + 18, 3, 8);
  ctx.fillRect(ux + 33, uy + 19, 3, 7);

  // tail (rainbow)
  const tailColors = ['#f8a0a0','#f8e8a0','#a0dca0','#a0c8f0','#c8a0e0'];
  for (let i = 0; i < tailColors.length; i++) {
    ctx.strokeStyle = tailColors[i];
    ctx.lineWidth = 2;
    ctx.beginPath();
    const tw = Math.sin(t + i * 0.6) * 5;
    ctx.moveTo(ux + 4, uy + 10 + i * 2);
    ctx.quadraticCurveTo(ux - 8 + tw, uy + 14 + i * 3, ux - 14 + tw, uy + 10 + i * 4);
    ctx.stroke();
  }

  ctx.restore();
}

function spawnTrailParticle(x, y) {
  // spawn multiple particles for a thick jet trail
  for (let j = 0; j < 3; j++) {
    trailColorIdx = (trailColorIdx + 1) % TRAIL_COLORS.length;
    particles.push({
      x: x + Math.random() * 8 - 4,
      y: y + Math.random() * 8 - 4,
      vx: -1.5 + Math.random() * 3,
      vy: 0.5 + Math.random() * 1.5,
      life: 1.2,
      color: TRAIL_COLORS[trailColorIdx],
      size: 5 + Math.random() * 7,
    });
  }
}

function drawUnicornTimer(screenX, screenY, remaining, total) {
  const radius = 22;
  const frac = remaining / total;

  // background ring
  ctx.strokeStyle = 'rgba(0,0,0,0.3)';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.arc(screenX, screenY - 10, radius, 0, Math.PI * 2);
  ctx.stroke();

  // progress arc
  let color;
  if (frac > 0.5) color = '#4caf50';
  else if (frac > 0.3) color = '#ffd600';
  else color = '#ff1744';
  ctx.strokeStyle = color;
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.arc(screenX, screenY - 10, radius, -Math.PI/2, -Math.PI/2 + Math.PI*2*frac);
  ctx.stroke();
  ctx.lineCap = 'butt';

  // text
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(Math.ceil(remaining) + 's', screenX, screenY - 6);
  ctx.textAlign = 'left';
}

//  GAME STATE
// ─────────────────────────────────────────────
let state;        // 'title' | 'levelselect' | 'playing' | 'dead' | 'levelcomplete' | 'gamecomplete' | 'gameover'
let currentLevel; // 0-based index into LEVELS
let levelData;    // runtime copy of current level
let lives;
let player;
let camX;
let animFrame;
let animTick;
let deadTimer;

let levelSelectIdx = 0; // cursor for level select screen

// wind gust state
let windDir = 1;          // 1 = right, -1 = left
let windGustTimer = 5;    // countdown to next gust
let windActiveTimer = 0;  // time remaining in current gust
let windForce = 0;        // current wind push strength

function initGame() {
  currentLevel = START_LEVEL;
  lives = START_LIVES;
  resetLevel();
  state = 'title';
}

function resetLevel() {
  levelData = JSON.parse(JSON.stringify(LEVELS[currentLevel]));
  // initialize extra life pickups
  if (levelData.extraLives) {
    levelData.extraLives.forEach(el => {
      const cloud = levelData.clouds[el.cloudIndex];
      el.x = cloud.x + el.offsetX;
      el.y = cloud.y + el.offsetY;
      el.collected = false;
    });
  }
  // initialize unicorn pickups
  if (levelData.unicorns) {
    levelData.unicorns.forEach(u => {
      const cloud = levelData.clouds[u.cloudIndex];
      u.x = cloud.x + u.offsetX;
      u.y = cloud.y + u.offsetY;
      u.collected = false;
    });
  }
  // initialize crows on their clouds
  if (levelData.crows) {
    levelData.crows.forEach(crow => {
      const cloud = levelData.clouds[crow.cloudIndex];
      crow.x = cloud.x + cloud.w * 0.3;
      crow.y = cloud.y - CROW_H;
      crow.dir = 1;
      crow.alive = true;
      crow.frame = 0;
      crow.frameTick = 0;
    });
  }
  // initialize cloud properties
  levelData.clouds.forEach(c => {
    c.originX = c.x;
    c.originY = c.y;
    c.moveT = Math.random() * Math.PI * 2;
    c.dx = 0;
    c.dy = 0;
    // disappearing cloud state
    if (c.disappearing) {
      c.disState = 'solid';   // 'solid' | 'fading' | 'gone' | 'returning'
      c.disTimer = 0;
      c.disAlpha = 1;
    }
  });
  const startCloud = levelData.clouds[0];
  player = {
    x:       startCloud.x + 60,
    y:       startCloud.y - 36,
    vx:      0,
    vy:      0,
    w:       26,
    h:       36,
    onGround: false,
    jumpsLeft: 2,
    facingLeft: false,
    won:     false,
    flying:  false,
    unicornTimer: 0,
    graceTimer: 0,
  };
  camX        = 0;
  animFrame   = 0;
  animTick    = 0;
  particles   = [];
  windGustTimer = 5; windActiveTimer = 0; windForce = 0; windDir = 1;
}

function startPlaying() {
  resetLevel();
  state = 'playing';
  startMusic();
}

// ─────────────────────────────────────────────
//  INPUT
// ─────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => {
  const wasDown = keys[e.code];
  keys[e.code] = true;

  if (state === 'title') {
    if (['Space','Enter','ArrowUp','KeyW'].includes(e.code)) {
      currentLevel = START_LEVEL;
      lives = START_LIVES;
      startPlaying();
    }
    if (e.code === 'KeyL') {
      levelSelectIdx = 0;
      state = 'levelselect';
    }
    return;
  }

  if (state === 'levelselect') {
    const cols = 4;
    if (e.code === 'ArrowRight' || e.code === 'KeyD') {
      levelSelectIdx = Math.min(levelSelectIdx + 1, LEVELS.length - 1);
    } else if (e.code === 'ArrowLeft' || e.code === 'KeyA') {
      levelSelectIdx = Math.max(levelSelectIdx - 1, 0);
    } else if (e.code === 'ArrowDown' || e.code === 'KeyS') {
      levelSelectIdx = Math.min(levelSelectIdx + cols, LEVELS.length - 1);
    } else if (e.code === 'ArrowUp' || e.code === 'KeyW') {
      levelSelectIdx = Math.max(levelSelectIdx - cols, 0);
    } else if (e.code === 'Space' || e.code === 'Enter') {
      currentLevel = levelSelectIdx;
      lives = START_LIVES;
      startPlaying();
    } else if (e.code === 'Escape') {
      state = 'title';
    }
    return;
  }

  if (state === 'gameover') {
    if (['Space','Enter'].includes(e.code)) {
      currentLevel = START_LEVEL;
      lives = START_LIVES;
      startPlaying();
    }
    return;
  }

  if (state === 'levelcomplete') {
    if (['Space','Enter'].includes(e.code)) {
      currentLevel++;
      startPlaying();
    }
    return;
  }

  if (state === 'gamecomplete') {
    if (['Space','Enter'].includes(e.code)) {
      currentLevel = START_LEVEL;
      lives = START_LIVES;
      startPlaying();
    }
    return;
  }

  if (state === 'dead' && deadTimer <= 0) {
    if (['Space','Enter','ArrowUp','KeyW'].includes(e.code)) {
      startPlaying();
    }
    return;
  }

  if (state === 'playing' && !wasDown) {
    if (['Space','ArrowUp','KeyW'].includes(e.code)) {
      if (player.jumpsLeft > 0) {
        player.vy = player.jumpsLeft === 2 ? JUMP_FORCE : JUMP_FORCE * 0.75;
        player.jumpsLeft--;
        player.onGround = false;
      }
    }
  }
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

canvas.addEventListener('click', (e) => {
  if (state === 'levelselect') {
    const { x, y } = canvasTapCoords(e);
    const idx = getLevelFromTap(x, y);
    if (idx >= 0) { currentLevel = idx; lives = START_LIVES; startPlaying(); }
    return;
  }
  if (state === 'title') {
    currentLevel = START_LEVEL;
    lives = START_LIVES;
    startPlaying();
  }
});

// ─────────────────────────────────────────────
//  CLOUD MOVEMENT
// ─────────────────────────────────────────────
function updateClouds() {
  for (const c of levelData.clouds) {
    // movement
    if (c.moveType) {
      const prevX = c.x;
      const prevY = c.y;
      c.moveT += (c.moveSpeed || 1) / 60;
      if (c.moveType === 'h') c.x = c.originX + Math.sin(c.moveT) * c.moveRange;
      if (c.moveType === 'v') c.y = c.originY + Math.sin(c.moveT) * c.moveRange;
      c.dx = c.x - prevX;
      c.dy = c.y - prevY;
    } else {
      c.dx = 0; c.dy = 0;
    }

    // disappearing cloud state machine
    if (c.disappearing) {
      if (c.disState === 'fading') {
        c.disTimer -= 1/60;
        c.disAlpha = Math.max(0, c.disTimer / 1.125);
        if (c.disTimer <= 0) { c.disState = 'gone'; c.disTimer = 3; c.disAlpha = 0; }
      } else if (c.disState === 'gone') {
        c.disTimer -= 1/60;
        if (c.disTimer <= 0) { c.disState = 'returning'; c.disTimer = 0.5; c.disAlpha = 0; }
      } else if (c.disState === 'returning') {
        c.disTimer -= 1/60;
        c.disAlpha = 1 - (c.disTimer / 0.5);
        if (c.disTimer <= 0) { c.disState = 'solid'; c.disAlpha = 1; }
      }
    }
  }
}

// ─────────────────────────────────────────────
//  PHYSICS & COLLISION
// ─────────────────────────────────────────────
function update() {
  if (state !== 'playing') {
    if (state === 'dead') {
      deadTimer -= 1/60;
      updateParticles();
    }
    if (state === 'levelcomplete' || state === 'gamecomplete') {
      updateParticles();
    }
    return;
  }

  // update moving clouds before physics
  updateClouds();

  // carry player with the cloud they're standing on
  if (player.ridingCloud) {
    player.x += player.ridingCloud.dx;
    player.y += player.ridingCloud.dy;
  }

  // --- wind gusts ---
  if (levelData.wind && !player.flying) {
    const w = levelData.wind;
    if (windActiveTimer > 0) {
      windActiveTimer -= 1/60;
      windForce = w.gustForce * windDir;
      // wind particles
      if (animTick % 3 === 0) {
        particles.push({
          x: windDir > 0 ? camX - 20 : camX + W + 20,
          y: Math.random() * H * 0.8,
          vx: windDir * (8 + Math.random() * 4),
          vy: Math.random() * 2 - 1,
          life: 0.6, color: 'rgba(200,200,255,0.4)', size: 2 + Math.random() * 2,
        });
      }
    } else {
      windForce = 0;
      windGustTimer -= 1/60;
      if (windGustTimer <= 0) {
        windDir = Math.random() > 0.5 ? 1 : -1;
        windActiveTimer = w.gustDuration;
        windGustTimer = w.gustInterval[0] + Math.random() * (w.gustInterval[1] - w.gustInterval[0]);
      }
    }
  } else {
    windForce = 0;
  }

  // --- input ---
  const movingLeft  = keys['ArrowLeft']  || keys['KeyA'] || touchState.left;
  const movingRight = keys['ArrowRight'] || keys['KeyD'] || touchState.right;
  const movingUp    = keys['ArrowUp']    || keys['KeyW'];
  const movingDown  = keys['ArrowDown']  || keys['KeyS'];
  const jumpPressed = keys['Space'] || keys['ArrowUp'] || keys['KeyW'] || touchState.jump;

  // --- extra life pickup check ---
  if (levelData.extraLives) {
    for (const el of levelData.extraLives) {
      if (el.collected) continue;
      const dx = (player.x + player.w/2) - el.x;
      const dy = (player.y + player.h/2) - el.y;
      if (dx*dx + dy*dy < 700) {
        el.collected = true;
        if (lives < MAX_LIVES) lives++;
        // sparkle effect
        for (let i = 0; i < 15; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = 1.5 + Math.random() * 3;
          particles.push({
            x: el.x, y: el.y,
            vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 2,
            life: 0.8, color: Math.random() > 0.5 ? '#28b839' : '#4cff4c',
            size: 3 + Math.random() * 5,
          });
        }
      }
    }
  }

  // --- unicorn pickup check ---
  if (levelData.unicorns) {
    for (const u of levelData.unicorns) {
      if (u.collected) continue;
      const dx = (player.x + player.w/2) - u.x;
      const dy = (player.y + player.h/2) - u.y;
      if (dx*dx + dy*dy < 900) { // ~30px radius
        u.collected = true;
        player.flying = true;
        player.unicornTimer = UNICORN_DURATION;
        player.graceTimer = 0;
        player.vy = 0;
      }
    }
  }

  // --- flying mode ---
  if (player.flying) {
    player.unicornTimer -= 1/60;

    // free 4-direction movement
    const spd = UNICORN_FLY_SPEED;
    player.vx = 0; player.vy = 0;
    if (movingLeft)  { player.vx = -spd; player.facingLeft = true; }
    if (movingRight) { player.vx =  spd; player.facingLeft = false; }
    if (movingUp)    player.vy = -spd;
    if (movingDown)  player.vy =  spd;

    // touch: jump button = fly up
    if (touchState.jump) player.vy = -spd;

    player.x += player.vx;
    player.y += player.vy;

    // clamp
    if (player.x < 0) player.x = 0;
    if (player.y < 0) player.y = 0;
    if (player.y > H - player.h) player.y = H - player.h;

    // rainbow jet trail — every frame for thick stream
    spawnTrailParticle(player.x + player.w/2, player.y + player.h);

    // timer expired → enter grace period
    if (player.unicornTimer <= 0) {
      player.flying = false;
      player.graceTimer = GRACE_DURATION;
      player.vy = 0;
    }

    player.onGround = false;
    player.ridingCloud = null;

  } else {
    // --- normal / grace physics ---

    // handle touch jump (edge-detect: trigger once per press)
    if (touchState.jump && !prevTouchJump && player.jumpsLeft > 0) {
      player.vy = player.jumpsLeft === 2 ? JUMP_FORCE : JUMP_FORCE * 0.75;
      player.jumpsLeft--;
      player.onGround = false;
    }
    prevTouchJump = touchState.jump;

    if (movingLeft)  { player.vx = -MOVE_SPEED; player.facingLeft = true; }
    else if (movingRight) { player.vx =  MOVE_SPEED; player.facingLeft = false; }
    else {
      // icy cloud: slide with friction instead of instant stop
      if (player.ridingCloud && player.ridingCloud.icy) {
        player.vx *= 0.94;
        if (Math.abs(player.vx) < 0.2) player.vx = 0;
      } else {
        player.vx = 0;
      }
    }

    // on icy cloud: input blends with momentum instead of overriding
    if (player.ridingCloud && player.ridingCloud.icy && (movingLeft || movingRight)) {
      const target = movingLeft ? -MOVE_SPEED : MOVE_SPEED;
      player.vx += (target - player.vx) * 0.12;
    }

    // gravity (reduced during grace period)
    if (player.graceTimer > 0) {
      player.vy += GRAVITY * 0.2;
      player.graceTimer--;
    } else {
      player.vy += GRAVITY;
    }

    player.x += player.vx + windForce;
    player.y += player.vy;

    if (player.x < 0) player.x = 0;

    // cloud collision
    player.onGround = false;
    player.ridingCloud = null;
    if (player.vy >= 0) {
      for (const c of levelData.clouds) {
        // skip vanished disappearing clouds
        if (c.disappearing && (c.disState === 'gone' || c.disState === 'returning')) continue;
        const playerBottom = player.y + player.h;
        const prevBottom   = playerBottom - player.vy;
        if (
          player.x + player.w > c.x &&
          player.x             < c.x + c.w &&
          prevBottom <= c.y + 4 &&
          playerBottom >= c.y
        ) {
          player.y       = c.y - player.h;
          player.vy      = 0;
          player.onGround = true;
          player.jumpsLeft = 2;
          player.ridingCloud = c;
          // trigger disappearing cloud countdown
          if (c.disappearing && c.disState === 'solid') {
            c.disState = 'fading';
            c.disTimer = 1.125;
          }
          // bouncy cloud — launch player upward
          if (c.bouncy) {
            player.vy = JUMP_FORCE * 1.6;
            player.onGround = false;
            player.jumpsLeft = 2;
            player.ridingCloud = null;
          }
        }
      }
    }

    // fall off screen → lose life
    if (player.y > H + 80) {
      lives--;
      particles = [];
      if (lives <= 0) {
        state = 'gameover';
      } else {
        state     = 'dead';
        deadTimer = 1.5;
      }
      return;
    }
  }

  // --- camera ---
  const targetCamX = player.x - W * 0.35;
  camX = Math.max(0, Math.min(targetCamX, levelData.worldWidth - W));

  // --- pot of gold ---
  if (
    !player.won &&
    player.x + player.w > levelData.potX &&
    player.x             < levelData.potX + 40 &&
    player.y + player.h > levelData.potY &&
    player.y             < levelData.potY + 50
  ) {
    player.won = true;
    player.flying = false;
    player.unicornTimer = 0;
    spawnCoins(levelData.potX + 20, levelData.potY + 10);
    if (currentLevel < LEVELS.length - 1) {
      state = 'levelcomplete';
    } else {
      state = 'gamecomplete';
    }
  }

  // --- update crows ---
  if (levelData.crows) {
    for (const crow of levelData.crows) {
      if (!crow.alive) continue;
      const cloud = levelData.clouds[crow.cloudIndex];

      crow.x += crow.speed * crow.dir + (cloud.dx || 0);
      crow.y = cloud.y - CROW_H;

      if (crow.x < cloud.x + 4) { crow.x = cloud.x + 4; crow.dir = 1; }
      if (crow.x + CROW_W > cloud.x + cloud.w - 4) { crow.x = cloud.x + cloud.w - 4 - CROW_W; crow.dir = -1; }

      crow.frameTick++;
      if (crow.frameTick % 15 === 0) crow.frame++;

      // collision — invulnerable while flying
      if (!player.flying) {
        const overlapX = player.x + player.w > crow.x && player.x < crow.x + CROW_W;
        const overlapY = player.y + player.h > crow.y && player.y < crow.y + CROW_H;
        if (overlapX && overlapY) {
          if (player.vy > 0 && player.y + player.h < crow.y + CROW_H * 0.85) {
            crow.alive = false;
            spawnPoof(crow.x + CROW_W/2, crow.y + CROW_H/2);
            player.vy = JUMP_FORCE * 0.55;
          } else {
            lives--;
            particles = [];
            if (lives <= 0) { state = 'gameover'; }
            else { state = 'dead'; deadTimer = 1.5; }
            return;
          }
        }
      } else {
        // flying into a crow defeats it
        const overlapX = player.x + player.w > crow.x && player.x < crow.x + CROW_W;
        const overlapY = player.y + player.h > crow.y && player.y < crow.y + CROW_H;
        if (overlapX && overlapY) {
          crow.alive = false;
          spawnPoof(crow.x + CROW_W/2, crow.y + CROW_H/2);
        }
      }
    }
  }

  animTick++;
  if (animTick % 8 === 0) animFrame = (animFrame + 1) % 4;

  updateParticles();
}

// ─────────────────────────────────────────────
//  BACKGROUND DRAWING
// ─────────────────────────────────────────────
// lightning flash state
let lightningTimer = 0;
let lightningAlpha = 0;

function drawBackground() {
  const bg = levelData.bgType;
  const sky = ctx.createLinearGradient(0, 0, 0, H);

  if (bg === 'celestial') {
    sky.addColorStop(0,   '#050510');
    sky.addColorStop(0.3, '#0a0a30');
    sky.addColorStop(0.5, '#100a40');
    sky.addColorStop(0.7, '#200a50');
    sky.addColorStop(1,   '#0a0520');
  } else if (bg === 'golden') {
    sky.addColorStop(0,   '#1a0a00');
    sky.addColorStop(0.2, '#4a1a00');
    sky.addColorStop(0.5, '#cc6600');
    sky.addColorStop(0.8, '#ffb300');
    sky.addColorStop(1,   '#ffe082');
  } else if (bg === 'frozen') {
    sky.addColorStop(0,   '#0a1028');
    sky.addColorStop(0.3, '#1a2848');
    sky.addColorStop(0.6, '#2a4068');
    sky.addColorStop(1,   '#4a6888');
  } else if (bg === 'aurora') {
    sky.addColorStop(0,   '#0a0a1a');
    sky.addColorStop(0.3, '#0d1530');
    sky.addColorStop(0.6, '#1a1040');
    sky.addColorStop(1,   '#0a0a18');
  } else if (bg === 'starry') {
    sky.addColorStop(0,   '#0a0a20');
    sky.addColorStop(0.4, '#151535');
    sky.addColorStop(0.7, '#1a1a40');
    sky.addColorStop(1,   '#10102a');
  } else if (bg === 'storm') {
    sky.addColorStop(0,   '#1a1a2e');
    sky.addColorStop(0.4, '#2d2844');
    sky.addColorStop(0.7, '#3d3556');
    sky.addColorStop(1,   '#2a2a3a');
  } else if (bg === 'sunset') {
    sky.addColorStop(0,   '#2d1b69');
    sky.addColorStop(0.3, '#c2185b');
    sky.addColorStop(0.6, '#ff6f00');
    sky.addColorStop(1,   '#ffb300');
  } else {
    sky.addColorStop(0,   '#87ceeb');
    sky.addColorStop(0.7, '#b0e0f5');
    sky.addColorStop(1,   '#d4f5c0');
  }
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  // snowfall for frozen level
  if (bg === 'frozen' && state === 'playing') {
    if (animTick % 2 === 0) {
      particles.push({
        x: camX + Math.random() * W, y: -5,
        vx: -0.5 + Math.random(), vy: 1 + Math.random() * 2,
        life: 1.5, color: '#fff', size: 2 + Math.random() * 3,
      });
    }
  }

  // golden sunrise glow
  if (bg === 'golden') {
    ctx.save();
    const glow = ctx.createRadialGradient(W*0.5, H*0.85, 20, W*0.5, H*0.85, W*0.7);
    glow.addColorStop(0, 'rgba(255,220,100,0.25)');
    glow.addColorStop(1, 'rgba(255,180,0,0)');
    ctx.fillStyle = glow;
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }

  // stars for night sky levels
  // nebula for celestial level
  if (bg === 'celestial') {
    ctx.save();
    const nt = Date.now() / 3000;
    const nebColors = ['rgba(100,0,200,0.08)', 'rgba(0,100,200,0.06)', 'rgba(200,0,100,0.07)'];
    for (let i = 0; i < nebColors.length; i++) {
      ctx.fillStyle = nebColors[i];
      const nx = W * (0.3 + i * 0.25) + Math.sin(nt + i * 2) * 40;
      const ny = H * (0.2 + i * 0.15) + Math.cos(nt * 0.7 + i) * 30;
      ctx.beginPath(); ctx.ellipse(nx, ny, 150, 80, i * 0.5, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }

  if (bg === 'starry' || bg === 'aurora' || bg === 'frozen' || bg === 'golden' || bg === 'celestial') {
    ctx.fillStyle = '#fff';
    // seeded star positions
    const starSeed = 12345;
    let ss = starSeed;
    for (let i = 0; i < 60; i++) {
      ss = (ss * 16807 + 0) % 2147483647;
      const sx = (ss % W);
      ss = (ss * 16807 + 0) % 2147483647;
      const sy = (ss % (H * 0.6));
      ss = (ss * 16807 + 0) % 2147483647;
      const sr = 0.5 + (ss % 20) / 20 * 1.5;
      ctx.globalAlpha = 0.4 + Math.sin(Date.now()/1000 + i * 0.7) * 0.3;
      ctx.beginPath(); ctx.arc(sx, sy, sr, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // aurora effect for Level 5
  if (bg === 'aurora') {
    ctx.save();
    const at = Date.now() / 2000;
    for (let i = 0; i < 4; i++) {
      const aColors = ['rgba(0,255,128,', 'rgba(100,0,255,', 'rgba(0,200,255,', 'rgba(200,0,200,'];
      ctx.strokeStyle = aColors[i] + '0.12)';
      ctx.lineWidth = 30 + Math.sin(at + i) * 10;
      ctx.beginPath();
      for (let ax = 0; ax <= W; ax += 20) {
        const ay = 60 + i * 25 + Math.sin(at * 0.7 + ax / 120 + i * 1.5) * 30;
        if (ax === 0) ctx.moveTo(ax, ay);
        else ctx.lineTo(ax, ay);
      }
      ctx.stroke();
    }
    ctx.restore();
  }

  // lightning flash for storm levels
  if (bg === 'storm' && state === 'playing') {
    lightningTimer -= 1/60;
    if (lightningTimer <= 0) {
      lightningAlpha = 0.4 + Math.random() * 0.3;
      lightningTimer = 5 + Math.random() * 4; // every 5-9 seconds
    }
    if (lightningAlpha > 0) {
      ctx.fillStyle = 'rgba(200,180,255,' + lightningAlpha + ')';
      ctx.fillRect(0, 0, W, H);
      lightningAlpha -= 0.06; // fade out quickly (~7 frames)
    }
  }

  // hills (parallax)
  const hillColor = bg === 'celestial' ? '#050510' : bg === 'golden' ? '#3a1a00' : bg === 'frozen' ? '#0e1830' : bg === 'aurora' ? '#0a0a14' : bg === 'starry' ? '#0e0e1e' : bg === 'storm' ? '#1a1a28' : bg === 'sunset' ? '#4a2c0a' : '#6dbf5b';
  ctx.fillStyle = hillColor;
  const hillOff = -(camX * 0.3) % W;
  for (let hx = hillOff - W; hx < W * 2; hx += W) {
    ctx.beginPath();
    ctx.ellipse(hx + W*0.25, H + 10, 200, 110, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath();
    ctx.ellipse(hx + W*0.6,  H + 10, 260, 130, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath();
    ctx.ellipse(hx + W*0.9,  H + 10, 180, 100, 0, 0, Math.PI*2); ctx.fill();
  }

  const groundColor = bg === 'celestial' ? '#030308' : bg === 'golden' ? '#2a1200' : bg === 'frozen' ? '#0a1225' : bg === 'aurora' ? '#080810' : bg === 'starry' ? '#0a0a16' : bg === 'storm' ? '#151520' : bg === 'sunset' ? '#3e2409' : '#5aad48';
  ctx.fillStyle = groundColor;
  ctx.fillRect(0, H - 30, W, 30);

  // distant clouds (cosmetic, parallax) — 50% smaller, bob up and down
  const cloudColor = bg === 'celestial' ? 'rgba(60,20,100,0.3)' : bg === 'golden' ? 'rgba(255,180,50,0.3)' : bg === 'frozen' ? 'rgba(100,140,200,0.4)' : bg === 'aurora' ? 'rgba(80,40,120,0.35)' : bg === 'starry' ? 'rgba(50,50,90,0.4)' : bg === 'storm' ? 'rgba(60,50,80,0.5)' : bg === 'sunset' ? 'rgba(255,180,100,0.4)' : 'rgba(255,255,255,0.5)';
  ctx.fillStyle = cloudColor;
  const bgCloudOff = -(camX * 0.15) % W;
  const t = Date.now() / 1000;
  [[bgCloudOff + 80, 60, 0], [bgCloudOff + 350, 90, 1.2], [bgCloudOff + 600, 50, 2.5], [bgCloudOff - 200, 110, 3.8]].forEach(([cx, baseY, phase]) => {
    const cy = baseY + Math.sin(t * 0.6 + phase) * 12;
    ctx.beginPath(); ctx.ellipse(cx, cy, 30, 11, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx+25, cy+5, 22, 9, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx-20, cy+4, 20, 8, 0, 0, Math.PI*2); ctx.fill();
  });
}

// ─────────────────────────────────────────────
//  HUD
// ─────────────────────────────────────────────
function drawHUD() {
  // lives
  ctx.font = 'bold 14px monospace';
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 3;
  ctx.strokeText('LIVES', 12, 28);
  ctx.fillText('LIVES', 12, 28);
  for (let i = 0; i < 3; i++) {
    drawClover(70 + i * 28, 16, i < lives ? '#28b839' : '#555');
  }
  // show count if lives > 3
  if (lives > 3) {
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 13px monospace';
    ctx.fillText('x' + lives, 70 + 3 * 28, 22);
  }

  // level indicator
  const levelText = 'Level ' + (currentLevel + 1);
  ctx.font = 'bold 14px monospace';
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 3;
  ctx.textAlign = 'right';
  ctx.strokeText(levelText, W - 12, 28);
  ctx.fillText(levelText, W - 12, 28);
  ctx.textAlign = 'left';

  // wind indicator
  if (windActiveTimer > 0) {
    ctx.save();
    const wx = W / 2;
    const wy = 22;
    ctx.globalAlpha = 0.7;
    ctx.fillStyle = '#aaccff';
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(windDir > 0 ? 'WIND >>>' : '<<< WIND', wx, wy);
    ctx.textAlign = 'left';
    ctx.restore();
  }
}

function drawClover(x, y, color) {
  ctx.fillStyle = color;
  const r = 7;
  ctx.beginPath(); ctx.arc(x,   y-r, r, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x,   y+r, r, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x-r, y,   r, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+r, y,   r, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = color;
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(x, y + r);
  ctx.lineTo(x + 2, y + r + 10);
  ctx.stroke();
}

// ─────────────────────────────────────────────
//  SCREEN OVERLAYS
// ─────────────────────────────────────────────
function drawTitleScreen() {
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffd600';
  ctx.font = 'bold 48px monospace';
  ctx.strokeStyle = '#5d4037';
  ctx.lineWidth = 5;
  ctx.strokeText('Lucky Leprechaun', W/2, 150);
  ctx.fillText('Lucky Leprechaun', W/2, 150);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 26px monospace';
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 3;
  ctx.strokeText('Rainbow Run', W/2, 190);
  ctx.fillText('Rainbow Run', W/2, 190);

  drawSprite(LEP_IDLE, W/2 - 32, 220, 4, false);

  ctx.fillStyle = '#ffe082';
  ctx.font = 'bold 18px monospace';
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 2;
  const blink = Math.floor(Date.now() / 500) % 2 === 0;
  if (blink) {
    ctx.strokeText('Press SPACE or Click to Start!', W/2, 325);
    ctx.fillText('Press SPACE or Click to Start!', W/2, 325);
  }

  ctx.fillStyle = '#a0c8f0';
  ctx.font = 'bold 16px monospace';
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 2;
  ctx.strokeText('Press L for Level Select', W/2, 365);
  ctx.fillText('Press L for Level Select', W/2, 365);

  ctx.fillStyle = '#ccc';
  ctx.font = '14px monospace';
  ctx.fillText('Arrow Keys / WASD to move  |  Space / Up to jump  |  Double-jump!', W/2, 400);
  ctx.textAlign = 'left';
}

function drawLevelSelectScreen() {
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffd600';
  ctx.font = 'bold 36px monospace';
  ctx.strokeStyle = '#5d4037';
  ctx.lineWidth = 4;
  ctx.strokeText('Select Level', W/2, 55);
  ctx.fillText('Select Level', W/2, 55);

  // draw level buttons in a grid (2 rows of 4)
  const cols = 4;
  const btnW = 150;
  const btnH = 50;
  const padX = 18;
  const padY = 16;
  const gridW = cols * btnW + (cols - 1) * padX;
  const startX = (W - gridW) / 2;
  const startY = 85;

  for (let i = 0; i < LEVELS.length; i++) {
    const col = i % cols;
    const row = Math.floor(i / cols);
    const bx = startX + col * (btnW + padX);
    const by = startY + row * (btnH + padY);

    // button bg
    const hovered = (i === levelSelectIdx);
    ctx.fillStyle = hovered ? 'rgba(255,214,0,0.35)' : 'rgba(255,255,255,0.1)';
    ctx.strokeStyle = hovered ? '#ffd600' : 'rgba(255,255,255,0.3)';
    ctx.lineWidth = hovered ? 3 : 1.5;
    ctx.beginPath();
    ctx.roundRect(bx, by, btnW, btnH, 10);
    ctx.fill();
    ctx.stroke();

    // level number
    ctx.fillStyle = hovered ? '#ffd600' : '#fff';
    ctx.font = 'bold 16px monospace';
    ctx.fillText((i + 1) + '', bx + btnW/2, by + 20);

    // level name (smaller)
    ctx.fillStyle = hovered ? '#ffe082' : '#aaa';
    ctx.font = '10px monospace';
    ctx.fillText(LEVELS[i].name, bx + btnW/2, by + 38);
  }

  // instructions
  ctx.fillStyle = '#ccc';
  ctx.font = '14px monospace';
  ctx.fillText('Arrow Keys to select  |  SPACE or ENTER to play  |  ESC to go back', W/2, H - 25);
  ctx.textAlign = 'left';
}

function drawDeadScreen() {
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ff5252';
  ctx.font = 'bold 36px monospace';
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 4;
  ctx.strokeText('Whoops!', W/2, H/2 - 20);
  ctx.fillText('Whoops!', W/2, H/2 - 20);
  ctx.fillStyle = '#fff';
  ctx.font = '18px monospace';
  if (deadTimer <= 0.5) {
    ctx.fillText('Press SPACE to try again...', W/2, H/2 + 20);
  }
  ctx.textAlign = 'left';
}

function drawGameOverScreen() {
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ff1744';
  ctx.font = 'bold 52px monospace';
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 5;
  ctx.strokeText('GAME OVER', W/2, H/2 - 30);
  ctx.fillText('GAME OVER', W/2, H/2 - 30);
  ctx.fillStyle = '#ffe082';
  ctx.font = '20px monospace';
  const blink = Math.floor(Date.now() / 500) % 2 === 0;
  if (blink) ctx.fillText('Press SPACE to play again!', W/2, H/2 + 30);
  ctx.textAlign = 'left';
}

function drawLevelCompleteScreen() {
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';

  ctx.fillStyle = '#ffd600';
  ctx.font = 'bold 44px monospace';
  ctx.strokeStyle = '#5d4037';
  ctx.lineWidth = 5;
  ctx.strokeText('Level Complete!', W/2, H/2 - 50);
  ctx.fillText('Level Complete!', W/2, H/2 - 50);

  ctx.fillStyle = '#fff';
  ctx.font = '20px monospace';
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 2;
  const name = LEVELS[currentLevel].name;
  ctx.strokeText(name, W/2, H/2 - 5);
  ctx.fillText(name, W/2, H/2 - 5);

  const blink = Math.floor(Date.now() / 500) % 2 === 0;
  ctx.fillStyle = '#ffe082';
  ctx.font = 'bold 18px monospace';
  if (blink) {
    ctx.strokeText('Press SPACE for next level!', W/2, H/2 + 45);
    ctx.fillText('Press SPACE for next level!', W/2, H/2 + 45);
  }
  ctx.textAlign = 'left';
}

function drawGameCompleteScreen() {
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';

  ctx.fillStyle = '#ffd600';
  ctx.font = 'bold 48px monospace';
  ctx.strokeStyle = '#5d4037';
  ctx.lineWidth = 5;
  ctx.strokeText('You Won!', W/2, 150);
  ctx.fillText('You Won!', W/2, 150);

  ctx.fillStyle = '#fff';
  ctx.font = '22px monospace';
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 2;
  ctx.strokeText("The Pot of Gold is yours!", W/2, 200);
  ctx.fillText("The Pot of Gold is yours!", W/2, 200);

  drawSprite(LEP_IDLE, W/2 - 32, 220, 4, false);

  const blink = Math.floor(Date.now() / 500) % 2 === 0;
  ctx.fillStyle = '#ffe082';
  ctx.font = '18px monospace';
  if (blink) ctx.fillText('Press SPACE to play again!', W/2, 330);
  ctx.textAlign = 'left';
}

// ─────────────────────────────────────────────
//  MAIN DRAW
// ─────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();
  drawRainbow(camX);

  for (const c of levelData.clouds) {
    if (c.disappearing && c.disState === 'gone') continue;
    ctx.save();
    if (c.disappearing) {
      ctx.globalAlpha = c.disAlpha * (c.disState === 'solid' ? 0.8 : 1);
    }
    // ladder platforms — rainbow colored rectangles
    if (c.ladder) {
      const lsx = c.x - camX;
      const lt = Date.now() / 300;
      const colors = ['#f8a0a0','#f8c89a','#f8e8a0','#a0dca0','#a0c8f0','#c8a0e0'];
      const ci = Math.floor((c.originY || c.y) / 40) % colors.length;
      // glow
      ctx.globalAlpha = (ctx.globalAlpha || 1) * (0.6 + Math.sin(lt + ci) * 0.15);
      ctx.fillStyle = colors[ci];
      ctx.shadowColor = colors[ci];
      ctx.shadowBlur = 12;
      // rounded rect
      const r = 6;
      ctx.beginPath();
      ctx.moveTo(lsx + r, c.y);
      ctx.lineTo(lsx + c.w - r, c.y);
      ctx.quadraticCurveTo(lsx + c.w, c.y, lsx + c.w, c.y + r);
      ctx.lineTo(lsx + c.w, c.y + c.h - r);
      ctx.quadraticCurveTo(lsx + c.w, c.y + c.h, lsx + c.w - r, c.y + c.h);
      ctx.lineTo(lsx + r, c.y + c.h);
      ctx.quadraticCurveTo(lsx, c.y + c.h, lsx, c.y + c.h - r);
      ctx.lineTo(lsx, c.y + r);
      ctx.quadraticCurveTo(lsx, c.y, lsx + r, c.y);
      ctx.fill();
      ctx.shadowBlur = 0;
      // sparkle
      ctx.fillStyle = '#fff';
      ctx.globalAlpha = 0.5 + Math.sin(lt * 2 + ci * 1.5) * 0.3;
      ctx.fillRect(lsx + c.w/2 - 1, c.y + c.h/2 - 3, 2, 6);
      ctx.fillRect(lsx + c.w/2 - 3, c.y + c.h/2 - 1, 6, 2);
      ctx.restore();
      continue;
    }
    drawCloud(c.x, c.y, c.w, c.h, camX, c.originX || c.x);
    // bouncy cloud indicator — green tint + spring lines
    if (c.bouncy) {
      const bsx = c.x - camX;
      ctx.fillStyle = 'rgba(0,255,100,0.15)';
      ctx.beginPath(); ctx.ellipse(bsx + c.w/2, c.y + c.h*0.4, c.w*0.35, c.h*0.35, 0, 0, Math.PI*2); ctx.fill();
      // spring arrows
      ctx.strokeStyle = 'rgba(0,255,100,0.5)';
      ctx.lineWidth = 2;
      const bt = Date.now() / 400;
      const bounce = Math.sin(bt) * 3;
      ctx.beginPath();
      ctx.moveTo(bsx + c.w/2 - 8, c.y - 2 + bounce);
      ctx.lineTo(bsx + c.w/2, c.y - 8 + bounce);
      ctx.lineTo(bsx + c.w/2 + 8, c.y - 2 + bounce);
      ctx.stroke();
    }
    // icy cloud indicator — blue tint overlay + ice crystals
    if (c.icy) {
      const isx = c.x - camX;
      ctx.fillStyle = 'rgba(100,180,255,0.2)';
      ctx.beginPath(); ctx.ellipse(isx + c.w/2, c.y + c.h*0.4, c.w*0.4, c.h*0.4, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = 'rgba(200,230,255,0.6)';
      const it = Date.now() / 500;
      for (let i = 0; i < 3; i++) {
        const ix = isx + c.w * (0.2 + i * 0.3) + Math.sin(it + i) * 3;
        const iy = c.y + c.h * 0.3;
        ctx.fillRect(ix - 1, iy - 3, 2, 6);
        ctx.fillRect(ix - 3, iy - 1, 6, 2);
      }
    }
    ctx.restore();
  }

  // draw crows
  if (levelData.crows) {
    for (const crow of levelData.crows) {
      if (crow.alive) drawCrow(crow.x, crow.y, camX, crow.dir, crow.frame);
    }
  }

  // draw extra life pickups
  if (levelData.extraLives) {
    for (const el of levelData.extraLives) {
      if (!el.collected) drawExtraLife(el.x, el.y, camX);
    }
  }

  // draw unicorn orbs
  if (levelData.unicorns) {
    for (const u of levelData.unicorns) {
      if (!u.collected) drawUnicornOrb(u.x, u.y, camX);
    }
  }

  drawPot(levelData.potX, levelData.potY, camX);
  drawParticles(camX);

  if (state === 'playing' || state === 'dead' || state === 'levelcomplete' || state === 'gamecomplete') {
    const moving = player.vx !== 0;
    let sprite;
    if (player.flying) {
      sprite = LEP_JUMP; // flying pose
    } else if (!player.onGround) {
      sprite = LEP_JUMP;
    } else if (moving) {
      const frames = [LEP_RUN1, LEP_IDLE, LEP_RUN2, LEP_IDLE];
      sprite = frames[animFrame % 4];
    } else {
      sprite = LEP_IDLE;
    }

    // draw unicorn mount under the player while flying
    if (player.flying) {
      drawUnicornMount(player.x - camX, player.y, player.facingLeft);
    }

    drawSprite(sprite, player.x - camX, player.y, 2, player.facingLeft);

    // unicorn countdown timer above player
    if (player.flying) {
      drawUnicornTimer(player.x - camX + player.w/2, player.y - 16, player.unicornTimer, UNICORN_DURATION);
    }
  }

  drawHUD();

  if (state === 'title')         drawTitleScreen();
  if (state === 'levelselect')   drawLevelSelectScreen();
  if (state === 'dead')          drawDeadScreen();
  if (state === 'gameover')      drawGameOverScreen();
  if (state === 'levelcomplete') drawLevelCompleteScreen();
  if (state === 'gamecomplete')  drawGameCompleteScreen();
}

// ─────────────────────────────────────────────
//  GAME LOOP
// ─────────────────────────────────────────────
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// ─────────────────────────────────────────────
//  BOOT
// ─────────────────────────────────────────────
initGame();
loop();
</script>
