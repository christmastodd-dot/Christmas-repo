<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
<title>Stitch Pet Simulator</title>
<link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Stitch Pet">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
<style>
  :root {
    --bg: #1a1a2e;
    --panel: #16213e;
    --border: #0f3460;
    --accent: #e94560;
    --text: #eee;
    --dim: #888;
    --green: #4ecca3;
    --yellow: #f0c040;
    --red: #e94560;
    --blue: #53a8e2;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier New', monospace;
    height: 100%;
    overflow: hidden;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px 16px;
  }
  h1 { color: var(--accent); font-size: 1.4em; margin-bottom: 4px; text-align: center; }

  /* Welcome screen */
  #welcome {
    background: var(--panel);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    max-width: 480px;
    width: 100%;
    text-align: center;
    max-height: 100%;
    overflow-y: auto;
  }
  #welcome .egg-welcome { margin: 12px auto; max-height: 30vh; }
  #welcome .egg-welcome svg { max-height: 30vh; }
  #welcome .desc { color: var(--dim); font-size: 0.85em; margin-bottom: 10px; line-height: 1.4; }
  #welcome input {
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); padding: 10px 16px; font-family: inherit; font-size: 1em;
    width: 100%; max-width: 260px; margin: 8px 0; text-align: center;
  }
  #welcome input:focus { outline: none; border-color: var(--accent); }
  #welcome button {
    background: var(--accent); border: none; border-radius: 6px; color: #fff;
    padding: 12px 32px; font-family: inherit; font-size: 1em; cursor: pointer; margin-top: 8px;
  }
  #welcome button:hover { opacity: 0.85; }

  /* Game screen */
  #game {
    max-width: 520px; width: 100%;
    flex: 1; overflow-y: auto; overflow-x: hidden;
    flex-direction: column;
  }
  #game.hidden { display: none; }
  #game.active { display: flex; }

  .header { text-align: center; padding: 4px 0; flex-shrink: 0; }
  .header .name { font-size: 1.1em; color: var(--green); }
  .header .info { color: var(--dim); font-size: 0.8em; margin-top: 2px; }

  .art-box {
    background: var(--panel); border: 2px solid var(--border); border-radius: 10px;
    padding: 8px; margin: 4px 0; text-align: center;
    min-height: 80px; display: flex; align-items: center; justify-content: center;
    flex: 1 1 auto; overflow: hidden; position: relative;
  }
  .art-box svg { transition: all 0.3s ease; width: 100%; height: 100%; object-fit: contain; }

  /* When keyboard is open (viewport shrinks), collapse the sprite */
  @media (max-height: 500px) {
    .art-box { min-height: 50px; max-height: 80px; padding: 4px; margin: 2px 0; }
    .art-box svg { max-height: 70px; }
    .header { padding: 2px 0; }
    .header .name { font-size: 0.9em; }
    .progress-section { margin: 4px 0; }
    .stats-row { margin: 4px 0; font-size: 0.75em; }
    .question-box { padding: 10px; margin: 4px 0; }
    .question-text { font-size: 1.2em; margin-bottom: 8px; }
    .message-box { padding: 4px 8px; margin: 4px 0; min-height: 24px; font-size: 0.85em; }
  }

  /* Bounce animation for happy mood */
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  .art-box.mood-happy svg { animation: bounce 1s ease-in-out infinite; }

  /* Wobble for egg */
  @keyframes wobble {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(3deg); }
    75% { transform: rotate(-3deg); }
  }
  .art-box.mood-egg svg { animation: wobble 2s ease-in-out infinite; }

  /* Sad droop */
  @keyframes droop {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(3px) rotate(-2deg); }
  }
  .art-box.mood-sad svg { animation: droop 3s ease-in-out infinite; }

  /* Hungry — eager bounce, faster than happy */
  @keyframes hungryBounce {
    0%, 100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
    60% { transform: translateY(0); }
    80% { transform: translateY(-3px); }
  }
  .art-box.mood-hungry svg { animation: hungryBounce 1.2s ease-in-out infinite; }

  /* Sleepy — slow sway/nod */
  @keyframes sleepySway {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    25% { transform: translateY(2px) rotate(-2deg); }
    75% { transform: translateY(3px) rotate(2deg); }
  }
  .art-box.mood-sleepy svg { animation: sleepySway 3s ease-in-out infinite; }

  /* Bored — completely still, no animation */
  .art-box.mood-bored svg { animation: none; }

  /* Sleeping — gentle breathing rise/fall */
  @keyframes sleepBreathe {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(2px) scale(1.01); }
  }
  .art-box.mood-sleeping svg { animation: sleepBreathe 3s ease-in-out infinite; }

  /* Reaction animation — excited bouncing when item used or care given */
  @keyframes reaction-jump {
    0% { transform: translateY(0) scale(1); }
    5% { transform: translateY(-15px) scale(1.05); }
    10% { transform: translateY(0) scale(0.97); }
    15% { transform: translateY(-12px) scale(1.04); }
    20% { transform: translateY(0) scale(0.98); }
    28% { transform: translateY(-10px) scale(1.03); }
    36% { transform: translateY(0) scale(0.98); }
    44% { transform: translateY(-8px) scale(1.02); }
    52% { transform: translateY(0) scale(0.99); }
    62% { transform: translateY(-5px) scale(1.01); }
    72% { transform: translateY(0) scale(1); }
    82% { transform: translateY(-2px) scale(1.005); }
    100% { transform: translateY(0) scale(1); }
  }
  .art-box.reacting svg { animation: reaction-jump 3s ease-out !important; }

  /* Sparkle particles */
  .sparkle {
    position: absolute;
    font-size: 1.2em;
    pointer-events: none;
    animation: sparkle-float 1.5s ease-out forwards;
  }
  @keyframes sparkle-float {
    0% { opacity: 1; transform: translate(0, 0) scale(0.5); }
    40% { opacity: 1; transform: translate(var(--dx), var(--dy)) scale(1.2); }
    100% { opacity: 0; transform: translate(var(--dx), calc(var(--dy) - 30px)) scale(0.3); }
  }

  /* Mood label */
  .mood-label {
    text-align: center; font-size: 0.8em; margin: 2px 0; flex-shrink: 0;
    min-height: 1.2em;
  }
  .mood-label.m-happy { color: var(--green); }
  .mood-label.m-neutral { color: var(--dim); }
  .mood-label.m-hungry { color: var(--yellow); }
  .mood-label.m-sleepy { color: var(--blue); }
  .mood-label.m-bored { color: var(--dim); }
  .mood-label.m-sleeping { color: var(--blue); }
  .mood-label.m-egg { color: var(--dim); }
  .mood-label.collapsed { max-height: 0; overflow: hidden; opacity: 0; margin: 0;
    transition: max-height 0.3s ease, opacity 0.3s ease; }

  /* Evolution progress bar */
  .progress-section { margin: 6px 0; flex-shrink: 0; }
  .progress-label {
    display: flex; justify-content: space-between; font-size: 0.85em;
    color: var(--dim); margin-bottom: 4px;
  }
  .progress-bar-bg {
    height: 20px; background: #0d1b2a; border-radius: 6px; overflow: hidden;
    position: relative;
  }
  .progress-bar-fill {
    height: 100%; background: linear-gradient(90deg, var(--blue), var(--green));
    border-radius: 6px; transition: width 0.4s ease;
  }
  .progress-bar-text {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75em; color: var(--text); font-weight: bold;
  }

  /* Stats row */
  .stats-row {
    display: flex; justify-content: space-around; margin: 6px 0;
    font-size: 0.85em; text-align: center; flex-shrink: 0;
    transition: max-height 0.3s ease, opacity 0.3s ease;
    max-height: 60px; overflow: hidden;
  }
  .stats-row.collapsed { max-height: 0; opacity: 0; margin: 0; }
  .stat-item .stat-val { font-size: 1.3em; font-weight: bold; }
  .stat-item .stat-label { color: var(--dim); font-size: 0.8em; }
  .stat-correct .stat-val { color: var(--green); }
  .stat-wrong .stat-val { color: var(--red); }
  .stat-streak .stat-val { color: var(--yellow); }
  .stat-best .stat-val { color: var(--blue); }

  /* Care section */
  .care-section {
    margin: 6px 0; flex-shrink: 0;
    transition: max-height 0.3s ease, opacity 0.3s ease;
    max-height: 200px; overflow: hidden;
  }
  .care-section.hidden { display: none; }
  .care-section.collapsed { max-height: 0; opacity: 0; margin: 0; }

  .care-bars {
    display: grid; grid-template-columns: 1fr 1fr; gap: 4px 12px;
    margin-bottom: 8px;
  }
  .care-bar {
    display: flex; align-items: center; gap: 6px; font-size: 0.8em;
  }
  .care-bar .care-icon { width: 18px; text-align: center; flex-shrink: 0; }
  .care-bar .care-track {
    flex: 1; height: 10px; background: #0d1b2a; border-radius: 5px;
    overflow: hidden;
  }
  .care-bar .care-fill {
    height: 100%; border-radius: 5px; transition: width 0.4s ease, background 0.4s;
  }
  .care-fill.high { background: var(--green); }
  .care-fill.mid  { background: var(--yellow); }
  .care-fill.low  { background: var(--red); }

  .care-buttons {
    display: flex; gap: 6px; justify-content: center;
  }
  .care-btn {
    background: var(--panel); border: 2px solid var(--border); border-radius: 8px;
    color: var(--text); padding: 8px 14px; font-family: inherit; font-size: 0.85em;
    cursor: pointer; transition: all 0.2s; flex: 1; max-width: 100px; text-align: center;
  }
  .care-btn:active { transform: scale(0.95); }
  .care-btn:hover { border-color: var(--accent); background: #1a2844; }
  .care-btn .care-btn-icon { font-size: 1.2em; display: block; margin-bottom: 2px; }

  @media (max-height: 500px) {
    .care-bars { gap: 2px 8px; margin-bottom: 4px; }
    .care-bar .care-track { height: 7px; }
    .care-btn { padding: 4px 8px; font-size: 0.75em; }
    .care-btn .care-btn-icon { font-size: 1em; }
  }

  /* Coins display */
  .coins-display {
    text-align: center; font-size: 0.9em; color: var(--yellow);
    margin: 2px 0; flex-shrink: 0;
  }

  /* Shop toggle */
  .shop-toggle {
    background: var(--panel); border: 2px solid var(--border); border-radius: 8px;
    color: var(--yellow); padding: 6px 16px; font-family: inherit; font-size: 0.85em;
    cursor: pointer; display: block; width: 100%; text-align: center;
    margin: 4px 0; flex-shrink: 0;
  }
  .shop-toggle:hover { border-color: var(--yellow); }

  /* Shop panel */
  .shop-panel {
    max-height: 0; overflow: hidden; transition: max-height 0.3s ease;
    flex-shrink: 0;
  }
  .shop-panel.open { max-height: 500px; }
  .shop-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
    padding: 8px 0;
  }
  .shop-item {
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    padding: 8px; text-align: center; cursor: pointer; transition: all 0.2s;
  }
  .shop-item:hover { border-color: var(--yellow); }
  .shop-item:active { transform: scale(0.97); }
  .shop-item.cant-afford { opacity: 0.4; }
  .shop-item .si-icon { font-size: 1.4em; }
  .shop-item .si-name { font-size: 0.8em; margin: 2px 0; }
  .shop-item .si-desc { font-size: 0.7em; color: var(--dim); }
  .shop-item .si-cost { font-size: 0.8em; color: var(--yellow); margin-top: 2px; }

  /* Inventory */
  .inv-row {
    display: flex; gap: 6px; justify-content: center; flex-wrap: wrap;
    padding: 4px 0; flex-shrink: 0;
  }
  .inv-btn {
    background: var(--panel); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); padding: 4px 10px; font-family: inherit; font-size: 0.8em;
    cursor: pointer; transition: all 0.2s;
  }
  .inv-btn:hover { border-color: var(--green); }
  .inv-btn:active { transform: scale(0.95); }

  .shop-section { flex-shrink: 0; }
  .shop-section.hidden { display: none; }
  .shop-section.collapsed { max-height: 0; overflow: hidden; opacity: 0; margin: 0;
    transition: max-height 0.3s ease, opacity 0.3s ease; }

  /* Tricks section */
  .tricks-section { flex-shrink: 0; }
  .tricks-section.hidden { display: none; }
  .tricks-section.collapsed { max-height: 0; overflow: hidden; opacity: 0; margin: 0;
    transition: max-height 0.3s ease, opacity 0.3s ease; }
  .tricks-row {
    display: flex; gap: 6px; justify-content: center; flex-wrap: wrap;
    padding: 4px 0;
  }
  .trick-btn {
    background: var(--panel); border: 2px solid var(--border); border-radius: 8px;
    color: var(--text); padding: 6px 12px; font-family: inherit; font-size: 0.8em;
    cursor: pointer; transition: all 0.2s; text-align: center;
  }
  .trick-btn:hover { border-color: var(--green); background: #1a2844; }
  .trick-btn:active { transform: scale(0.95); }
  .trick-btn .trick-icon { font-size: 1.2em; display: block; margin-bottom: 2px; }
  .tricks-label {
    text-align: center; font-size: 0.75em; color: var(--dim); margin: 4px 0 0;
  }
  .trick-next {
    text-align: center; font-size: 0.7em; color: var(--dim); margin-top: 2px; font-style: italic;
  }

  /* Trick animations on sprite */
  @keyframes trick-dance {
    0%   { transform: translateX(0) translateY(0) rotate(0deg) scale(1); }
    4%   { transform: translateX(-18px) translateY(-12px) rotate(-12deg) scale(1.05); }
    8%   { transform: translateX(0) translateY(0) rotate(0deg) scale(0.95); }
    12%  { transform: translateX(18px) translateY(-12px) rotate(12deg) scale(1.05); }
    16%  { transform: translateX(0) translateY(0) rotate(0deg) scale(0.95); }
    20%  { transform: translateX(-22px) translateY(-18px) rotate(-15deg) scale(1.08); }
    24%  { transform: translateX(0) translateY(0) rotate(0deg) scale(0.93); }
    28%  { transform: translateX(22px) translateY(-18px) rotate(15deg) scale(1.08); }
    32%  { transform: translateX(0) translateY(0) rotate(0deg) scale(0.93); }
    36%  { transform: translateX(0) translateY(-25px) rotate(0deg) scale(1.1); }
    40%  { transform: translateX(0) translateY(0) rotate(0deg) scale(0.9); }
    44%  { transform: translateX(0) translateY(-20px) rotate(0deg) scale(1.08); }
    48%  { transform: translateX(0) translateY(0) rotate(0deg) scale(0.92); }
    52%  { transform: translateX(-15px) translateY(-10px) rotate(-10deg) scale(1.04); }
    56%  { transform: translateX(15px) translateY(-10px) rotate(10deg) scale(1.04); }
    60%  { transform: translateX(-15px) translateY(-10px) rotate(-10deg) scale(1.04); }
    64%  { transform: translateX(15px) translateY(-10px) rotate(10deg) scale(1.04); }
    70%  { transform: translateX(0) translateY(-22px) rotate(360deg) scale(1.06); }
    76%  { transform: translateX(0) translateY(0) rotate(360deg) scale(0.94); }
    80%  { transform: translateX(-10px) translateY(-8px) rotate(352deg) scale(1.02); }
    84%  { transform: translateX(10px) translateY(-8px) rotate(368deg) scale(1.02); }
    88%  { transform: translateX(-6px) translateY(-4px) rotate(356deg) scale(1.01); }
    92%  { transform: translateX(6px) translateY(-4px) rotate(364deg) scale(1.01); }
    96%  { transform: translateX(0) translateY(-2px) rotate(360deg) scale(1); }
    100% { transform: translateX(0) translateY(0) rotate(360deg) scale(1); }
  }
  @keyframes trick-flip {
    0%   { transform: translateY(0) rotateY(0deg) scale(1); }
    15%  { transform: translateY(-20px) rotateY(0deg) scale(1.05); }
    30%  { transform: translateY(-30px) rotateY(180deg) scale(1.1); }
    45%  { transform: translateY(-10px) rotateY(360deg) scale(1); }
    50%  { transform: translateY(0) rotateY(360deg) scale(0.92); }
    55%  { transform: translateY(-5px) rotateY(360deg) scale(1.02); }
    60%  { transform: translateY(0) rotateY(360deg) scale(1); }
    70%  { transform: translateY(-25px) rotateY(360deg) scale(1.08); }
    82%  { transform: translateY(-35px) rotateY(540deg) scale(1.12); }
    90%  { transform: translateY(-8px) rotateY(720deg) scale(1); }
    94%  { transform: translateY(0) rotateY(720deg) scale(0.94); }
    97%  { transform: translateY(-3px) rotateY(720deg) scale(1.01); }
    100% { transform: translateY(0) rotateY(720deg) scale(1); }
  }
  @keyframes trick-sing {
    0%   { transform: scale(1) rotate(0deg); }
    5%   { transform: scale(1.08) rotate(-3deg); }
    10%  { transform: scale(0.95) rotate(3deg); }
    15%  { transform: scale(1.1) rotate(-3deg); }
    20%  { transform: scale(0.94) rotate(2deg); }
    25%  { transform: scale(1.12) rotate(-4deg); }
    30%  { transform: scale(0.93) rotate(3deg); }
    35%  { transform: scale(1.12) rotate(-3deg); }
    40%  { transform: scale(0.94) rotate(2deg); }
    48%  { transform: scale(1.08) rotate(0deg); }
    52%  { transform: scale(0.96) rotate(0deg); }
    56%  { transform: scale(1.1) rotate(-2deg); }
    60%  { transform: scale(0.95) rotate(2deg); }
    64%  { transform: scale(1.08) rotate(-2deg); }
    68%  { transform: scale(0.96) rotate(2deg); }
    72%  { transform: scale(1.06) rotate(-1deg); }
    78%  { transform: scale(1.04) rotate(1deg); }
    84%  { transform: scale(1.02) rotate(-1deg); }
    90%  { transform: scale(1.01) rotate(0deg); }
    100% { transform: scale(1) rotate(0deg); }
  }
  @keyframes trick-juggle {
    0%   { transform: translateY(0) translateX(0) rotate(0deg); }
    6%   { transform: translateY(-18px) translateX(-8px) rotate(-8deg); }
    12%  { transform: translateY(0) translateX(0) rotate(0deg); }
    18%  { transform: translateY(-18px) translateX(8px) rotate(8deg); }
    24%  { transform: translateY(0) translateX(0) rotate(0deg); }
    30%  { transform: translateY(-22px) translateX(-10px) rotate(-10deg); }
    36%  { transform: translateY(0) translateX(0) rotate(0deg); }
    42%  { transform: translateY(-22px) translateX(10px) rotate(10deg); }
    48%  { transform: translateY(0) translateX(0) rotate(0deg); }
    54%  { transform: translateY(-20px) translateX(-8px) rotate(-8deg); }
    60%  { transform: translateY(0) translateX(0) rotate(0deg); }
    66%  { transform: translateY(-20px) translateX(8px) rotate(8deg); }
    72%  { transform: translateY(0) translateX(0) rotate(0deg); }
    78%  { transform: translateY(-12px) translateX(-5px) rotate(-5deg); }
    84%  { transform: translateY(0) translateX(0) rotate(0deg); }
    90%  { transform: translateY(-12px) translateX(5px) rotate(5deg); }
    96%  { transform: translateY(0) translateX(0) rotate(0deg); }
    100% { transform: translateY(0) translateX(0) rotate(0deg); }
  }
  @keyframes trick-fireworks {
    0%   { transform: scale(1) translateY(0); filter: brightness(1); }
    8%   { transform: scale(0.9) translateY(5px); filter: brightness(0.8); }
    16%  { transform: scale(1.2) translateY(-20px); filter: brightness(1.8); }
    22%  { transform: scale(1) translateY(0); filter: brightness(1); }
    30%  { transform: scale(0.92) translateY(3px); filter: brightness(0.85); }
    38%  { transform: scale(1.18) translateY(-18px); filter: brightness(1.7); }
    44%  { transform: scale(1) translateY(0); filter: brightness(1); }
    52%  { transform: scale(0.93) translateY(3px); filter: brightness(0.9); }
    60%  { transform: scale(1.25) translateY(-25px); filter: brightness(2); }
    68%  { transform: scale(1) translateY(0); filter: brightness(1); }
    76%  { transform: scale(1.1) translateY(-10px); filter: brightness(1.4); }
    84%  { transform: scale(1) translateY(0); filter: brightness(1); }
    90%  { transform: scale(1.05) translateY(-5px); filter: brightness(1.2); }
    100% { transform: scale(1) translateY(0); filter: brightness(1); }
  }
  .art-box.trick-dance svg { animation: trick-dance 3s ease-in-out !important; }
  .art-box.trick-flip svg { animation: trick-flip 3s ease-in-out !important; }
  .art-box.trick-sing svg { animation: trick-sing 3s ease-in-out !important; }
  .art-box.trick-juggle svg { animation: trick-juggle 3s ease-in-out !important; }
  .art-box.trick-fireworks svg { animation: trick-fireworks 3s ease-in-out !important; }

  /* Question box */
  .question-box {
    background: var(--panel); border: 2px solid var(--border); border-radius: 10px;
    padding: 16px; margin: 6px 0; text-align: center; flex-shrink: 0;
  }
  .question-text { font-size: 1.5em; color: var(--yellow); margin-bottom: 16px; }
  .answer-row { display: flex; gap: 8px; justify-content: center; }
  .answer-row input {
    background: var(--bg); border: 2px solid var(--border); border-radius: 8px;
    color: var(--text); padding: 12px 16px; font-family: inherit; font-size: 1.3em;
    width: 120px; text-align: center;
  }
  .answer-row input:focus { outline: none; border-color: var(--accent); }
  .answer-row button {
    background: var(--accent); border: none; border-radius: 8px; color: #fff;
    padding: 12px 24px; font-family: inherit; font-size: 1.1em; cursor: pointer;
  }
  .answer-row button:hover { opacity: 0.85; }

  /* Message box */
  .message-box {
    border-radius: 8px; padding: 10px 16px; margin: 8px 0;
    min-height: 36px; font-size: 0.95em; text-align: center;
    transition: all 0.3s;
  }
  .message-box.correct { background: #0a2e1a; border: 1px solid var(--green); color: var(--green); }
  .message-box.wrong { background: #2e0a1a; border: 1px solid var(--red); color: var(--red); }
  .message-box.info { background: var(--panel); border: 1px solid var(--border); color: var(--yellow); }
  .message-box.empty { background: transparent; border: 1px solid transparent; color: transparent; }

  .streak-fire {
    display: inline-block; font-size: 1.1em;
    animation: pulse 0.5s ease-in-out infinite alternate;
  }
  @keyframes pulse { from { opacity: 0.7; transform: scale(1); } to { opacity: 1; transform: scale(1.1); } }

  /* Evolution overlay */
  #evo-overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: #000; z-index: 100;
    justify-content: center; align-items: center; flex-direction: column;
    overflow: hidden;
  }
  #evo-overlay.show { display: flex; }

  .evo-text {
    color: var(--yellow); font-size: 1.4em; text-align: center;
    font-family: 'Courier New', monospace; font-weight: bold;
    opacity: 0; transition: opacity 0.4s;
    text-shadow: 0 0 10px rgba(240,192,64,0.5);
  }
  .evo-text.visible { opacity: 1; }

  .evo-stage {
    position: relative; width: 220px; height: 240px;
    display: flex; align-items: center; justify-content: center;
    margin: 16px 0;
  }
  .evo-stage .evo-old, .evo-stage .evo-new {
    position: absolute;
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.1s;
  }
  .evo-stage .evo-old svg, .evo-stage .evo-new svg {
    max-width: 100%; max-height: 100%;
  }
  .evo-stage .evo-new { opacity: 0; }

  /* White silhouette filter for morph flashing */
  .evo-silhouette svg { filter: brightness(0) invert(1) drop-shadow(0 0 12px #fff); }

  /* Glow pulse during morphing */
  .evo-stage.morphing {
    animation: evoGlow 0.4s ease-in-out infinite alternate;
  }
  @keyframes evoGlow {
    from { filter: drop-shadow(0 0 8px rgba(255,255,255,0.3)); }
    to   { filter: drop-shadow(0 0 24px rgba(255,255,255,0.9)); }
  }

  /* White flash */
  .evo-flash {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: #fff; z-index: 101; opacity: 0; pointer-events: none;
    transition: opacity 0.15s;
  }
  .evo-flash.bang { opacity: 1; }

  /* Sparkle particles */
  .evo-particle {
    position: absolute; width: 6px; height: 6px;
    border-radius: 50%; pointer-events: none;
    animation: sparkleFloat var(--dur) ease-out forwards;
  }
  @keyframes sparkleFloat {
    0%   { opacity: 1; transform: translate(0, 0) scale(1); }
    100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0); }
  }

  /* Reveal bounce for new sprite */
  .evo-reveal svg {
    animation: evoReveal 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }
  @keyframes evoReveal {
    0%   { transform: scale(0.3); opacity: 0; }
    60%  { transform: scale(1.1); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* Stars that orbit during reveal */
  .evo-stars {
    position: absolute; width: 260px; height: 260px;
    animation: evoSpin 2s linear infinite;
  }
  .evo-stars span {
    position: absolute; font-size: 1.2em;
    animation: evoTwinkle 0.8s ease-in-out infinite alternate;
  }
  .evo-stars span:nth-child(1) { top: 0; left: 50%; transform: translateX(-50%); }
  .evo-stars span:nth-child(2) { top: 50%; right: 0; transform: translateY(-50%); animation-delay: 0.2s; }
  .evo-stars span:nth-child(3) { bottom: 0; left: 50%; transform: translateX(-50%); animation-delay: 0.4s; }
  .evo-stars span:nth-child(4) { top: 50%; left: 0; transform: translateY(-50%); animation-delay: 0.6s; }
  @keyframes evoSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes evoTwinkle { from { opacity: 0.4; } to { opacity: 1; } }

  /* "B" button prompt */
  .evo-continue {
    color: var(--dim); font-size: 0.85em; margin-top: 12px;
    opacity: 0; transition: opacity 0.4s;
    cursor: pointer;
  }
  .evo-continue.visible { opacity: 1; animation: pulse 1s ease-in-out infinite alternate; }
</style>
</head>

<script>
// ── SVG Sprite Definitions ──────────────────────────────────────────

const C = {

    <text x="80" y="115" text-anchor="middle" font-size="20" fill="${C.eggSpot}" opacity="0.7">&#x2665;</text>

}

function svgBaby(mood) {
  let eyes, mouth, extras = '';

       <circle cx="92" cy="72" r="7" fill="${C.eye}"/><circle cx="92" cy="73" r="4" fill="${C.pupil}"/>
       <circle cx="56" cy="70" r="2" fill="#fff"/><circle cx="90" cy="70" r="2" fill="#fff"/>`;
    mouth = `<path d="M67 88 Q75 98 83 88" fill="none" stroke="${C.mouth}" stroke-width="2.5" stroke-linecap="round"/>`;
    extras = `<circle cx="48" cy="84" r="6" fill="${C.blush}" opacity="0.4"/><circle cx="102" cy="84" r="6" fill="${C.blush}" opacity="0.4"/>`;

  } else if (mood === 'sleepy') {

  } else if (mood === 'bored') {
    eyes = `<circle cx="58" cy="72" r="7" fill="${C.eye}"/><circle cx="60" cy="72" r="4" fill="${C.pupil}"/>
       <circle cx="92" cy="72" r="7" fill="${C.eye}"/><circle cx="94" cy="72" r="4" fill="${C.pupil}"/>
       <ellipse cx="58" cy="68" rx="9" ry="3" fill="${C.body}"/>
       <ellipse cx="92" cy="68" rx="9" ry="3" fill="${C.body}"/>`;

function svgChild(mood) {

    extras = `<circle cx="42" cy="92" r="7" fill="${C.blush}" opacity="0.35"/><circle cx="108" cy="92" r="7" fill="${C.blush}" opacity="0.35"/>`;

    mouth = `<ellipse cx="75" cy="103" rx="8" ry="10" fill="${C.mouth}" opacity="0.8"/>
       <ellipse cx="75" cy="101" rx="6" ry="5" fill="#FF6B8A"/>`;
    extras = `<circle cx="40" cy="96" r="5" fill="${C.blush}" opacity="0.3"/><circle cx="110" cy="96" r="5" fill="${C.blush}" opacity="0.3"/>`;
  } else if (mood === 'sleepy') {
    eyes = `<ellipse cx="55" cy="80" rx="9" ry="4" fill="${C.eye}"/><ellipse cx="55" cy="81" rx="5" ry="2.5" fill="${C.pupil}"/>

       <ellipse cx="95" cy="78" rx="10" ry="5" fill="${C.body}"/>`;
    mouth = `<path d="M68 99 Q75 103 82 99" fill="none" stroke="${C.mouth}" stroke-width="2" stroke-linecap="round"/>`;
    extras = `<text x="115" y="65" font-size="12" fill="${C.blue}" opacity="0.7" font-weight="bold">z</text>
       <text x="124" y="55" font-size="9" fill="${C.blue}" opacity="0.5" font-weight="bold">z</text>`;
  } else if (mood === 'bored') {
    eyes = `<circle cx="55" cy="78" r="9" fill="${C.eye}"/><circle cx="58" cy="78" r="5" fill="${C.pupil}"/>
       <circle cx="95" cy="78" r="9" fill="${C.eye}"/><circle cx="98" cy="78" r="5" fill="${C.pupil}"/>
       <ellipse cx="55" cy="73" rx="11" ry="4" fill="${C.body}"/>
       <ellipse cx="95" cy="73" rx="11" ry="4" fill="${C.body}"/>`;
    mouth = `<line x1="66" y1="101" x2="84" y2="100" stroke="${C.mouth}" stroke-width="2.5" stroke-linecap="round"/>`;
  } else if (mood === 'sleeping') {
    eyes = `<path d="M47 78 Q55 73 63 78" fill="none" stroke="${C.pupil}" stroke-width="2.5" stroke-linecap="round"/>
       <path d="M87 78 Q95 73 103 78" fill="none" stroke="${C.pupil}" stroke-width="2.5" stroke-linecap="round"/>`;
    mouth = `<path d="M68 98 Q75 103 82 98" fill="none" stroke="${C.mouth}" stroke-width="2" stroke-linecap="round"/>`;
    extras = `<text x="112" y="60" font-size="16" fill="${C.blue}" opacity="0.8" font-weight="bold">Z</text>
       <text x="124" y="46" font-size="12" fill="${C.blue}" opacity="0.6" font-weight="bold">Z</text>
       <text x="132" y="36" font-size="9" fill="${C.blue}" opacity="0.4" font-weight="bold">Z</text>`;
  } else {
    eyes = `<circle cx="55" cy="78" r="9" fill="${C.eye}"/><circle cx="55" cy="78" r="5" fill="${C.pupil}"/>
       <circle cx="95" cy="78" r="9" fill="${C.eye}"/><circle cx="95" cy="78" r="5" fill="${C.pupil}"/>`;
    mouth = `<line x1="66" y1="100" x2="84" y2="100" stroke="${C.mouth}" stroke-width="2.5" stroke-linecap="round"/>`;
  }
  const blush = extras;

  return `<svg viewBox="-5 -10 190 225" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="90" cy="198" rx="42" ry="8" fill="#0005"/>
    <!-- Ears (bigger) -->
    <ellipse cx="30" cy="48" rx="22" ry="38" fill="${C.body}" transform="rotate(-20 30 48)"/>
    <ellipse cx="30" cy="48" rx="15" ry="28" fill="${C.earInner}" transform="rotate(-20 30 48)"/>
    <ellipse cx="150" cy="48" rx="22" ry="38" fill="${C.body}" transform="rotate(20 150 48)"/>
    <ellipse cx="150" cy="48" rx="15" ry="28" fill="${C.earInner}" transform="rotate(20 150 48)"/>
    <!-- Head + body -->
    <ellipse cx="90" cy="80" rx="45" ry="40" fill="${C.body}"/>
    <ellipse cx="90" cy="130" rx="42" ry="55" fill="${C.body}"/>
    <!-- Belly -->
    <ellipse cx="90" cy="135" rx="28" ry="38" fill="${C.belly}"/>
    ${eyes}
    <ellipse cx="75" cy="90" rx="5" ry="3.5" fill="${C.nose}"/>
    ${mouth}

// ── Sprite lookup ───────────────────────────────────────────────────

function getSprite(stage, mood) {
  if (stage === 'egg') return svgEgg();
  if (stage === 'baby') return svgBaby(mood);
  if (stage === 'child') return svgChild(mood);
  if (stage === 'teen') return svgTeen(mood);
  if (stage === 'adult') return svgAdult(mood);
  return svgEgg();
}

// ── Show welcome egg ────────────────────────────────────────────────
document.getElementById('welcome-egg').innerHTML = svgEgg();

// ── Socket logic ────────────────────────────────────────────────────

const socket = io({
  reconnection: true,
  reconnectionAttempts: 10,
  reconnectionDelay: 1000,
});
let lastCorrect = null;

socket.on('connect', () => {
  console.log('Socket connected:', socket.id);
});
socket.on('connect_error', (err) => {
  console.error('Socket connect error:', err.message);
});
socket.on('disconnect', (reason) => {
  console.warn('Socket disconnected:', reason);
  const msgEl = document.getElementById('g-message');
  if (msgEl) {
    msgEl.textContent = 'Connection lost — reconnecting...';
    msgEl.className = 'message-box wrong';
  }
});
socket.on('no_game', () => {
  // Server lost our session — try to reload from save, else show welcome
  const save = localStorage.getItem('stitch_save');
  if (save) {
    try {
      socket.emit('load_game', {save: JSON.parse(save)});
      return;
    } catch(e) {}
  }
  document.getElementById('game').classList.add('hidden');
  document.getElementById('game').classList.remove('active');
  document.getElementById('welcome').style.display = '';
});

// Save to localStorage whenever server sends save data
socket.on('save', data => {
  localStorage.setItem('stitch_save', JSON.stringify(data));
});

function enterGame() {
  document.getElementById('welcome').style.display = 'none';
  document.getElementById('game').classList.remove('hidden');
  document.getElementById('game').classList.add('active');
}

function startGame() {
  const name = document.getElementById('pet-name').value.trim();
  localStorage.removeItem('stitch_save');
  socket.emit('new_game', {name});
  enterGame();
}

function continueGame() {
  const save = localStorage.getItem('stitch_save');
  if (save) {
    socket.emit('load_game', {save: JSON.parse(save)});
    enterGame();
  }
}

function showNewGame() {
  document.getElementById('continue-section').style.display = 'none';
  document.getElementById('new-game-section').style.display = '';
  document.getElementById('pet-name').focus();
}

document.getElementById('pet-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') startGame();
});

// On load, check for existing save
(function checkSave() {
  const save = localStorage.getItem('stitch_save');
  if (save) {
    try {
      const data = JSON.parse(save);
      const labels = {egg:'Egg',baby:'Baby',child:'Child',teen:'Teen',adult:'Adult'};
      const stage = labels[data.stage] || data.stage;
      document.getElementById('continue-info').textContent =
        `${data.name} the ${stage} is waiting for you!`;
      document.getElementById('continue-section').style.display = '';
      document.getElementById('new-game-section').style.display = 'none';
    } catch(e) {
      localStorage.removeItem('stitch_save');
    }
  }
})();

socket.on('state', state => {
  document.getElementById('g-name').textContent = `~ ${state.name} the ${state.species} ~`;
  document.getElementById('g-info').textContent = `Stage: ${state.stage_label}`;

  // Sprite
  const artBox = document.getElementById('art-box');
  artBox.innerHTML = getSprite(state.stage, state.mood);
  artBox.className = 'art-box mood-' + state.mood;

  // Mood label
  const moodLabel = document.getElementById('mood-label');
  const moodTexts = {
    egg: '', happy: 'Feeling great!', neutral: '',
    hungry: 'Hungry...', sleepy: 'Sleepy... zzz', bored: 'Bored...',
    sleeping: 'Sleeping... ZZZ'
  };
  moodLabel.textContent = moodTexts[state.mood] || '';
  moodLabel.className = 'mood-label m-' + state.mood;

  // Progress
  if (state.is_final_stage) {
    const learned = (state.tricks_learned || []).length;
    const nextTrick = state.next_trick;
    if (nextTrick) {
      const pct = Math.min(100, Math.floor((state.stage_correct / nextTrick.unlock_at) * 100));
      document.getElementById('progress-label-left').textContent = `Next: ${nextTrick.icon} ${nextTrick.label}`;
      document.getElementById('progress-label-right').textContent = `${state.stage_correct} / ${nextTrick.unlock_at}`;
      document.getElementById('progress-fill').style.width = pct + '%';
      document.getElementById('progress-text').textContent = pct + '%';
    } else {
      document.getElementById('progress-label-left').textContent = 'All tricks learned!';
      document.getElementById('progress-label-right').textContent = `${state.total_correct} total`;
      document.getElementById('progress-fill').style.width = '100%';
      document.getElementById('progress-text').textContent = '\u2B50';
    }
  } else {
    const labels = {egg:'Egg',baby:'Baby',child:'Child',teen:'Teen',adult:'Adult'};
    const stages = ['egg','baby','child','teen','adult'];
    const idx = stages.indexOf(state.stage);
    const nextLabel = idx + 1 < stages.length ? labels[stages[idx + 1]] : '???';
    document.getElementById('progress-label-left').textContent = `${state.stage_label} \u2192 ${nextLabel}`;
    document.getElementById('progress-label-right').textContent = `${state.stage_correct} / ${state.stage_needed}`;
    document.getElementById('progress-fill').style.width = state.progress_pct + '%';
    document.getElementById('progress-text').textContent = state.progress_pct + '%';
  }

  document.getElementById('s-correct').textContent = state.total_correct;
  document.getElementById('s-wrong').textContent = state.total_wrong;
  let streakHtml = String(state.streak);
  if (state.streak >= 5) streakHtml += ' <span class="streak-fire">&#x1F525;</span>';
  document.getElementById('s-streak').innerHTML = streakHtml;
  document.getElementById('s-best').textContent = state.best_streak;

  // Care stats
  const careSection = document.getElementById('care-section');
  const shopSection = document.getElementById('shop-section');
  if (state.is_egg) {
    careSection.classList.add('hidden');
    shopSection.classList.add('hidden');
  } else {
    careSection.classList.remove('hidden');
    shopSection.classList.remove('hidden');
    const stats = state.stats;
    for (const key of ['hunger', 'happiness', 'hygiene', 'energy']) {
      const bar = document.getElementById('bar-' + key);
      const val = stats[key];
      bar.style.width = val + '%';
      bar.className = 'care-fill ' + (val >= 60 ? 'high' : val >= 30 ? 'mid' : 'low');
    }
  }

  // Shop & Inventory
  currentCoins = state.coins || 0;
  document.getElementById('coins-display').textContent = '\uD83E\uDE99 ' + currentCoins + ' coins';
  renderShop();
  renderInventory(state.inventory);
  renderTricks(state);

  const msgEl = document.getElementById('g-message');
  if (state.message) {
    msgEl.textContent = state.message;
    if (lastCorrect === true) msgEl.className = 'message-box correct';
    else if (lastCorrect === false) msgEl.className = 'message-box wrong';
    else msgEl.className = 'message-box info';
  }

  document.getElementById('g-question').textContent = state.question;
});

function doCare(action) {
  lastCorrect = null;  // care messages use 'info' style
  socket.emit('care', {action});
  if (action === 'clean') playReaction();
}

// ── Shop & Inventory ────────────────────────────────────────────────

const SHOP_ITEMS = {
  pizza:     {label:"Pizza",         icon:"\uD83C\uDF55", cost:3,  desc:"+50 hunger"},
  cake:      {label:"Birthday Cake", icon:"\uD83C\uDF82", cost:5,  desc:"+40 hunger, +20 happy"},
  ball:      {label:"Beach Ball",    icon:"\uD83C\uDFD6\uFE0F", cost:3,  desc:"+50 happiness"},
  ukulele:   {label:"Ukulele",       icon:"\uD83E\uDE95", cost:6,  desc:"+40 happy, +20 energy"},
  soap:      {label:"Bubble Bath",   icon:"\uD83D\uDEC1", cost:3,  desc:"+50 hygiene"},
  blanket:   {label:"Cozy Blanket",  icon:"\uD83C\uDF19", cost:4,  desc:"+50 energy"},
  superfood: {label:"Super Smoothie",icon:"\uD83E\uDD66", cost:10, desc:"+30 all stats"},
};

let shopOpen = false;
let currentCoins = 0;

function toggleShop() {
  shopOpen = !shopOpen;
  const panel = document.getElementById('shop-panel');
  const btn = document.getElementById('shop-toggle');
  panel.classList.toggle('open', shopOpen);
  btn.textContent = shopOpen ? 'Close Shop' : 'Shop';
}

function renderShop() {
  const grid = document.getElementById('shop-grid');
  grid.innerHTML = '';
  for (const [id, item] of Object.entries(SHOP_ITEMS)) {
    const canAfford = currentCoins >= item.cost;
    const div = document.createElement('div');
    div.className = 'shop-item' + (canAfford ? '' : ' cant-afford');
    div.innerHTML = `<div class="si-icon">${item.icon}</div>` +
      `<div class="si-name">${item.label}</div>` +
      `<div class="si-desc">${item.desc}</div>` +
      `<div class="si-cost">\uD83E\uDE99 ${item.cost}</div>`;
    div.onclick = () => { if (canAfford) buyItem(id); };
    grid.appendChild(div);
  }
}

function renderInventory(inventory) {
  const row = document.getElementById('inv-row');
  row.innerHTML = '';
  for (const [id, qty] of Object.entries(inventory || {})) {
    if (qty <= 0) continue;
    const item = SHOP_ITEMS[id];
    if (!item) continue;
    const btn = document.createElement('button');
    btn.className = 'inv-btn';
    btn.innerHTML = `${item.icon} ${item.label} x${qty}`;
    btn.onclick = () => useItem(id);
    row.appendChild(btn);
  }
}

function buyItem(itemId) {
  lastCorrect = null;
  socket.emit('buy', {item: itemId});
}

function useItem(itemId) {
  lastCorrect = null;
  socket.emit('use_item', {item: itemId});
  playReaction();
}

function playReaction() {
  const artBox = document.getElementById('art-box');

  // Sparkle particles
  const sparkles = ['\u2728', '\u2B50', '\uD83D\uDCAB', '\u2764\uFE0F'];
  for (let i = 0; i < 5; i++) {
    const sp = document.createElement('span');
    sp.className = 'sparkle';
    sp.textContent = sparkles[Math.floor(Math.random() * sparkles.length)];
    const dx = (Math.random() - 0.5) * 80;
    const dy = -(Math.random() * 40 + 10);
    sp.style.setProperty('--dx', dx + 'px');
    sp.style.setProperty('--dy', dy + 'px');
    sp.style.left = (50 + (Math.random() - 0.5) * 40) + '%';
    sp.style.top = (30 + Math.random() * 30) + '%';
    artBox.appendChild(sp);
    const delay = Math.random() * 800;
    sp.style.animationDelay = delay + 'ms';
    setTimeout(() => sp.remove(), 2400 + delay);
  }

  // Jump animation
  artBox.classList.add('reacting');
  setTimeout(() => artBox.classList.remove('reacting'), 3100);
}

// ── Tricks ─────────────────────────────────────────────────────────

function renderTricks(state) {
  const section = document.getElementById('tricks-section');
  const row = document.getElementById('tricks-row');
  const nextEl = document.getElementById('trick-next');

  const tricks = state.tricks_available || [];
  const nextTrick = state.next_trick;

  // Only show tricks section at final stage with at least one trick or progress toward one
  if (!state.is_final_stage || (tricks.length === 0 && !nextTrick)) {
    section.classList.add('hidden');
    return;
  }

  section.classList.remove('hidden');
  row.innerHTML = '';

  for (const trick of tricks) {
    const btn = document.createElement('button');
    btn.className = 'trick-btn';
    btn.innerHTML = `<span class="trick-icon">${trick.icon}</span>${trick.label}`;
    btn.onclick = () => doTrick(trick.id);
    row.appendChild(btn);
  }

  if (nextTrick) {
    nextEl.textContent = `Next trick at ${nextTrick.unlock_at} questions: ${nextTrick.icon} ${nextTrick.label}`;
  } else {
    nextEl.textContent = 'All tricks learned!';
  }
}

function doTrick(trickId) {
  socket.emit('do_trick', {trick: trickId});
}

let trickAnimating = false;

function playTrickAnimation(trickId) {
  if (trickAnimating) return;
  trickAnimating = true;
  const artBox = document.getElementById('art-box');
  const cls = 'trick-' + trickId;
  artBox.classList.add(cls);

  // Spawn thematic particles in waves throughout the animation
  const particles = {
    dance: ['\uD83D\uDD7A', '\uD83C\uDFB6', '\uD83D\uDCAB', '\u2728', '\uD83D\uDC83'],
    flip: ['\uD83C\uDF1F', '\u2B50', '\u2728', '\uD83D\uDCAB', '\uD83C\uDF20'],
    sing: ['\uD83C\uDFB5', '\uD83C\uDFB6', '\u266A', '\u266B', '\uD83C\uDFA4'],
    juggle: ['\uD83C\uDF4E', '\uD83C\uDF4A', '\uD83D\uDD35', '\uD83D\uDFE1', '\u2B50'],
    fireworks: ['\uD83C\uDF86', '\uD83C\uDF87', '\u2728', '\uD83C\uDF1F', '\u2B50', '\uD83D\uDCA5'],
  };
  const emojis = particles[trickId] || ['\u2728'];

  function spawnWave(count, baseDelay) {
    for (let i = 0; i < count; i++) {
      const sp = document.createElement('span');
      sp.className = 'sparkle';
      sp.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      const dx = (Math.random() - 0.5) * 120;
      const dy = -(Math.random() * 60 + 15);
      sp.style.setProperty('--dx', dx + 'px');
      sp.style.setProperty('--dy', dy + 'px');
      sp.style.left = (50 + (Math.random() - 0.5) * 60) + '%';
      sp.style.top = (15 + Math.random() * 50) + '%';
      const delay = baseDelay + Math.random() * 300;
      sp.style.animationDelay = delay + 'ms';
      artBox.appendChild(sp);
      setTimeout(() => sp.remove(), 2000 + delay);
    }
  }

  // Three waves of particles
  spawnWave(5, 0);
  setTimeout(() => spawnWave(5, 0), 900);
  setTimeout(() => spawnWave(5, 0), 1800);

  setTimeout(() => {
    artBox.classList.remove(cls);
    trickAnimating = false;
  }, 3100);
}

socket.on('play_trick', data => {
  playTrickAnimation(data.id);
});

socket.on('trick_learned', data => {
  playTrickAnimation(data.id);
});

// ── Pokemon-style evolution sequence ────────────────────────────────

let evoInProgress = false;

function spawnParticles(container, count) {
  const colors = ['#FFD700', '#FFF', '#87CEEB', '#FF69B4', '#90EE90'];
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'evo-particle';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.left = '50%';
    p.style.top = '50%';
    const angle = Math.random() * Math.PI * 2;
    const dist = 60 + Math.random() * 100;
    p.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
    p.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
    p.style.setProperty('--dur', (0.6 + Math.random() * 0.8) + 's');
    p.style.animationDelay = (Math.random() * 0.3) + 's';
    container.appendChild(p);
    setTimeout(() => p.remove(), 1500);
  }
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function playEvolution(oldStage, newStage, petName) {
  evoInProgress = true;
  document.getElementById('answer-input').blur();

  const labels = {egg:'Egg',baby:'Baby',child:'Child',teen:'Teen',adult:'Adult'};
  const overlay = document.getElementById('evo-overlay');
  const flash = document.getElementById('evo-flash');
  const textTop = document.getElementById('evo-text-top');
  const textBottom = document.getElementById('evo-text-bottom');
  const stage = document.getElementById('evo-stage');
  const oldEl = document.getElementById('evo-old');
  const newEl = document.getElementById('evo-new');
  const stars = document.getElementById('evo-stars');
  const cont = document.getElementById('evo-continue');

  // Reset everything
  textTop.className = 'evo-text';
  textBottom.className = 'evo-text';
  textTop.textContent = '';
  textBottom.textContent = '';
  oldEl.className = 'evo-old';
  newEl.className = 'evo-new';
  newEl.style.opacity = '0';
  oldEl.style.opacity = '1';
  stage.classList.remove('morphing');
  stars.style.display = 'none';
  cont.className = 'evo-continue';

  // Set sprites
  oldEl.innerHTML = getSprite(oldStage, 'happy');
  newEl.innerHTML = getSprite(newStage, 'happy');

  // Phase 1: Fade in overlay with old sprite
  overlay.classList.add('show');
  await sleep(600);

  // Phase 2: "What? [Name] is evolving!"
  const isHatch = newStage === 'baby';
  textTop.textContent = isHatch ? `What? The egg is hatching!` : `What? ${petName} is evolving!`;
  textTop.classList.add('visible');
  await sleep(1500);

  // Phase 3: Morphing — flash between old (silhouette) and new (silhouette)
  // Classic Pokemon: starts slow, speeds up
  stage.classList.add('morphing');
  oldEl.classList.add('evo-silhouette');
  newEl.classList.add('evo-silhouette');

  const morphCycles = [
    // [showNew, duration] — starts slow, speeds up
    [false, 400], [true, 400],
    [false, 350], [true, 350],
    [false, 280], [true, 280],
    [false, 200], [true, 200],
    [false, 150], [true, 150],
    [false, 100], [true, 100],
    [false, 80],  [true, 80],
    [false, 60],  [true, 60],
    [false, 50],  [true, 50],  [false, 50],  [true, 50],
    [false, 40],  [true, 40],  [false, 40],  [true, 40],
    [true, 40],   [true, 40],  [true, 40],
  ];

  for (const [showNew, dur] of morphCycles) {
    oldEl.style.opacity = showNew ? '0' : '1';
    newEl.style.opacity = showNew ? '1' : '0';
    // Spawn occasional particles during morph
    if (Math.random() < 0.3) spawnParticles(stage, 3);
    await sleep(dur);
  }

  stage.classList.remove('morphing');

  // Phase 4: White flash
  flash.classList.add('bang');
  await sleep(200);
  flash.classList.remove('bang');

  // Phase 5: Reveal new sprite (no silhouette, with bounce)
  oldEl.style.opacity = '0';
  newEl.style.opacity = '1';
  oldEl.classList.remove('evo-silhouette');
  newEl.classList.remove('evo-silhouette');
  newEl.classList.add('evo-reveal');
  stars.style.display = 'block';

  // Burst of particles
  spawnParticles(stage, 20);

  await sleep(400);

  // Phase 6: Show congratulation text
  textTop.textContent = isHatch
    ? `${petName} hatched from the egg!`
    : `Congratulations!`;
  textBottom.textContent = isHatch
    ? `Welcome to the world!`
    : `${petName} evolved into ${labels[newStage]}!`;
  textBottom.classList.add('visible');

  // More particles over time
  await sleep(600);
  spawnParticles(stage, 12);

  await sleep(800);
  cont.classList.add('visible');

  // Wait for tap/click/key to dismiss
  await new Promise(resolve => {
    function dismiss() {
      overlay.removeEventListener('click', dismiss);
      document.removeEventListener('keydown', dismiss);
      resolve();
    }
    overlay.addEventListener('click', dismiss);
    document.addEventListener('keydown', dismiss);
  });

  // Phase 7: Fade out and return to base screen
  overlay.classList.remove('show');
  stars.style.display = 'none';
  evoInProgress = false;
  exitAnsweringMode();
}

socket.on('evolution', data => {
  const petName = document.getElementById('g-name').textContent.replace(/^~\s*/, '').replace(/\s*the.*$/, '') || 'Your pet';
  playEvolution(data.old, data.new, petName);
});

function submitAnswer() {
  const inp = document.getElementById('answer-input');
  const val = inp.value.trim();
  if (!val) return;
  const questionText = document.getElementById('g-question').textContent;
  try {
    const m = questionText.match(/^(\d+)\s*([+\-x\/])\s*(\d+)\s*=\s*\?$/);
    if (m) {
      const a = parseInt(m[1]), op = m[2], b = parseInt(m[3]);
      const correct = op === '+' ? a + b : op === '-' ? a - b : op === 'x' ? a * b : Math.floor(a / b);
      lastCorrect = parseInt(val) === correct;
    } else { lastCorrect = null; }
  } catch(e) { lastCorrect = null; }
  socket.emit('answer', {answer: val});
  inp.value = '';
  inp.focus();  // keep keyboard open for next answer
}

document.getElementById('answer-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitAnswer();
});

// ── Mobile keyboard handling ────────────────────────────────────────
const answerInput = document.getElementById('answer-input');
const questionBox = document.querySelector('.question-box');

// ── Answering mode ──────────────────────────────────────────────────
// Stay in compact mode (care/stats/shop collapsed) until user taps sprite.
let answeringMode = false;

function enterAnsweringMode() {
  if (answeringMode) return;
  answeringMode = true;
  document.getElementById('care-section').classList.add('collapsed');
  document.querySelector('.stats-row').classList.add('collapsed');
  document.getElementById('shop-section').classList.add('collapsed');
  document.getElementById('tricks-section').classList.add('collapsed');
  document.getElementById('mood-label').classList.add('collapsed');
  setTimeout(() => {
    questionBox.scrollIntoView({ behavior: 'smooth', block: 'end' });
  }, 300);
}

function exitAnsweringMode() {
  answeringMode = false;
  answerInput.blur();
  document.getElementById('care-section').classList.remove('collapsed');
  document.querySelector('.stats-row').classList.remove('collapsed');
  document.getElementById('shop-section').classList.remove('collapsed');
  document.getElementById('tricks-section').classList.remove('collapsed');
  document.getElementById('mood-label').classList.remove('collapsed');
}

// Tap input or question box → enter answering mode
answerInput.addEventListener('focus', () => enterAnsweringMode());

// Tap the sprite → exit answering mode
document.getElementById('art-box').addEventListener('click', () => {
  exitAnsweringMode();
});

// Adjust layout when mobile keyboard opens/closes (game screen only)
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => {
    // Only constrain height when game is active — leave welcome screen alone
    const gameActive = document.getElementById('game').classList.contains('active');
    if (gameActive) {
      const vh = window.visualViewport.height;
      document.documentElement.style.height = vh + 'px';
      document.body.style.height = vh + 'px';
      if (document.activeElement === answerInput) {
        setTimeout(() => {
          questionBox.scrollIntoView({ behavior: 'smooth', block: 'end' });
        }, 50);
      }
    } else {
      document.documentElement.style.height = '';
      document.body.style.height = '';
    }
  });
}
</script>
