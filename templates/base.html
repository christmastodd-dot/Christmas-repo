<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Word Adventure">
    <meta name="theme-color" content="#4F46E5">
    <link rel="apple-touch-icon" href="/static/icon.svg">
    <link rel="icon" type="image/svg+xml" href="/static/icon.svg">
    <link rel="manifest" href="/static/manifest.json">
    <title>{% block title %}English Word Adventure{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
            min-height: 100vh;
            color: #1F2937;
        }
        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 20px 16px;
            min-height: 100vh;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }
        h1 {
            color: white;
            text-align: center;
            font-size: 24px;
            margin-bottom: 8px;
            padding-top: 12px;
        }
        .subtitle {
            color: rgba(255,255,255,0.85);
            text-align: center;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .score-bar {
            display: flex;
            justify-content: space-between;
            color: rgba(255,255,255,0.9);
            font-size: 13px;
            margin-bottom: 16px;
            padding: 0 4px;
        }
        h2 {
            font-size: 18px;
            margin-bottom: 16px;
            color: #4F46E5;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 14px 20px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: transform 0.1s, opacity 0.1s;
        }
        .btn:active { transform: scale(0.98); opacity: 0.9; }
        .btn-primary {
            background: linear-gradient(135deg, #4F46E5, #7C3AED);
            color: white;
        }
        .btn-secondary {
            background: #F3F4F6;
            color: #4F46E5;
        }
        .btn-success {
            background: linear-gradient(135deg, #059669, #10B981);
            color: white;
        }
        .btn-amber {
            background: linear-gradient(135deg, #D97706, #F59E0B);
            color: white;
        }
        .question-btn {
            display: block;
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 8px;
            border: 2px solid #E5E7EB;
            border-radius: 10px;
            background: white;
            font-size: 15px;
            text-align: left;
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s;
        }
        .question-btn:hover { border-color: #4F46E5; background: #F5F3FF; }
        .question-btn:active { background: #EDE9FE; }
        .difficulty-btn {
            display: block;
            width: 100%;
            padding: 16px;
            margin-bottom: 10px;
            border: 2px solid #E5E7EB;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            text-align: left;
            transition: border-color 0.15s, background 0.15s;
        }
        .difficulty-btn:hover { border-color: #4F46E5; background: #F5F3FF; }
        .difficulty-btn:active { background: #EDE9FE; }
        .difficulty-btn .label { font-size: 16px; font-weight: 600; color: #1F2937; }
        .difficulty-btn .desc { font-size: 13px; color: #6B7280; margin-top: 2px; }
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-green { background: #D1FAE5; color: #059669; }
        .badge-red { background: #FEE2E2; color: #DC2626; }
        .badge-blue { background: #DBEAFE; color: #2563EB; }
        .badge-amber { background: #FEF3C7; color: #D97706; }
        .badge-purple { background: #EDE9FE; color: #7C3AED; }
        .status {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .hint-box {
            background: #FEF3C7;
            border: 2px solid #F59E0B;
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 16px;
        }
        .hint-box .hint-title { font-weight: 700; color: #92400E; margin-bottom: 6px; }
        .hint-box .hint-item { color: #78350F; font-size: 14px; margin: 4px 0; }
        .word-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }
        .word-chip {
            background: #F3F4F6;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 13px;
            color: #374151;
        }
        input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #E5E7EB;
            border-radius: 10px;
            font-size: 18px;
            margin-bottom: 12px;
            outline: none;
            transition: border-color 0.15s;
        }
        input[type="text"]:focus { border-color: #4F46E5; }
        .answer-box {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 12px;
            font-size: 15px;
        }
        .answer-yes { background: #D1FAE5; color: #065F46; border: 1px solid #A7F3D0; }
        .answer-no { background: #FEE2E2; color: #991B1B; border: 1px solid #FECACA; }
        .correct-box {
            background: #D1FAE5;
            border: 2px solid #10B981;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin-bottom: 16px;
        }
        .correct-box .icon { font-size: 48px; }
        .correct-box h2 { color: #059669; margin-top: 8px; }
        .incorrect-box {
            background: #FEF3C7;
            border: 2px solid #F59E0B;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin-bottom: 16px;
        }
        .incorrect-box .icon { font-size: 48px; }
        .incorrect-box h2 { color: #D97706; margin-top: 8px; }
        .fact-row {
            padding: 10px 0;
            border-bottom: 1px solid #F3F4F6;
            font-size: 14px;
        }
        .fact-row:last-child { border-bottom: none; }
        .fact-label { font-weight: 600; color: #6B7280; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        .fact-value { color: #1F2937; margin-top: 2px; }
        .tip-box {
            background: #EDE9FE;
            border-radius: 10px;
            padding: 14px;
            margin-top: 12px;
        }
        .tip-box .tip-label { font-weight: 700; color: #5B21B6; font-size: 13px; }
        .tip-box .tip-text { color: #4C1D95; font-size: 14px; margin-top: 4px; }
        .review-word {
            border: 1px solid #E5E7EB;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 10px;
        }
        .review-word .word-name { font-weight: 700; font-size: 16px; }
        .review-word .word-def { font-size: 13px; color: #6B7280; margin-top: 4px; }
        .review-word .word-tip { font-size: 13px; color: #7C3AED; margin-top: 4px; }
        .streak-msg {
            background: linear-gradient(135deg, #F59E0B, #EF4444);
            color: white;
            text-align: center;
            padding: 12px;
            border-radius: 10px;
            font-weight: 700;
            margin-bottom: 12px;
        }
        .mt-12 { margin-top: 12px; }
        .mt-16 { margin-top: 16px; }
        .text-center { text-align: center; }
        .text-muted { color: #6B7280; font-size: 13px; }
    </style>
</head>
<body>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
