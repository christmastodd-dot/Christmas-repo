{% extends "base.html" %}
{% block title %}English Word Adventure{% endblock %}
{% block content %}
<h1>English Word Adventure</h1>
<p class="subtitle">Synonym Quiz — Pick the Right Synonym!</p>

<div class="card">
    <h2>Choose Your Grade</h2>
    <form method="POST" action="/difficulty">
        <button type="submit" name="grade" value="1st" class="difficulty-btn">
            <div class="label">1st Grade <span class="badge badge-green">{{ first_count }} words</span></div>
            <div class="desc">Simple everyday words — great for beginners</div>
        </button>
        <button type="submit" name="grade" value="2nd" class="difficulty-btn">
            <div class="label">2nd Grade <span class="badge badge-purple">{{ second_count }} words</span></div>
            <div class="desc">Richer vocabulary with word origins and spelling tips</div>
        </button>
    </form>
</div>

<p class="text-center text-muted">Learn synonyms, spelling, and word origins!</p>
{% endblock %}
