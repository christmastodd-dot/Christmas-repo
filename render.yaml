databases:
  - name: fantasy-legislature-db
    plan: free
    databaseName: fantasy_legislature

services:
  - type: web
    name: fantasy-legislature
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: fantasy-legislature-db
          property: connectionString
