services:
  - type: web
    name: fantasy-legislature
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_PATH
        value: /opt/render/project/data/fantasy_legislature.db
    disk:
      name: data
      mountPath: /opt/render/project/data
      sizeGB: 1
