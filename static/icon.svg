<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <linearGradient id="book" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FDE68A"/>
      <stop offset="100%" style="stop-color:#F59E0B"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Open book shape -->
  <g transform="translate(256,280)">
    <!-- Left page -->
    <path d="M-10,-100 Q-10,-120 -30,-120 L-140,-120 Q-160,-120 -160,-100 L-160,60 Q-160,80 -140,80 L-30,80 Q-10,80 -10,60 Z" fill="white" opacity="0.95"/>
    <!-- Right page -->
    <path d="M10,-100 Q10,-120 30,-120 L140,-120 Q160,-120 160,-100 L160,60 Q160,80 140,80 L30,80 Q10,80 10,60 Z" fill="white" opacity="0.9"/>
    <!-- Book spine -->
    <path d="M-10,-120 Q0,-130 10,-120 L10,80 Q0,90 -10,80 Z" fill="#E5E7EB"/>
    <!-- Letters on left page -->
    <text x="-85" y="-50" font-family="Georgia,serif" font-size="52" font-weight="bold" fill="#4F46E5" text-anchor="middle">A</text>
    <text x="-85" y="10" font-family="Georgia,serif" font-size="52" font-weight="bold" fill="#7C3AED" text-anchor="middle">B</text>
    <!-- Letters on right page -->
    <text x="85" y="-50" font-family="Georgia,serif" font-size="52" font-weight="bold" fill="#4F46E5" text-anchor="middle">C</text>
    <!-- Question mark on right page -->
    <text x="85" y="20" font-family="Georgia,serif" font-size="62" font-weight="bold" fill="#F59E0B" text-anchor="middle">?</text>
  </g>
  <!-- Star sparkle top-right -->
  <g transform="translate(390,100)" fill="#FDE68A">
    <polygon points="0,-18 5,-5 18,0 5,5 0,18 -5,5 -18,0 -5,-5"/>
  </g>
  <!-- Small star sparkle top-left -->
  <g transform="translate(130,130)" fill="#FDE68A" opacity="0.7">
    <polygon points="0,-12 3,-3 12,0 3,3 0,12 -3,3 -12,0 -3,-3"/>
  </g>
</svg>
