// Update
function update(dt) {
  if (state === 'knockback') {
    updateKnockback(dt);
    return;
  }

  let moving = false;
  if (keys['ArrowRight'] || keys['KeyD']) { playerWX += PLAYER_SPEED * dt; facingRight = true; moving = true; }
  if (keys['ArrowLeft'] || keys['KeyA']) { playerWX -= PLAYER_SPEED * dt; facingRight = false; moving = true; }
  playerMoving = moving;
  if (moving) walkTimer += dt;
  playerWX = Math.max(0, Math.min(playerWX, levelCfg.length));

  const groundY = trailY(playerWX);
  if (onGround) {
    playerWY = groundY;
    playerVY = 0;
  } else {
    playerVY += GRAVITY * dt;
    playerWY += playerVY * dt;
    if (playerWY >= groundY) { playerWY = groundY; playerVY = 0; onGround = true; }
  }

  if (invincibleTimer > 0) invincibleTimer -= dt;
  if (tutorialTimer > 0) tutorialTimer -= dt;

  // Drop fish (Level 2) — press Down arrow or S
  if (currentLevel === 2 && hasFish && (keys['ArrowDown'] || keys['KeyS'])) {
    hasFish = false;
    droppedFishWX = playerWX;
  }

  // Goats
  for (const g of goats) {
    if (!g.active) continue;
    const dist = g.wx - playerWX;
    const triggerDist = g.angry ? GOAT_TRIGGER_DIST * 1.5 : GOAT_TRIGGER_DIST;
    if (dist > 0 && dist < triggerDist && !g.charging && g.windupTimer === 0) {
      if (g.angry) { g.windupTimer = 0.3; }  // angry goat barely pauses before charging
      else { g.charging = true; }
    }
    if (g.angry && g.windupTimer > 0) {
      g.windupTimer -= dt;
      if (g.windupTimer <= 0) { g.windupTimer = 0; g.charging = true; }
    }
    if (g.charging) { g.wx -= (g.angry ? GOAT_CHARGE_SPEED * 3 : GOAT_CHARGE_SPEED) * dt; g.wy = trailY(g.wx); }
    if (g.wx < playerWX - 300) g.active = false;
  }

  // Collision → knockback
  const pRect = { x: playerWX - 14, y: playerWY - 48, w: 28, h: 50 };
  if (invincibleTimer <= 0) {
    // Level 1: goat collision
    for (const g of goats) {
      if (!g.active) continue;
      const gRect = { x: g.wx - g.width/2, y: g.wy - g.height, w: g.width, h: g.height };
      if (rectsOverlap(pRect, gRect)) {
        lives--;
        g.active = false;
        if (lives <= 0) { onGameOver(); return; }
        kbX = playerWX; kbY = playerWY;
        kbVX = -(facingRight ? 1 : -1) * 300;
        kbVY = -500;
        kbTimer = 2.0;
        state = 'knockback';
        return;
      }
    }
    // Level 2: ice obstacle collision (only when on the ground — jumping over is safe)
    if (currentLevel === 2 && onGround) {
      for (const ob of l2Obstacles) {
        const oRect = { x: ob.wx - ob.width/2, y: ob.wy - ob.height, w: ob.width, h: ob.height };
        if (rectsOverlap(pRect, oRect)) {
          lives--;
          if (lives <= 0) { onGameOver(); return; }
          kbX = playerWX; kbY = playerWY;
          kbVX = -(facingRight ? 1 : -1) * 200;
          kbVY = -400;
          kbTimer = 1.5;
          invincibleTimer = INVINCIBILITY_TIME;
          state = 'knockback';
          return;
        }
      }
    }
  }

  // ── Snow leopard logic (Level 2) ──────────────────────────────────────
  if (currentLevel === 2 && leopard) {
    const lp = leopard;
    const distToPlayer = lp.wx - playerWX;

    if (lp.state === 'waiting') {
      // Trigger when player gets within 600px — gives time to see it and react
      if (distToPlayer > 0 && distToPlayer < 600 && hasFish) {
        lp.state = 'stalking';
        leopardAlertTimer = 6.0;
      }
    }

    if (lp.state === 'stalking') {
      // Leopard creeps toward the player very slowly — gives lots of time to react
      lp.wx -= 50 * dt;
      lp.wy = trailY(lp.wx);
      leopardAlertTimer -= dt;

      // If player dropped the fish, leopard goes to eat it
      if (!hasFish && droppedFishWX > 0) {
        lp.state = 'eating';
        lp.eatTimer = 4.0;
      }
      // If leopard reaches the player without fish dropped → knockback first, then death
      if (distToPlayer < 40 && hasFish) {
        lives--;
        if (lives <= 0) { onGameOver(); return; }
        // Knockback away from leopard
        kbX = playerWX; kbY = playerWY;
        kbVX = -250;
        kbVY = -400;
        kbTimer = 1.5;
        invincibleTimer = INVINCIBILITY_TIME;
        state = 'knockback';
        // Push leopard back too so player has another chance
        lp.wx = playerWX + 200;
        return;
      }
    }

    if (lp.state === 'eating') {
      // Move toward dropped fish
      if (Math.abs(lp.wx - droppedFishWX) > 5) {
        lp.wx += (droppedFishWX > lp.wx ? 1 : -1) * 150 * dt;
      }
      lp.wy = trailY(lp.wx);
      lp.eatTimer -= dt;
      if (lp.eatTimer <= 0) {
        lp.state = 'sitting';
        droppedFishWX = -1; // fish consumed
      }
    }

    // Collision: touching leopard while sitting (must jump over) = knockback
    if (lp.state === 'sitting' && invincibleTimer <= 0) {
      const lRect = { x: lp.wx - lp.width/2, y: lp.wy - lp.height, w: lp.width, h: lp.height };
      if (onGround && rectsOverlap(pRect, lRect)) {
        lives--;
        if (lives <= 0) { onGameOver(); return; }
        kbX = playerWX; kbY = playerWY;
        kbVX = -(facingRight ? 1 : -1) * 250;
        kbVY = -400;
        kbTimer = 1.5;
        invincibleTimer = INVINCIBILITY_TIME;
        state = 'knockback';
        return;
      }
    }
  }

  // ── Level 3: crevasses + snowballs ────────────────────────────────────
  if (currentLevel === 3) {
    // Crevasse collision — fall in if on ground and overlapping
    if (onGround) {
      for (const cr of l3Crevasses) {
        const crLeft = cr.wx - cr.width/2 + 8; // slight forgiveness on edges
        const crRight = cr.wx + cr.width/2 - 8;
        if (playerWX > crLeft && playerWX < crRight) {
          lives--;
          if (lives <= 0) { onGameOver(); return; }
          kbX = playerWX; kbY = playerWY;
          kbVX = 0; kbVY = 200; // fall downward
          kbTimer = 1.5;
          invincibleTimer = INVINCIBILITY_TIME;
          state = 'knockback';
          return;
        }
      }
    }

    // ── Yeti throws snowballs at the player ──────────────────────────────
    if (yeti && yeti.state === 'throwing') {
      yeti.throwTimer -= dt;
      if (yeti.throwTimer <= 0) {
        yeti.throwTimer = 1.8 + Math.random() * 1.2; // throw every 1.8-3s
        // Throw a snowball toward the player (uphill = leftward)
        const throwSpeed = 250 + Math.random() * 80;
        const dx = playerWX - yeti.wx;
        const dy = (playerWY - 30) - yeti.wy;
        const dist = Math.sqrt(dx*dx + dy*dy) || 1;
        l3Snowballs.push({
          wx: yeti.wx - 30,
          wy: yeti.wy - 40,
          vx: (dx / dist) * throwSpeed,
          vy: (dy / dist) * throwSpeed - 150, // arc upward
          radius: 14,
          active: true,
          catchable: false // becomes catchable when it's close and slowing
        });
      }
    }

    // Yeti stunned timer
    if (yeti && yeti.state === 'stunned') {
      yeti.throwTimer -= dt;
      if (yeti.throwTimer <= 0) {
        yeti.state = 'throwing';
        yeti.throwTimer = 2.0;
      }
    }

    // Update snowballs
    for (const sb of l3Snowballs) {
      if (!sb.active) continue;
      sb.vy += GRAVITY * 0.35 * dt;
      sb.wx += sb.vx * dt;
      sb.wy += sb.vy * dt;
      const groundY = trailY(sb.wx);
      if (sb.wy > groundY) {
        sb.wy = groundY;
        sb.vy = -Math.abs(sb.vy) * 0.25;
        if (Math.abs(sb.vy) < 15) { sb.vy = 0; sb.vx *= 0.9; }
        // Once a snowball is on the ground and slow, it's catchable
        if (Math.abs(sb.vx) < 80) sb.catchable = true;
      }
      // Remove if far from player
      if (Math.abs(sb.wx - playerWX) > 800) sb.active = false;

      // Collision with player — damage if fast, catchable if slow
      if (sb.active && invincibleTimer <= 0 && !hasSnowball) {
        const pdx = sb.wx - playerWX;
        const pdy = (sb.wy - sb.radius) - (playerWY - 25);
        const pdist = Math.sqrt(pdx*pdx + pdy*pdy);
        if (pdist < sb.radius + 16) {
          if (sb.catchable) {
            // Catch it!
            hasSnowball = true;
            sb.active = false;
          } else {
            // Hit by fast snowball
            lives--;
            sb.active = false;
            if (lives <= 0) { onGameOver(); return; }
            kbX = playerWX; kbY = playerWY;
            kbVX = -200;
            kbVY = -350;
            kbTimer = 1.5;
            invincibleTimer = INVINCIBILITY_TIME;
            state = 'knockback';
            return;
          }
        }
      }
    }
    l3Snowballs = l3Snowballs.filter(sb => sb.active);

    // Player throws snowball back at yeti (press DOWN when holding snowball)
    if (hasSnowball && (keys['ArrowDown'] || keys['KeyS'])) {
      hasSnowball = false;
      thrownBall = {
        wx: playerWX + 20,
        wy: playerWY - 30,
        vx: 350,
        vy: -120,
        radius: 14,
        active: true
      };
    }

    // Update thrown ball
    if (thrownBall && thrownBall.active) {
      thrownBall.vy += GRAVITY * 0.3 * dt;
      thrownBall.wx += thrownBall.vx * dt;
      thrownBall.wy += thrownBall.vy * dt;
      // Hit yeti?
      if (yeti && yeti.state !== 'defeated') {
        const ydx = thrownBall.wx - yeti.wx;
        const ydy = thrownBall.wy - (yeti.wy - 35);
        if (Math.sqrt(ydx*ydx + ydy*ydy) < 50) {
          yeti.hits++;
          thrownBall.active = false;
          if (yeti.hits >= 1) {
            yeti.state = 'defeated';
          } else {
            yeti.state = 'stunned';
            yeti.throwTimer = 3.0;
          }
        }
      }
      // Off screen
      if (thrownBall.wx > yeti.wx + 200 || thrownBall.wy > trailY(thrownBall.wx) + 50) {
        thrownBall.active = false;
      }
    }

    // Yeti body collision (don't walk into him!)
    if (yeti && yeti.state !== 'defeated' && invincibleTimer <= 0 && onGround) {
      const yRect = { x: yeti.wx - 40, y: yeti.wy - 70, w: 80, h: 70 };
      if (rectsOverlap(pRect, yRect)) {
        lives--;
        if (lives <= 0) { onGameOver(); return; }
        kbX = playerWX; kbY = playerWY;
        kbVX = -300; kbVY = -400; kbTimer = 1.5;
        invincibleTimer = INVINCIBILITY_TIME;
        state = 'knockback';
        return;
      }
    }
  }

  if (playerWX >= levelCfg.length) {
    if (currentLevel < 3) { state = 'levelcomplete'; }
    else if (currentLevel === 3 && yeti && yeti.state !== 'defeated') {
      // Can't win until yeti is defeated — block at yeti position
      playerWX = Math.min(playerWX, yeti.wx - 60);
    }
    else { state = 'win'; initConfetti(); }
  }
}

function updateKnockback(dt) {
  kbVY += GRAVITY * dt;
  kbX += kbVX * dt;
  kbY += kbVY * dt;
  kbTimer -= dt;
  if (kbTimer <= 0) {
    // Reappear on the trail a little behind where they were hit
    playerWY = trailY(playerWX);
    playerVY = 0;
    onGround = true;
    invincibleTimer = INVINCIBILITY_TIME;
    state = 'playing';
  }
}

function rectsOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

// Main draw
function draw(dt) {
  if (state === 'start') { drawStartScreen(); return; }

  const progress = playerWX / levelCfg.length;
  const camWX = playerWX;
  // Intentionally under-follow Y so the trail visibly rises on screen as
  // the player climbs — at the summit the player is ~190px from top vs
  // 390px at the start, giving a real sense of gained altitude.
  const camWY = playerWY + progress * levelCfg.camYFactor;
  // During knockback, gently pan camera toward flying player's X
  if (state === 'knockback') {
    // camera stays locked to playerWX (the stable ground position)
    // so the trail stays visible while the player flies off
  }

  if (currentLevel >= 2) {
    // Overcast snowy sky for levels 2 & 3
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    if (currentLevel === 3) {
      // Darker, stormier sky for avalanche descent
      grad.addColorStop(0, 'rgb(100,110,135)');
      grad.addColorStop(0.5, 'rgb(140,150,170)');
      grad.addColorStop(1, 'rgb(180,190,205)');
    } else {
      grad.addColorStop(0, 'rgb(160,170,190)');
      grad.addColorStop(0.5, 'rgb(190,200,215)');
      grad.addColorStop(1, 'rgb(220,225,235)');
    }
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
  } else {
    drawGradientSky();
  }
  drawClouds(camWX, camWY, progress);
  drawDistantMountains(camWX, camWY);
  drawMidMountains(camWX, camWY);
  drawTerrain(camWX, camWY, currentLevel >= 2 ? 1.0 : progress);
  if (currentLevel === 1) {
    drawAlpineItems(camWX, camWY);
    drawTrees(camWX, camWY, progress);
    drawSummitFlag(camWX, camWY);
  } else if (currentLevel === 2) {
    drawTrees(camWX, camWY, 1.0);
    drawL2Obstacles(camWX, camWY);
    drawDroppedFish(camWX, camWY);
    drawEndShelter(camWX, camWY);
    if (leopard) {
      const [lsx, lsy] = worldToScreen(leopard.wx, leopard.wy, camWX, camWY);
      if (lsx > -80 && lsx < W + 80) {
        drawSnowLeopard(Math.round(lsx), Math.round(lsy), leopard.state, leopard.eatTimer);
      }
    }
  } else if (currentLevel === 3) {
    drawTrees(camWX, camWY, 1.0);
    drawL3Crevasses(camWX, camWY);
    drawVillage(camWX, camWY);
    // Yeti
    if (yeti) {
      const [ysx, ysy] = worldToScreen(yeti.wx, yeti.wy, camWX, camWY);
      if (ysx > -80 && ysx < W + 80) drawYeti(Math.round(ysx), Math.round(ysy), yeti.state);
    }
    drawL3Snowballs(camWX, camWY);
    drawThrownBall(camWX, camWY);
  }

  for (const g of goats) {
    if (!g.active) continue;
    const [sx, sy] = worldToScreen(g.wx, g.wy, camWX, camWY);
    if (sx > -60 && sx < W + 60) drawGoat(Math.round(sx), Math.round(sy), true, g.angry, g.windupTimer);
  }

  if (state === 'knockback') {
    // Draw the player tumbling off the mountain
    const [ksx, ksy] = worldToScreen(kbX, kbY, camWX, camWY);
    const tumble = (2.0 - kbTimer) / 2.0; // 0→1 as timer counts down
    ctx.save();
    ctx.translate(ksx, ksy);
    ctx.rotate(tumble * Math.PI * 3 * (facingRight ? 1 : -1));
    ctx.translate(-ksx, -ksy);
    drawPlayer(Math.round(ksx), Math.round(ksy), facingRight, false, false, walkTimer);
    ctx.restore();
  } else {
    const [psx, psy] = worldToScreen(playerWX, playerWY, camWX, camWY);
    drawPlayer(Math.round(psx), Math.round(psy), facingRight, invincibleTimer > 0, playerMoving, walkTimer);
  }

  // Falling snow (Levels 2 & 3) — drawn over everything for atmosphere
  if (currentLevel >= 2) drawFallingSnow(dt);
  if (currentLevel === 2) drawLeopardAlert();
  if (currentLevel === 3) drawYetiAlert();

  // Show/hide DROP button on mobile for Level 2
  const dropBtn = document.getElementById('drop-btn');
  if (dropBtn) dropBtn.style.display = (currentLevel === 2 && hasFish) ? 'flex' : 'none';

  drawHearts(lives);
  drawProgressBar(progress);

  // Tutorial
  if (state === 'playing' && tutorialTimer > 0) {
    const alpha = Math.min(1, tutorialTimer / 0.5);
    ctx.globalAlpha = alpha;
    // Friendly tutorial bubble
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.beginPath(); ctx.roundRect(W/2 - 240, H - 75, 480, 45, 12); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 20px Arial'; ctx.textAlign = 'center';
    let tutText;
    if (currentLevel === 3) {
      tutText = 'Jump crevasses! Dodge yeti snowballs! Catch one and throw it back!';
    } else if (currentLevel === 2) {
      tutText = isTouchDevice
        ? 'Jump over ice! Watch for the snow leopard!'
        : 'Jump over ice  ~  DOWN to drop fish when leopard appears!';
    } else {
      tutText = isTouchDevice
        ? 'Use the buttons to move and jump over goats!'
        : 'Arrow keys to move  ~  SPACE to jump over goats!';
    }
    ctx.fillText(tutText, W/2, H - 46);
    ctx.textAlign = 'left'; ctx.globalAlpha = 1;
  }

  if (state === 'gameover') drawGameOver();
  if (state === 'levelcomplete') drawLevelComplete();
  if (state === 'win') drawWin(dt);
}

// ── Alpine Music System (Web Audio API) ──────────────────────────────────────
// Original melody, CC0. Inspired by traditional Austrian Ländler folk music.
// Uses scheduled oscillators — no audio files required.
let _audioCtx = null;
let _musicOn = false;
let _schedTimer = null;
let _noteIdx = 0;
let _nextNoteAt = 0;

const _BPM = 118;
const _BEAT = 60 / _BPM;

// G major Ländler melody: [frequency_Hz, duration_beats]
// Phrase A: bright ascending leap + descent
// Phrase B: waltz-feel with thirds
// Total: 16 beats ≈ 8 seconds, loops seamlessly
const _MELODY = [
  [392,0.5],[494,0.5],[587,0.5],[784,0.5],  // G4 B4 D5 G5  (leap up)
  [740,0.5],[659,0.5],[587,0.5],[494,0.5],  // F#5 E5 D5 B4 (cascade down)
  [523,0.5],[659,0.5],[784,0.5],[659,0.5],  // C5 E5 G5 E5
  [587,1.0],[392,0.5],[294,0.5],            // D5. G4 D4
  [392,0.5],[494,0.5],[587,0.5],[784,0.5],  // repeat phrase A
  [740,0.5],[659,0.5],[587,0.5],[494,0.5],
  [523,0.5],[440,0.5],[494,0.5],[587,0.5],  // C5 A4 B4 D5 (resolve)
  [392,2.0],                                // G4 hold (loop back)
];

// Oom-pah bass pattern: root on odd beats, fifth on even
const _BASS = [[196,0.45,0.12],[147,0.30,0.07]]; // G3 oom / D3 pah

function _note(freq, start, dur, gain, type) {
  if (!_audioCtx) return;
  const o = _audioCtx.createOscillator();
  const g = _audioCtx.createGain();
  o.connect(g); g.connect(_audioCtx.destination);
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(0, start);
  g.gain.linearRampToValueAtTime(gain, start + 0.025);
  g.gain.setValueAtTime(gain * 0.85, start + dur * 0.65);
  g.gain.linearRampToValueAtTime(0, start + dur);
  o.start(start); o.stop(start + dur + 0.02);
}

function _sched() {
  if (!_musicOn || !_audioCtx) return;
  const now = _audioCtx.currentTime;
  while (_nextNoteAt < now + 0.3) {
    const [freq, beats] = _MELODY[_noteIdx % _MELODY.length];
    _note(freq, _nextNoteAt, beats * _BEAT * 0.86, 0.13, 'triangle');
    // Bass oom-pah every beat
    const beatNum = Math.round(_nextNoteAt / _BEAT);
    const [bf, bd, bg] = _BASS[beatNum % 2];
    _note(bf, _nextNoteAt, bd, bg, 'sine');
    _nextNoteAt += beats * _BEAT;
    _noteIdx++;
  }
  _schedTimer = setTimeout(_sched, 100);
}

function startMusic() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (_audioCtx.state === 'suspended') _audioCtx.resume();
  if (_musicOn) return;
  _musicOn = true; _noteIdx = 0; _nextNoteAt = _audioCtx.currentTime + 0.05;
  _sched();
}

function stopMusic() {
  _musicOn = false;
  if (_schedTimer) { clearTimeout(_schedTimer); _schedTimer = null; }
}

// Game loop
function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;

  if (state === 'playing' || state === 'knockback') update(dt);
  draw(dt);
  requestAnimationFrame(gameLoop);
}

// Input
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (state === 'start' && (e.code === 'Space' || e.code === 'Enter')) {
    currentLevel = 1; resetLevel();
    state = 'playing'; startMusic();
  } else if (state === 'start' && (e.code === 'Digit1' || e.code === 'Numpad1')) {
    currentLevel = 1; resetLevel();
    state = 'playing'; startMusic();
  } else if (state === 'start' && (e.code === 'Digit2' || e.code === 'Numpad2')) {
    currentLevel = 2; resetLevel();
    state = 'playing'; startMusic();
  } else if (state === 'start' && (e.code === 'Digit3' || e.code === 'Numpad3')) {
    currentLevel = 3; resetLevel();
    state = 'playing'; startMusic();
  } else if (state === 'levelcomplete' && (e.code === 'Space' || e.code === 'Enter')) {
    currentLevel++; resetLevel();
    state = 'playing';
  } else if (state === 'playing' && (e.code === 'Space' || e.code === 'ArrowUp')) {
    if (onGround) { playerVY = JUMP_VELOCITY; onGround = false; }
  } else if ((state === 'gameover' || state === 'win') && (e.code === 'Space' || e.code === 'Enter')) {
    stopMusic(); currentLevel = 1;
    state = 'start';
  }
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// ── Touch controls ─────────────────────────────────────────────────────────
// Map touch buttons to key codes
document.querySelectorAll('.touch-btn').forEach(btn => {
  const key = btn.dataset.key;
  btn.addEventListener('touchstart', e => {
    e.preventDefault();
    keys[key] = true;
    // Handle state transitions (same as keydown)
    if (state === 'start' && key === 'Space') {
      currentLevel = 1; resetLevel(); state = 'playing'; startMusic();
    } else if (state === 'levelcomplete' && key === 'Space') {
      currentLevel++; resetLevel(); state = 'playing';
    } else if (state === 'playing' && key === 'Space') {
      if (onGround) { playerVY = JUMP_VELOCITY; onGround = false; }
    } else if ((state === 'gameover' || state === 'win') && key === 'Space') {
      stopMusic(); currentLevel = 1; state = 'start';
    }
  });
  btn.addEventListener('touchend', e => { e.preventDefault(); keys[key] = false; });
  btn.addEventListener('touchcancel', e => { keys[key] = false; });
});

// Tap canvas to start/restart on mobile
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (state === 'start') {
    // Check if tap is on a level select button
    const rect = canvas.getBoundingClientRect();
    const scaleX = W / rect.width, scaleY = H / rect.height;
    const tx = (e.touches[0].clientX - rect.left) * scaleX;
    const ty = (e.touches[0].clientY - rect.top) * scaleY;
    const b1 = drawStartScreen._btn1, b2 = drawStartScreen._btn2, b3 = drawStartScreen._btn3;
    const hitBtn = (b) => b && tx >= b.x && tx <= b.x+b.w && ty >= b.y && ty <= b.y+b.h;
    if (hitBtn(b1)) { currentLevel = 1; }
    else if (hitBtn(b2)) { currentLevel = 2; }
    else if (hitBtn(b3)) { currentLevel = 3; }
    else { currentLevel = 1; }
    resetLevel(); state = 'playing'; startMusic();
  }
  else if (state === 'levelcomplete') { currentLevel++; resetLevel(); state = 'playing'; }
  else if (state === 'gameover' || state === 'win') { stopMusic(); currentLevel = 1; state = 'start'; }
});

// Also stop music on game over (called from update)
function onGameOver() { stopMusic(); state = 'gameover'; }

// Start
resetLevel();
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
