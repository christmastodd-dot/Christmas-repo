<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Mountain Climb">
<link rel="apple-touch-icon" id="apple-icon" href="">
<title>Mountain Climb</title>
<script>
// Generate 180x180 goat head icon for iOS home screen
(function() {
  const s = 180, c = document.createElement('canvas');
  c.width = s; c.height = s;
  const x = c.getContext('2d');
  const cx = s/2, cy = s/2 + 8;

  // Background — green circle
  x.fillStyle = '#2d6e28';
  x.beginPath(); x.arc(s/2, s/2, s/2, 0, Math.PI*2); x.fill();

  // --- Goat head ---
  // Head shape — rectangular snout
  x.fillStyle = '#ebe1cd';
  x.beginPath();
  x.roundRect(cx - 32, cy - 28, 64, 52, 14);
  x.fill();

  // Snout — lighter, protruding
  x.fillStyle = '#d8cebb';
  x.beginPath();
  x.roundRect(cx - 18, cy + 8, 36, 24, 10);
  x.fill();

  // Nostrils
  x.fillStyle = '#a09080';
  x.beginPath(); x.ellipse(cx - 8, cy + 20, 4, 3, 0, 0, Math.PI*2); x.fill();
  x.beginPath(); x.ellipse(cx + 8, cy + 20, 4, 3, 0, 0, Math.PI*2); x.fill();

  // Eyes — golden with horizontal pupils
  for (const side of [-1, 1]) {
    const ex = cx + side * 18, ey = cy - 10;
    x.fillStyle = '#c8a050';
    x.beginPath(); x.ellipse(ex, ey, 10, 10, 0, 0, Math.PI*2); x.fill();
    x.fillStyle = '#1a0a00';
    x.beginPath(); x.ellipse(ex, ey, 9, 5, 0, 0, Math.PI*2); x.fill();
    x.fillStyle = 'rgba(255,255,255,0.35)';
    x.beginPath(); x.arc(ex - 3, ey - 4, 3, 0, Math.PI*2); x.fill();
  }

  // Ears — floppy, angled outward
  for (const side of [-1, 1]) {
    x.fillStyle = '#ebe1cd';
    x.beginPath();
    x.ellipse(cx + side * 38, cy - 8, 14, 8, side * 0.6, 0, Math.PI*2);
    x.fill();
    x.fillStyle = '#e0c0b0';
    x.beginPath();
    x.ellipse(cx + side * 38, cy - 8, 9, 5, side * 0.6, 0, Math.PI*2);
    x.fill();
  }

  // Horns — swept back, curved
  x.lineCap = 'round';
  for (const side of [-1, 1]) {
    x.strokeStyle = '#a08850';
    x.lineWidth = 8;
    x.beginPath();
    x.moveTo(cx + side * 20, cy - 28);
    x.bezierCurveTo(cx + side * 28, cy - 58, cx + side * 42, cy - 62, cx + side * 48, cy - 46);
    x.stroke();
    x.strokeStyle = '#c0a860';
    x.lineWidth = 5;
    x.beginPath();
    x.moveTo(cx + side * 20, cy - 28);
    x.bezierCurveTo(cx + side * 28, cy - 56, cx + side * 40, cy - 60, cx + side * 46, cy - 46);
    x.stroke();
  }
  x.lineCap = 'butt';

  // Beard
  x.fillStyle = '#d8d0c0';
  x.beginPath();
  x.moveTo(cx - 6, cy + 30);
  x.quadraticCurveTo(cx, cy + 48, cx + 6, cy + 30);
  x.closePath(); x.fill();

  // Angry eyebrows (gives character)
  x.strokeStyle = '#4a3020'; x.lineWidth = 4; x.lineCap = 'round';
  x.beginPath(); x.moveTo(cx - 28, cy - 16); x.lineTo(cx - 10, cy - 22); x.stroke();
  x.beginPath(); x.moveTo(cx + 28, cy - 16); x.lineTo(cx + 10, cy - 22); x.stroke();
  x.lineCap = 'butt';

  // Set as apple-touch-icon
  document.getElementById('apple-icon').href = c.toDataURL('image/png');
})();
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; overflow: hidden; touch-action: none; }
  canvas { display: block; border-radius: 8px; box-shadow: 0 0 30px rgba(0,0,0,0.5); max-width: 100vw; max-height: 70vh; }
  #touch-controls {
    display: none; position: fixed; bottom: 0; left: 0; right: 0; height: 28vh;
    padding: 10px 20px; z-index: 10; pointer-events: none;
  }
  #touch-controls.visible { display: flex; justify-content: space-between; align-items: center; }
  .touch-btn {
    pointer-events: auto; width: 64px; height: 64px; border-radius: 50%;
    background: rgba(255,255,255,0.18); border: 2px solid rgba(255,255,255,0.35);
    color: #fff; font-size: 28px; display: flex; align-items: center; justify-content: center;

    canvas { max-height: 100vh; max-width: 100vw; border-radius: 0; box-shadow: none; }
    #touch-controls {
      height: 100vh; padding: 0 16px;
      align-items: flex-end; padding-bottom: 16px;
    }
    .touch-btn {
      background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.25);
      width: 58px; height: 58px; font-size: 24px;

  }
</style>
</head>
<body>
<canvas id="game" width="800" height="600"></canvas>
<div id="touch-controls">
  <div class="touch-group">
    <button class="touch-btn" data-key="ArrowLeft">&#9664;</button>
    <button class="touch-btn" data-key="ArrowRight">&#9654;</button>
  </div>
  <button class="touch-btn" data-key="Space">&#9650;</button>
</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 800, H = 600;

// Constants
const LEVEL_LENGTH = 7680;
const SLOPE = 0.20;
const PLAYER_SPEED = 160;
const JUMP_VELOCITY = -637;  // sqrt(1.5) * 520 → exact 50% taller jump arc
const GRAVITY = 1400;
const GOAT_CHARGE_SPEED = 200;
const GOAT_TRIGGER_DIST = 400;
const INVINCIBILITY_TIME = 1.5;
const NUM_GOATS = 7;         // 5 normal + 1 extra normal + 1 angry boss goat

// State
let state = 'start'; // start | playing | knockback | gameover | win
let playerWX, playerWY, playerVY, onGround, lives, facingRight;
let invincibleTimer, tutorialTimer, playerMoving = false, walkTimer = 0;
// Knockback: player flies off mountain then reappears
let kbX, kbY, kbVX, kbVY, kbTimer;
let goats = [];
let confetti = [];
let keys = {};
let lastTime = 0;

// Seeded random for deterministic placement
function seededRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 16807 + 0) % 2147483647;
    return (s - 1) / 2147483646;
  };
}

function trailY(wx) { return -wx * SLOPE; }

function worldToScreen(wx, wy, camWX, camWY) {
  return [wx - camWX + W * 0.35, wy - camWY + H * 0.65];
}

// Init / Reset
function resetLevel() {
  playerWX = 0;
  playerWY = 0;
  playerVY = 0;
  onGround = true;
  lives = 2;
  facingRight = true;
  invincibleTimer = 0;
  tutorialTimer = 4;
  walkTimer = 0;
  goats = [];
  const spacing = LEVEL_LENGTH / (NUM_GOATS + 1);
  for (let i = 0; i < NUM_GOATS; i++) {
    const angry = (i === NUM_GOATS - 1); // last goat is the angry boss
    goats.push({
      homeWX: spacing * (i + 1),
      wx: spacing * (i + 1),
      wy: trailY(spacing * (i + 1)),
      charging: false,
      windupTimer: 0,  // angry goat pause before charging
      active: true,
      angry,
      width: 44,
      height: 36
    });
  }
  kbTimer = 0;
  confetti = [];
}

function initConfetti() {
  confetti = [];
  const colors = ['#ff5070','#50e860','#50a0ff','#ffdc32','#ff82dc','#32dcdc','#ff9030','#b060ff'];
  for (let i = 0; i < 120; i++) {
    confetti.push({
      x: Math.random() * W,
      y: Math.random() * -H * 1.5,
      vx: (Math.random() - 0.5) * 100,
      vy: 60 + Math.random() * 140,
      color: colors[Math.floor(Math.random()*colors.length)],
      size: 4 + Math.random() * 8,
      rot: Math.random() * 360,
      rotSpeed: (Math.random() - 0.5) * 500,
      shape: Math.random() > 0.5 ? 'rect' : 'circle'
    });
  }
}

// Drawing helpers
function drawGradientSky() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, 'rgb(80,160,255)');
  grad.addColorStop(0.6, 'rgb(160,210,255)');
  grad.addColorStop(1, 'rgb(220,240,255)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

function drawDistantMountains(camWX, camWY) {
  const px = 0.2;
  const baseY = H * 0.55;
  const ox = -camWX * px;
  const oy = -camWY * px;
  // Base pattern with width 2200 for seamless tiling
  const pattern = [[0,180],[150,80],[300,140],[450,60],[600,120],[750,90],[900,160],[1050,70],[1200,130],[1400,100],[1600,150],[1800,65],[2000,110]];
  const patternW = 2200;
  const startTile = Math.floor((ox - W) / patternW) - 1;
  const endTile = startTile + 4;
  const pts = [];
  for (let t = startTile; t <= endTile; t++) {
    for (const [ppx, ppy] of pattern) {
      pts.push([ppx + t * patternW + ox, baseY - ppy + oy * 0.3]);
    }
  }
  pts.sort((a, b) => a[0] - b[0]);
  ctx.fillStyle = 'rgb(160,180,210)';
  ctx.beginPath();
  ctx.moveTo(pts[0][0], pts[0][1]);
  for (const [x, y] of pts) ctx.lineTo(x, y);
  ctx.lineTo(pts[pts.length-1][0], H + 10);
  ctx.lineTo(pts[0][0], H + 10);
  ctx.closePath(); ctx.fill();
}

function drawMidMountains(camWX, camWY) {
  const px = 0.4;
  const baseY = H * 0.65;
  const ox = -camWX * px;
  const oy = -camWY * px;
  const pattern = [[0,140],[200,60],[350,100],[500,50],[700,120],[900,70],[1100,110],[1300,55],[1500,95],[1700,80]];
  const patternW = 1800;
  const startTile = Math.floor((ox - W) / patternW) - 1;
  const endTile = startTile + 4;
  const pts = [];
  for (let t = startTile; t <= endTile; t++) {
    for (const [ppx, ppy] of pattern) {
      pts.push([ppx + t * patternW + ox, baseY - ppy + oy * 0.3]);
    }
  }
  pts.sort((a, b) => a[0] - b[0]);
  ctx.fillStyle = 'rgb(120,155,130)';
  ctx.beginPath();
  ctx.moveTo(pts[0][0], pts[0][1]);
  for (const [x, y] of pts) ctx.lineTo(x, y);
  ctx.lineTo(pts[pts.length-1][0], H + 10);
  ctx.lineTo(pts[0][0], H + 10);
  ctx.closePath(); ctx.fill();
}

function drawClouds(camWX, camWY, progress) {
  const px = 0.15;
  const ox = -camWX * px;
  const oy = -camWY * px;
  const rng = seededRandom(42);
  const alpha = (1 - progress * 0.5) * 0.78;
  for (let i = 0; i < 8; i++) {
    const cx = rng() * 1600;
    const cy = 30 + rng() * 170;
    const w = 80 + rng() * 80;
    const h = 25 + rng() * 25;
    const sx = ((cx + ox) % (W + 300) + (W + 300)) % (W + 300) - 150;
    const sy = cy + oy * 0.2;
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.beginPath(); ctx.ellipse(sx + w/2, sy + h/2, w/2, h/2, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(sx + w*0.5, sy + h*0.2, w*0.3, h*0.4, 0, 0, Math.PI*2); ctx.fill();
  }
}

function lerpColor(a, b, t) {
  return [a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t, a[2]+(b[2]-a[2])*t];
}

function drawTerrain(camWX, camWY, progress) {
  const step = 4;
  const points = [];
  for (let sx = -step; sx < W + step * 2; sx += step) {
    const wx = camWX - W * 0.35 + sx;
    const wy = trailY(wx);
    const [, sy] = worldToScreen(wx, wy, camWX, camWY);
    points.push([sx, sy]);
  }
  // Ground is rocky throughout — no grass. Transitions to snow near summit.
  let col;
  // Ground color: grassy green at start, transitions to rocky, then snowy
  const grass = [90,160,70], rock = [140,130,120], snow = [245,245,255];
  if (progress < 0.3) col = lerpColor(grass, rock, progress / 0.3);
  else if (progress < 0.75) col = rock;
  else col = lerpColor(rock, snow, (progress - 0.75) / 0.25);

  ctx.fillStyle = `rgb(${Math.round(col[0])},${Math.round(col[1])},${Math.round(col[2])})`;
  ctx.beginPath();
  ctx.moveTo(points[0][0], points[0][1]);
  for (const [x, y] of points) ctx.lineTo(x, y);
  ctx.lineTo(W + step, H + 10); ctx.lineTo(-step, H + 10); ctx.closePath(); ctx.fill();

  // Trail band — warmer, more visible path
  ctx.strokeStyle = progress < 0.6 ? 'rgb(190,170,130)' : 'rgb(200,195,190)';
  ctx.lineWidth = 14;
  ctx.beginPath();
  ctx.moveTo(points[0][0], points[0][1]);
  for (const [x, y] of points) ctx.lineTo(x, y);
  ctx.stroke();
  // Trail highlight (lighter edge)
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 6;
  ctx.beginPath();
  ctx.moveTo(points[0][0], points[0][1] - 3);
  for (const [x, y] of points) ctx.lineTo(x, y - 3);
  ctx.stroke();

  // Wildflowers and grass tufts in the lower part of the mountain
  if (progress < 0.45) {
    const flowerRng = seededRandom(55 + Math.floor(camWX / 180));
    const flowerAlpha = Math.max(0, 1 - progress * 2.5);
    const flowerColors = ['#ff6080','#ffcc30','#ff80c0','#60b0ff','#c080ff'];
    for (let i = 0; i < 14; i++) {
      const sx = flowerRng() * (W + 100) - 50;
      const trailPt = points[Math.floor((sx + step) / step)];
      if (!trailPt) continue;
      const fy = trailPt[1] + 6 + flowerRng() * 22;
      // Grass tuft
      ctx.strokeStyle = `rgba(60,140,50,${(flowerAlpha * 0.6).toFixed(2)})`;
      ctx.lineWidth = 1.5;
      for (let g = -1; g <= 1; g++) {
        ctx.beginPath(); ctx.moveTo(sx + g*3, fy); ctx.lineTo(sx + g*5, fy - 8 - flowerRng()*4); ctx.stroke();
      }
      // Flower dot
      const fc = flowerColors[Math.floor(flowerRng() * flowerColors.length)];
      ctx.fillStyle = fc;
      ctx.globalAlpha = flowerAlpha;
      ctx.beginPath(); ctx.arc(sx, fy - 8, 2.5 + flowerRng() * 2, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
    }
  }

  // Rocky texture: scattered stones at mid and high elevation
  if (progress > 0.25) {
    const rng = seededRandom(99 + Math.floor(camWX / 200));
    const stoneAlpha = Math.min(1, (progress - 0.25) / 0.3);
    ctx.globalAlpha = stoneAlpha * 0.7;
    for (let i = 0; i < 18; i++) {
      const sx = rng() * (W + 200) - 100;
      const trailPt = points[Math.floor((sx + step) / step)];
      if (!trailPt) continue;
      const sy = trailPt[1] + 8 + rng() * 30;
      const w = 6 + rng() * 14, h = 4 + rng() * 8;
      ctx.fillStyle = `rgb(${100 + Math.floor(rng()*40)},${90+Math.floor(rng()*30)},${80+Math.floor(rng()*30)})`;
      ctx.beginPath(); ctx.ellipse(sx, sy, w/2, h/2, rng()*Math.PI, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // Snow patches near summit
  if (progress > 0.72) {
    const snowAlpha = Math.min(1, (progress - 0.72) / 0.15);
    const rng2 = seededRandom(77 + Math.floor(camWX / 150));
    ctx.globalAlpha = snowAlpha * 0.85;
    ctx.fillStyle = 'rgb(245,248,255)';
    for (let i = 0; i < 12; i++) {
      const sx = rng2() * (W + 100) - 50;
      const trailPt = points[Math.floor((sx + step) / step)];
      if (!trailPt) continue;
      const sy = trailPt[1] + 4 + rng2() * 18;
      const w = 20 + rng2() * 40, h = 6 + rng2() * 10;
      ctx.beginPath(); ctx.ellipse(sx, sy, w/2, h/2, 0, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
}

function drawTrees(camWX, camWY, progress) {
  const rng = seededRandom(17);
  const snowAmount = Math.max(0, (progress - 0.5) / 0.5); // 0 at 50%, 1 at 100%
  for (let i = 0; i < 30; i++) {
    const wx = i * 340 + (rng() * 80 - 40);
    const wy = trailY(wx);
    rng();
    const [sx, sy] = worldToScreen(wx, wy, camWX, camWY);
    if (sx < -60 || sx > W + 60) continue;

    // Per-tree progress (how far along the level this tree sits)
    const treeProgress = wx / LEVEL_LENGTH;
    const treeSnow = Math.max(0, (treeProgress - 0.5) / 0.5);

    // Trunk
    ctx.fillStyle = 'rgb(100,70,40)';
    ctx.fillRect(sx - 4, sy - 32, 8, 32);

    // Lower foliage — lerp green toward snowy white
    const gR = Math.round(40 + treeSnow * 180);
    const gG = Math.round(140 - treeSnow * 40);
    const gB = Math.round(50 + treeSnow * 180);
    ctx.fillStyle = `rgb(${gR},${gG},${gB})`;
    ctx.beginPath(); ctx.moveTo(sx, sy-80); ctx.lineTo(sx-22, sy-38); ctx.lineTo(sx+22, sy-38); ctx.closePath(); ctx.fill();

    // Upper foliage
    const uR = Math.round(55 + treeSnow * 175);
    const uG = Math.round(160 - treeSnow * 50);
    const uB = Math.round(60 + treeSnow * 180);
    ctx.fillStyle = `rgb(${uR},${uG},${uB})`;
    ctx.beginPath(); ctx.moveTo(sx, sy-95); ctx.lineTo(sx-16, sy-60); ctx.lineTo(sx+16, sy-60); ctx.closePath(); ctx.fill();

    // Snow caps on foliage when tree is in snowy area
    if (treeSnow > 0.1) {
      const capAlpha = Math.min(1, treeSnow * 1.2);
      ctx.fillStyle = `rgba(255,255,255,${capAlpha.toFixed(2)})`;
      // Snow on upper tier
      ctx.beginPath(); ctx.moveTo(sx, sy-95); ctx.lineTo(sx-12, sy-72); ctx.lineTo(sx+12, sy-72); ctx.closePath(); ctx.fill();
      // Snow on lower tier
      ctx.beginPath(); ctx.moveTo(sx-4, sy-78); ctx.lineTo(sx-18, sy-52); ctx.lineTo(sx+18, sy-52); ctx.lineTo(sx+4, sy-78); ctx.closePath(); ctx.fill();
    }
  }
}

// Alpine scenery items — signs, cabins, caves placed at fixed world positions
function drawAlpineItems(camWX, camWY) {
  const items = [
    { type: 'sign', wx: 400, text: 'Summit\nthis way!' },
    { type: 'cabin', wx: 1800 },
    { type: 'cave', wx: 3200 },
    { type: 'santa', wx: 3800 },
    { type: 'sign', wx: 4400, text: 'Watch for\ngoats!' },
    { type: 'cabin', wx: 5600 },
    { type: 'sign', wx: 6800, text: 'Almost\nthere!' },
  ];

  for (const item of items) {
    const wy = trailY(item.wx);
    const [sx, sy] = worldToScreen(item.wx, wy, camWX, camWY);
    if (sx < -100 || sx > W + 100) continue;

    if (item.type === 'sign') {
      drawTrailSign(sx, sy, item.text);
    } else if (item.type === 'cabin') {
      drawCabin(sx, sy, camWX, camWY, item.wx);
    } else if (item.type === 'cave') {
      drawCave(sx, sy, camWX, camWY, item.wx);
    } else if (item.type === 'santa') {
      drawSanta(sx, sy);
    }
  }
}

function drawTrailSign(sx, sy) {
  const c = ctx;
  // Post
  c.fillStyle = 'rgb(110,80,50)';
  c.fillRect(sx - 3, sy - 50, 6, 50);
  // Sign board — wooden plank
  c.fillStyle = 'rgb(180,140,80)';
  c.beginPath(); c.roundRect(sx - 28, sy - 52, 56, 22, 3); c.fill();
  // Border
  c.strokeStyle = 'rgb(130,95,50)'; c.lineWidth = 1.5;
  c.beginPath(); c.roundRect(sx - 28, sy - 52, 56, 22, 3); c.stroke();
  // Arrow pointing right
  c.fillStyle = 'rgb(90,60,30)';
  c.beginPath();
  c.moveTo(sx + 18, sy - 41);
  c.lineTo(sx + 26, sy - 41);
  c.lineTo(sx + 22, sy - 46);
  c.lineTo(sx + 30, sy - 41);
  c.lineTo(sx + 22, sy - 36);
  c.lineTo(sx + 26, sy - 41);
  c.closePath(); c.fill();
  // Snow on top
  c.fillStyle = 'rgba(255,255,255,0.7)';
  c.beginPath();
  c.ellipse(sx, sy - 53, 22, 4, 0, Math.PI, Math.PI*2);
  c.fill();
}

function drawCabin(sx, sy, camWX, camWY, wx) {
  const c = ctx;
  // Get trail Y at left and right edges so cabin sits on the slope
  const halfW = 34;
  const [, syL] = worldToScreen(wx - halfW, trailY(wx - halfW), camWX, camWY);
  const [, syR] = worldToScreen(wx + halfW, trailY(wx + halfW), camWX, camWY);
  const cabinH = 36, roofH = 24;
  const topY = Math.min(syL, syR) - cabinH;

  // Ground fill to connect cabin base to slope
  c.fillStyle = 'rgb(140,90,45)';
  c.beginPath();
  c.moveTo(sx - halfW, topY);
  c.lineTo(sx + halfW, topY);
  c.lineTo(sx + halfW, syR);
  c.lineTo(sx - halfW, syL);
  c.closePath(); c.fill();
  // Darker planks
  c.strokeStyle = 'rgb(110,70,35)'; c.lineWidth = 1;
  for (let i = 1; i <= 3; i++) {
    const py = topY + i * 9;
    c.beginPath(); c.moveTo(sx - halfW, py); c.lineTo(sx + halfW, py); c.stroke();
  }
  // Roof — steep A-frame
  c.fillStyle = 'rgb(160,60,40)';
  c.beginPath();
  c.moveTo(sx - halfW - 6, topY);
  c.lineTo(sx, topY - roofH);
  c.lineTo(sx + halfW + 6, topY);
  c.closePath(); c.fill();
  c.strokeStyle = 'rgb(120,40,25)'; c.lineWidth = 1.5;
  c.beginPath(); c.moveTo(sx - halfW - 6, topY); c.lineTo(sx, topY - roofH); c.lineTo(sx + halfW + 6, topY); c.stroke();
  // Snow on roof
  c.fillStyle = 'rgba(255,255,255,0.65)';
  c.beginPath();
  c.moveTo(sx - halfW - 3, topY + 2);
  c.lineTo(sx, topY - roofH + 3);
  c.lineTo(sx + halfW + 3, topY + 2);
  c.quadraticCurveTo(sx + halfW - 8, topY + 5, sx + 10, topY - roofH + 10);
  c.quadraticCurveTo(sx - 12, topY - roofH + 10, sx - halfW + 6, topY + 5);
  c.closePath(); c.fill();
  // Door
  c.fillStyle = 'rgb(90,55,25)';
  const doorY = topY + 14;
  c.fillRect(sx - 7, doorY, 14, sy - doorY);
  c.beginPath(); c.roundRect(sx - 7, doorY, 14, 18, [3,3,0,0]); c.fill();
  // Door handle
  c.fillStyle = 'rgb(200,170,60)';
  c.beginPath(); c.arc(sx + 4, doorY + 10, 2, 0, Math.PI*2); c.fill();
  // Window
  const winX = sx + 12, winY = topY + 10;
  c.fillStyle = 'rgb(200,220,255)';
  c.fillRect(winX, winY, 14, 12);
  c.strokeStyle = 'rgb(110,70,35)'; c.lineWidth = 1.5;
  c.strokeRect(winX, winY, 14, 12);
  c.beginPath(); c.moveTo(winX + 7, winY); c.lineTo(winX + 7, winY + 12); c.stroke();
  c.beginPath(); c.moveTo(winX, winY + 6); c.lineTo(winX + 14, winY + 6); c.stroke();
  c.fillStyle = 'rgba(255,220,120,0.25)';
  c.fillRect(winX + 1, winY + 1, 12, 10);
  // Chimney
  c.fillStyle = 'rgb(120,100,80)';
  c.fillRect(sx + 14, topY - roofH + 6, 10, roofH - 6);
  // Smoke
  const now = performance.now() / 1000;
  c.fillStyle = 'rgba(200,200,210,0.35)';
  for (let p = 0; p < 3; p++) {
    const t = ((now * 20 + p * 12) % 36) / 36;
    c.beginPath(); c.arc(sx + 19 + Math.sin(t * Math.PI * 2) * 5, topY - roofH + 4 - t * 40, 4 + t * 5, 0, Math.PI*2); c.fill();
  }
}

function drawCave(sx, sy, camWX, camWY, wx) {
  const c = ctx;
  // Get trail Y at left and right edges so cave sits on the slope
  const halfW = 40;
  const [, syL] = worldToScreen(wx - halfW, trailY(wx - halfW), camWX, camWY);
  const [, syR] = worldToScreen(wx + halfW, trailY(wx + halfW), camWX, camWY);

  // Rock face — fill from arch top down to the sloped trail
  const archTopY = sy - 48;
  c.fillStyle = 'rgb(100,90,80)';
  c.beginPath();
  c.moveTo(sx - halfW, syL);
  c.lineTo(sx - halfW, archTopY + 10);
  c.ellipse(sx, archTopY + 10, halfW, 38, 0, Math.PI, 0);
  c.lineTo(sx + halfW, syR);
  c.closePath(); c.fill();

  // Rocky texture
  c.fillStyle = 'rgb(85,78,70)';
  c.beginPath(); c.ellipse(sx - 22, archTopY + 14, 10, 6, -0.3, 0, Math.PI*2); c.fill();
  c.beginPath(); c.ellipse(sx + 20, archTopY + 18, 8, 5, 0.2, 0, Math.PI*2); c.fill();
  c.fillStyle = 'rgb(115,105,92)';
  c.beginPath(); c.ellipse(sx + 3, archTopY + 4, 12, 7, 0.1, 0, Math.PI*2); c.fill();

  // Cave opening — dark arch, bottom meets the trail
  c.fillStyle = 'rgb(25,20,18)';
  c.beginPath();
  c.ellipse(sx, sy - 14, 22, 24, 0, Math.PI, 0);
  c.lineTo(sx + 22, sy + 2);
  c.lineTo(sx - 22, sy + 2);
  c.closePath(); c.fill();

  // Inner glow
  c.fillStyle = 'rgba(255,180,80,0.08)';
  c.beginPath();
  c.ellipse(sx, sy - 18, 14, 16, 0, Math.PI, 0);
  c.fill();

  // Stalactites
  c.fillStyle = 'rgb(70,65,58)';
  c.beginPath(); c.moveTo(sx - 12, sy - 34); c.lineTo(sx - 10, sy - 24); c.lineTo(sx - 14, sy - 24); c.closePath(); c.fill();
  c.beginPath(); c.moveTo(sx + 6, sy - 36); c.lineTo(sx + 8, sy - 26); c.lineTo(sx + 4, sy - 26); c.closePath(); c.fill();
  c.beginPath(); c.moveTo(sx - 3, sy - 35); c.lineTo(sx - 1, sy - 28); c.lineTo(sx - 5, sy - 28); c.closePath(); c.fill();

  // Snow on top
  c.fillStyle = 'rgba(255,255,255,0.5)';
  c.beginPath();
  c.ellipse(sx, archTopY + 2, 32, 6, 0, Math.PI, 0);
  c.fill();
}

function drawSummitFlag(camWX, camWY) {
  const [sx, sy] = worldToScreen(LEVEL_LENGTH, trailY(LEVEL_LENGTH), camWX, camWY);
  // Pole
  ctx.strokeStyle = 'rgb(120,90,60)'; ctx.lineWidth = 5;
  ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(sx, sy-85); ctx.stroke();
  // Pole ball top
  ctx.fillStyle = 'rgb(255,215,40)';
  ctx.beginPath(); ctx.arc(sx, sy-87, 4, 0, Math.PI*2); ctx.fill();
  // Flag with gentle wave
  const wave = Math.sin(performance.now() / 500) * 3;
  ctx.fillStyle = 'rgb(255,215,40)';
  ctx.beginPath();
  ctx.moveTo(sx, sy-83);
  ctx.quadraticCurveTo(sx+22, sy-72 + wave, sx+42, sy-68 + wave);
  ctx.quadraticCurveTo(sx+22, sy-60 + wave, sx, sy-53);
  ctx.closePath(); ctx.fill();
  // Flag border
  ctx.strokeStyle = 'rgb(220,180,30)'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(sx, sy-83);
  ctx.quadraticCurveTo(sx+22, sy-72 + wave, sx+42, sy-68 + wave);
  ctx.quadraticCurveTo(sx+22, sy-60 + wave, sx, sy-53);
  ctx.stroke();
  // Star on flag
  ctx.fillStyle = 'rgb(255,255,255)';
  const starX = sx + 18, starY = sy - 68 + wave * 0.5;
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const angle = -Math.PI/2 + (i * 2 * Math.PI / 5);
    ctx.lineTo(starX + Math.cos(angle) * 6, starY + Math.sin(angle) * 6);
    const innerAngle = angle + Math.PI / 5;
    ctx.lineTo(starX + Math.cos(innerAngle) * 3, starY + Math.sin(innerAngle) * 3);
  }
  ctx.closePath(); ctx.fill();
}

function drawPlayer(sx, sy, right, flash, moving, walkOffset) {
  if (flash && Math.floor(performance.now() / 100) % 2 === 0) return;
  const c = ctx;
  const f = right ? 1 : -1;

  // ── WALK ANIMATION ─────────────────────────────────────────────────────
  // walkOffset = timer that always counts UP while moving.
  // Strategy: body lean + vertical bob convey direction unambiguously.
  // Limb rotation adds detail on top of the lean.

  const cycle = moving ? Math.sin(walkOffset * 8) : 0;

  // 1) Forward body lean: tilt whole character toward movement direction.
  //    This is the PRIMARY directional cue — lean right when walking right.
  const lean = moving ? 0.12 * f : 0;

  // 2) Vertical bob: body rises at mid-stride, dips at contact.
  const bob = moving ? -Math.abs(cycle) * 3 : 0;

  // 3) Limb swing angles (relative to the leaned body).
  //    Legs get large amplitude; arms get small so they don't fight the lean.
  const legAmp = 0.45;
  const armAmp = 0.18;

  // Far leg (drawn in front) kicks forward; near leg kicks back.
  // "Forward" relative to the LEANED body = positive rotation.
  const farLegAngle  = -cycle * legAmp;
  const nearLegAngle =  cycle * legAmp;
  // Arms oppose their same-side leg (natural gait).
  // Near arm trails (swings back when near leg kicks back).
  const farArmAngle  = -cycle * armAmp;
  const nearArmAngle =  cycle * armAmp;

  // Apply whole-body lean + bob.  Pivot at feet (sx, sy) so body tilts
  // from the ground contact point.
  c.save();
  c.translate(sx, sy);
  c.rotate(lean);
  c.translate(-sx, -sy);
  const by = sy + bob; // bobbed Y for all body parts

  // ── CHARACTER DRAWN FROM BEHIND (2/3 rear profile view) ──────────────────
  // Viewer sees the character's back. Backpack is prominent, no face visible.
  // Draw order: far arm → far leg → torso → near leg → backpack → near arm → head (rear)

  // ── 1. Far arm (furthest from viewer, behind everything) ─────────────────
  drawArm(c, sx + f*10, by - 32, farArmAngle, f);

  // ── 2. Far leg (behind torso) ────────────────────────────────────────────
  const hipY = by - 2;
  c.save();
  c.translate(sx + f*5, hipY);
  c.rotate(farLegAngle);
  c.fillStyle = 'rgb(230,195,160)';
  c.beginPath(); c.roundRect(-4, 0, 8, 10, 2); c.fill();
  c.fillStyle = 'rgb(90,60,35)';
  c.beginPath(); c.roundRect(-5, 9, 11, 7, 2); c.fill();
  c.fillStyle = 'rgb(50,40,30)';
  c.fillRect(-6, 14, 12, 3);
  c.restore();

  // ── 3. Torso: jacket back + lederhosen ───────────────────────────────────
  // Back of jacket (slightly darker, no lapel detail)
  c.fillStyle = 'rgb(70,125,70)';
  c.beginPath(); c.roundRect(sx - 12, by - 38, 24, 22, 5); c.fill();
  // Jacket seam down the back
  c.strokeStyle = 'rgb(55,100,55)'; c.lineWidth = 1.5;
  c.beginPath(); c.moveTo(sx, by - 37); c.lineTo(sx, by - 18); c.stroke();

  // Lederhosen
  c.fillStyle = 'rgb(130,85,40)';
  c.beginPath(); c.roundRect(sx - 12, by - 18, 24, 16, 3); c.fill();
  c.fillStyle = 'rgb(110,70,30)';
  c.fillRect(sx - 5, by - 18, 10, 10);
  c.fillStyle = 'rgb(180,140,70)';
  c.fillRect(sx - 4, by - 17, 8, 1);
  c.fillRect(sx - 4, by - 14, 8, 1);
  // Suspender straps (seen from behind — V shape)
  c.strokeStyle = 'rgb(110,70,30)'; c.lineWidth = 3;
  c.beginPath(); c.moveTo(sx - 5, by - 18); c.lineTo(sx - 3, by - 35); c.stroke();
  c.beginPath(); c.moveTo(sx + 5, by - 18); c.lineTo(sx + 3, by - 35); c.stroke();

  // ── 4. Near leg (in front of torso) ──────────────────────────────────────
  c.save();
  c.translate(sx - f*5, hipY);
  c.rotate(nearLegAngle);
  c.fillStyle = 'rgb(230,195,160)';
  c.beginPath(); c.roundRect(-4, 0, 8, 10, 2); c.fill();
  c.fillStyle = 'rgb(90,60,35)';
  c.beginPath(); c.roundRect(-5, 9, 11, 7, 2); c.fill();
  c.fillStyle = 'rgb(50,40,30)';
  c.fillRect(-6, 14, 12, 3);
  c.restore();

  // ── 5. Backpack (prominent — faces the viewer) ───────────────────────────
  // Main body
  c.fillStyle = 'rgb(60,90,50)';
  c.beginPath(); c.roundRect(sx - 11, by - 38, 22, 24, 4); c.fill();
  // Top flap
  c.fillStyle = 'rgb(55,82,45)';
  c.beginPath(); c.roundRect(sx - 10, by - 40, 20, 8, [4,4,0,0]); c.fill();
  // Buckle/clasp
  c.fillStyle = 'rgb(180,160,100)';
  c.fillRect(sx - 3, by - 33, 6, 3);
  c.fillStyle = 'rgb(140,120,70)';
  c.fillRect(sx - 2, by - 32, 4, 1);
  // Side pocket
  c.fillStyle = 'rgb(50,78,40)';
  c.beginPath(); c.roundRect(sx - 9, by - 24, 8, 8, 2); c.fill();
  c.beginPath(); c.roundRect(sx + 1, by - 24, 8, 8, 2); c.fill();
  // Straps visible from behind (going over shoulders)
  c.strokeStyle = 'rgb(80,110,65)'; c.lineWidth = 3;
  c.beginPath(); c.moveTo(sx - 9, by - 36); c.lineTo(sx - 12, by - 40); c.stroke();
  c.beginPath(); c.moveTo(sx + 9, by - 36); c.lineTo(sx + 12, by - 40); c.stroke();
  // Bedroll on top
  c.fillStyle = 'rgb(120,90,65)';
  c.beginPath(); c.ellipse(sx, by - 42, 10, 4, 0, 0, Math.PI*2); c.fill();
  c.strokeStyle = 'rgb(100,75,50)'; c.lineWidth = 1;
  c.beginPath(); c.ellipse(sx, by - 42, 10, 4, 0, 0, Math.PI*2); c.stroke();

  // ── 6. Near arm (closest to viewer, in front) ───────────────────────────
  drawArm(c, sx - f*10, by - 32, nearArmAngle, f);

  // ── 7. Head from behind (no face — simple circle) ────────────────────────
  // Neck
  c.fillStyle = 'rgb(245,205,170)';
  c.fillRect(sx - 4, by - 38, 8, 5);
  // Head — plain circle, seen from behind
  c.fillStyle = 'rgb(245,205,170)';
  c.beginPath(); c.arc(sx, by - 48, 13, 0, Math.PI * 2); c.fill();

  // Robin Hood hat — solid triangular cap with brim, feather backward
  // Cap body — solid triangle, peak leans slightly backward
  c.fillStyle = 'rgb(45,88,35)';
  c.beginPath();
  c.moveTo(sx - 17, by - 54);              // left base
  c.lineTo(sx - f*4, by - 80);             // peak (leans backward)
  c.lineTo(sx + 17, by - 54);              // right base
  c.closePath(); c.fill();
  // Brim — wide, sits on top of the head, drawn over the cap base
  c.fillStyle = 'rgb(42,82,32)';
  c.beginPath();
  c.ellipse(sx, by - 54, 20, 6, 0, 0, Math.PI * 2);
  c.fill();
  // Hat band across the base of the cap
  c.strokeStyle = 'rgb(140,100,40)'; c.lineWidth = 2.5;
  c.beginPath();
  c.moveTo(sx - 17, by - 55);
  c.quadraticCurveTo(sx, by - 58, sx + 17, by - 55);
  c.stroke();
  // Band buckle / medallion
  c.fillStyle = 'rgb(210,180,70)';
  c.beginPath(); c.arc(sx, by - 57, 3.5, 0, Math.PI*2); c.fill();
  c.fillStyle = 'rgb(170,140,50)';
  c.beginPath(); c.arc(sx, by - 57, 2, 0, Math.PI*2); c.fill();
  // Feather — starts at front of hat, sweeps BACKWARD
  c.strokeStyle = 'rgb(180,40,30)'; c.lineWidth = 2.5;
  c.lineCap = 'round';
  c.beginPath();
  c.moveTo(sx + f*8, by - 57);
  c.bezierCurveTo(sx - f*8, by - 70, sx - f*22, by - 78, sx - f*34, by - 72);
  c.stroke();
  // Feather barbs
  c.strokeStyle = 'rgb(210,65,45)'; c.lineWidth = 1;
  c.beginPath(); c.moveTo(sx - f*5, by - 67); c.lineTo(sx - f*7, by - 74); c.stroke();
  c.beginPath(); c.moveTo(sx - f*12, by - 73); c.lineTo(sx - f*14, by - 80); c.stroke();
  c.beginPath(); c.moveTo(sx - f*19, by - 76); c.lineTo(sx - f*21, by - 83); c.stroke();
  c.beginPath(); c.moveTo(sx - f*27, by - 75); c.lineTo(sx - f*29, by - 81); c.stroke();
  c.lineCap = 'butt';

  c.restore(); // end whole-body lean
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath(); ctx.fill();
}

function drawGoat(sx, sy, facingLeft, angry, windupTimer) {
  // Scale goat to 75% height, anchored at hoof ground level (sy+15)
  ctx.save();
  ctx.translate(sx, sy + 15);
  ctx.scale(1, 0.75);
  ctx.translate(-sx, -(sy + 15));

  const flip = facingLeft ? -1 : 1;

  // Body — rectangular/blocky (goat not sheep); angry goat is bright red
  ctx.fillStyle = angry ? 'rgb(220,50,40)' : 'rgb(235,225,205)';
  ctx.beginPath();
  ctx.roundRect(sx - 24, sy - 26, 48, 22, 4);
  ctx.fill();
  // Body shading
  ctx.fillStyle = 'rgba(0,0,0,0.07)';
  ctx.beginPath(); ctx.roundRect(sx - 24, sy - 26, 48, 10, [4,4,0,0]); ctx.fill();

  // Legs (4 stubby legs)
  ctx.fillStyle = angry ? 'rgb(190,40,30)' : 'rgb(200,190,175)';
  for (const off of [-16, -6, 6, 16]) {
    ctx.fillRect(sx + off - 3, sy - 6, 6, 18);
  }
  // Hooves
  ctx.fillStyle = 'rgb(60,50,40)';
  for (const off of [-16, -6, 6, 16]) {
    ctx.fillRect(sx + off - 3, sy + 10, 6, 5);
  }

  // Neck
  const hx = sx + 20 * flip;
  const hy = sy - 26;
  ctx.fillStyle = angry ? 'rgb(220,50,40)' : 'rgb(235,225,205)';
  ctx.beginPath();
  ctx.roundRect(hx - 6*flip, hy - 10, 12, 14, 3);
  ctx.fill();

  // Head — rectangular snout (goat-like)
  ctx.beginPath();
  ctx.roundRect(hx - 10, hy - 24, 20, 18, 4);
  ctx.fill();
  // Snout
  ctx.fillStyle = angry ? 'rgb(200,40,30)' : 'rgb(210,200,185)';
  ctx.beginPath();
  ctx.roundRect(hx + 2*flip, hy - 16, 10, 10, 3);
  ctx.fill();
  // Nostril
  ctx.fillStyle = 'rgb(160,140,130)';
  ctx.beginPath(); ctx.ellipse(hx + 5*flip, hy - 10, 2, 1.5, 0, 0, Math.PI*2); ctx.fill();

  // Eye (horizontal-pupil goat eye)
  ctx.fillStyle = 'rgb(200,160,80)';
  ctx.beginPath(); ctx.ellipse(hx - 3*flip, hy - 18, 4, 4, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgb(20,10,0)';
  ctx.beginPath(); ctx.ellipse(hx - 3*flip, hy - 18, 4, 2, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.beginPath(); ctx.arc(hx - 2*flip, hy - 20, 1.5, 0, Math.PI*2); ctx.fill();

  // Ear
  ctx.fillStyle = 'rgb(235,225,205)';
  ctx.beginPath();
  ctx.ellipse(hx - 9*flip, hy - 20, 4, 6, flip * 0.4, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = 'rgb(220,180,180)';
  ctx.beginPath();
  ctx.ellipse(hx - 9*flip, hy - 20, 2, 4, flip * 0.4, 0, Math.PI*2);
  ctx.fill();

  // Horns — swept back, curved (bezier)
  ctx.strokeStyle = 'rgb(160,130,80)';
  ctx.lineWidth = 3.5;
  ctx.lineCap = 'round';
  // Horn 1
  ctx.beginPath();
  ctx.moveTo(hx - 2*flip, hy - 26);
  ctx.bezierCurveTo(hx - 2*flip - 4*flip, hy - 40, hx - 8*flip - 6*flip, hy - 42, hx - 10*flip - 10*flip, hy - 34);
  ctx.stroke();
  // Horn 2 (slightly behind)
  ctx.strokeStyle = 'rgb(140,110,60)';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(hx + 2*flip, hy - 25);
  ctx.bezierCurveTo(hx + 2*flip - 3*flip, hy - 37, hx - 4*flip - 6*flip, hy - 40, hx - 7*flip - 10*flip, hy - 32);
  ctx.stroke();
  ctx.lineCap = 'butt';

  // Beard
  ctx.strokeStyle = 'rgb(210,200,185)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(hx + 4*flip, hy - 6);
  ctx.bezierCurveTo(hx + 5*flip, hy + 2, hx + 3*flip, hy + 6, hx + 4*flip, hy + 9);
  ctx.stroke();

  // Tail
  ctx.fillStyle = angry ? 'rgb(255,80,60)' : 'rgb(245,240,230)';
  ctx.beginPath();
  ctx.ellipse(sx - 22*flip, sy - 22, 5, 7, flip * 0.3, 0, Math.PI*2);
  ctx.fill();

  // Angry extras: furious eyebrows + red eye tint + smoke from nostril
  if (angry) {
    const hx = sx + 20 * flip;
    const hy = sy - 26;
    // Angry eyebrow (slanted inward)
    ctx.strokeStyle = 'rgb(120,10,10)';
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(hx - 7*flip, hy - 24);
    ctx.lineTo(hx + 1*flip, hy - 27);
    ctx.stroke();
    ctx.lineCap = 'butt';

    // Smoke — dramatic billowing clouds during windup, trailing wisps while charging
    const now = performance.now() / 1000;
    const isWindup = windupTimer > 0;
    const numStreams = isWindup ? 3 : 1;   // multiple smoke streams during windup
    const puffsPerStream = isWindup ? 5 : 3;
    const cycleDur = isWindup ? 1.2 : 1.8; // seconds per puff cycle
    const riseHeight = isWindup ? 80 : 30;  // how high smoke rises (unscaled coords)
    const startSize = isWindup ? 14 : 5;    // starting puff radius

    for (let s = 0; s < numStreams; s++) {
      const streamOff = (s - (numStreams - 1) / 2) * 8 * flip; // spread streams sideways
      const streamDelay = s * (cycleDur / numStreams);
      for (let p = 0; p < puffsPerStream; p++) {
        const t = ((now + streamDelay + p * (cycleDur / puffsPerStream)) % cycleDur) / cycleDur;
        const puffY = hy - 10 - t * riseHeight;
        const puffX = hx + (5 * flip) + streamOff + Math.sin(t * Math.PI * 2 + s) * 6 * flip;
        const radius = startSize * (1 + t * 0.8) * (1 - t * 0.3); // grows then fades
        const alpha = (1 - t) * (isWindup ? 0.9 : 0.6);
        if (alpha <= 0) continue;
        // Gradient from orange-grey at base to dark grey at top
        const r = Math.round(isWindup ? 180 - t * 60 : 150);
        const g2 = Math.round(isWindup ? 130 - t * 60 : 140);
        const b = Math.round(isWindup ? 100 - t * 40 : 140);
        ctx.fillStyle = `rgba(${r},${g2},${b},${alpha.toFixed(2)})`;
        ctx.beginPath(); ctx.arc(puffX, puffY, radius, 0, Math.PI*2); ctx.fill();
      }
    }
  }

  ctx.restore(); // end goat scale
}

function drawHearts(lives) {
  for (let i = 0; i < 2; i++) {
    const cx = 44 + i*46, cy = 42;
    const alive = i < lives;
    // Gentle pulse on living hearts
    const scale = alive ? 1 + 0.06 * Math.sin(performance.now() / 300 + i * 1.5) : 0.9;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(scale, scale);
    // Shadow
    if (alive) {
      ctx.fillStyle = 'rgba(220,40,40,0.3)';
      ctx.beginPath(); ctx.arc(-7, -3, 10, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(7, -3, 10, 0, Math.PI*2); ctx.fill();
    }
    // Heart
    ctx.fillStyle = alive ? 'rgb(240,50,60)' : 'rgb(90,90,90)';
    ctx.beginPath(); ctx.arc(-7, -4, 9, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(7, -4, 9, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.moveTo(-15, -1); ctx.lineTo(15, -1); ctx.lineTo(0, 16); ctx.closePath(); ctx.fill();
    // Highlight
    if (alive) {
      ctx.fillStyle = 'rgba(255,180,180,0.5)';
      ctx.beginPath(); ctx.arc(-5, -7, 4, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }
}

function drawProgressBar(progress) {
  const bx = W-185, by = 28, bw = 155, bh = 20;
  // Background with rounded border
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  roundRect(bx-3, by-3, bw+6, bh+6, 6);
  ctx.fillStyle = 'rgb(220,220,230)';
  roundRect(bx, by, bw, bh, 4);
  // Fill — gradient from green to gold as you progress
  const fw = Math.floor(bw * Math.min(progress, 1));
  if (fw > 0) {
    const grad = ctx.createLinearGradient(bx, 0, bx + bw, 0);
    grad.addColorStop(0, 'rgb(80,200,80)');
    grad.addColorStop(0.7, 'rgb(120,210,60)');
    grad.addColorStop(1, 'rgb(255,210,40)');
    ctx.fillStyle = grad;
    roundRect(bx, by, fw, bh, 4);
    // Shine on filled area
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    roundRect(bx, by, fw, bh/2, 4);
  }
  // Percentage text
  ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.font = 'bold 11px Arial'; ctx.textAlign = 'center';
  ctx.fillText(Math.floor(progress * 100) + '%', bx + bw/2, by + 14);
  ctx.textAlign = 'left';
  // Mountain flag icon at end
  const mx = bx + bw + 14, my = by + bh/2;
  ctx.fillStyle = 'rgb(120,110,100)';
  ctx.beginPath(); ctx.moveTo(mx, my-12); ctx.lineTo(mx-9, my+7); ctx.lineTo(mx+9, my+7); ctx.closePath(); ctx.fill();
  ctx.fillStyle = 'rgb(245,245,255)';
  ctx.beginPath(); ctx.moveTo(mx, my-12); ctx.lineTo(mx-4, my-4); ctx.lineTo(mx+4, my-4); ctx.closePath(); ctx.fill();
  // Little flag on peak
  ctx.fillStyle = 'rgb(255,210,40)';
  ctx.fillRect(mx, my-14, 1, 8);
  ctx.beginPath(); ctx.moveTo(mx+1, my-14); ctx.lineTo(mx+7, my-11); ctx.lineTo(mx+1, my-8); ctx.closePath(); ctx.fill();
}

function drawConfetti(dt) {
  for (const p of confetti) {
    p.x += p.vx * dt; p.y += p.vy * dt; p.rot += p.rotSpeed * dt;
    p.vx += Math.sin(p.y * 0.02) * 20 * dt; // flutter sideways
    if (p.y > H + 20) { p.y = -10 - Math.random()*30; p.x = Math.random() * W; }
    ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot * Math.PI/180);
    ctx.fillStyle = p.color;
    if (p.shape === 'circle') {
      ctx.beginPath(); ctx.arc(0, 0, p.size/2, 0, Math.PI*2); ctx.fill();
    } else {
      ctx.fillRect(-p.size/2, -p.size/4, p.size, p.size/2);
    }
    ctx.restore();
  }
}

const _mountainImg = new Image();

// Detect touch device
const isTouchDevice = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
if (isTouchDevice) document.getElementById('touch-controls').classList.add('visible');

// Screens
function drawStartScreen() {
  // Mountain SVG background
  if (_mountainImg.complete && _mountainImg.naturalWidth > 0) {
    ctx.drawImage(_mountainImg, 0, 0, W, H);
  } else {
    drawGradientSky(); // fallback while image loads
  }

  // Frosted glass title panel
  ctx.fillStyle = 'rgba(10,20,45,0.55)';
  ctx.beginPath(); ctx.roundRect(W/2 - 250, 42, 500, 130, 18); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.roundRect(W/2 - 250, 42, 500, 130, 18); ctx.stroke();

  // Title with shadow
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.font = 'bold 52px Arial';
  ctx.fillText('Mountain Climb', W/2 + 2, 102);
  ctx.fillStyle = '#fff'; ctx.font = 'bold 52px Arial';
  ctx.fillText('Mountain Climb', W/2, 100);

  // Subtitle
  ctx.fillStyle = 'rgba(200,225,255,0.9)'; ctx.font = '20px Arial';
  ctx.fillText('Reach the summit! Jump over the goats!', W/2, 148);

  // Play button with glow
  const t = performance.now() / 1000;
  const pulse = 0.7 + 0.3 * Math.sin(t * 2.5);
  const glowSize = 4 + 3 * Math.sin(t * 2.5);

  // Button glow
  ctx.shadowColor = 'rgba(80,160,255,0.6)';
  ctx.shadowBlur = glowSize * 3;
  ctx.fillStyle = `rgba(50,120,240,${pulse})`;
  ctx.beginPath(); ctx.roundRect(W/2 - 165, 385, 330, 64, 14); ctx.fill();
  ctx.shadowBlur = 0;

  // Button border
  ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.roundRect(W/2 - 165, 385, 330, 64, 14); ctx.stroke();

  // Button text
  ctx.fillStyle = '#fff'; ctx.font = 'bold 28px Arial';
  const playText = isTouchDevice ? 'Tap to Play' : 'Press SPACE to Play';
  ctx.fillText(playText, W/2, 425);

  // Controls hint
  ctx.fillStyle = 'rgba(200,220,255,0.6)'; ctx.font = '15px Arial';
  const hint = isTouchDevice ? 'Use on-screen controls' : 'Arrow keys to move, SPACE to jump';
  ctx.fillText(hint, W/2, 480);

  ctx.textAlign = 'left';
}

function drawOverlay(alpha) {
  ctx.fillStyle = `rgba(0,0,0,${alpha})`;
  ctx.fillRect(0, 0, W, H);
}

function drawGameOver() {
  drawOverlay(0.5);
  ctx.textAlign = 'center';

  // Friendly panel
  ctx.fillStyle = 'rgba(40,20,60,0.7)';
  ctx.beginPath(); ctx.roundRect(W/2 - 220, 140, 440, 260, 20); ctx.fill();
  ctx.strokeStyle = 'rgba(255,150,150,0.3)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.roundRect(W/2 - 220, 140, 440, 260, 20); ctx.stroke();

  // Bouncy "Oops!" with shadow
  const bounce = Math.sin(performance.now() / 300) * 4;
  ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.font = 'bold 54px Arial';
  ctx.fillText('Oops!', W/2 + 2, 210 + bounce + 2);
  ctx.fillStyle = 'rgb(255,130,100)'; ctx.font = 'bold 54px Arial';
  ctx.fillText('Oops!', W/2, 210 + bounce);

  // Encouraging message
  ctx.fillStyle = '#fff'; ctx.font = 'bold 28px Arial';
  ctx.fillText("You can do it! Try again!", W/2, 275);

  // Animated retry button
  const pulse = 0.75 + 0.25 * Math.sin(performance.now() / 400);
  ctx.fillStyle = `rgba(100,200,100,${pulse})`;
  ctx.beginPath(); ctx.roundRect(W/2 - 130, 310, 260, 55, 12); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.font = 'bold 24px Arial';
  ctx.fillText(isTouchDevice ? 'Tap to Retry' : 'Press SPACE to Retry', W/2, 345);

  ctx.textAlign = 'left';
}

function drawWin(dt) {
  drawOverlay(0.25);
  drawConfetti(dt);
  ctx.textAlign = 'center';

  // Celebratory panel with golden glow
  ctx.shadowColor = 'rgba(255,215,0,0.4)';
  ctx.shadowBlur = 20;
  ctx.fillStyle = 'rgba(20,30,60,0.7)';
  ctx.beginPath(); ctx.roundRect(W/2 - 240, 120, 480, 300, 22); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.strokeStyle = 'rgba(255,215,0,0.4)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.roundRect(W/2 - 240, 120, 480, 300, 22); ctx.stroke();

  // Star burst behind title
  const t = performance.now() / 1000;
  ctx.save();
  ctx.translate(W/2, 190);
  ctx.rotate(t * 0.3);
  ctx.fillStyle = 'rgba(255,215,0,0.08)';
  for (let i = 0; i < 8; i++) {
    ctx.rotate(Math.PI / 4);
    ctx.fillRect(-6, -80, 12, 160);
  }
  ctx.restore();

  // Bouncy title
  const bounce = Math.sin(t * 3) * 5;
  ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.font = 'bold 56px Arial';
  ctx.fillText('AMAZING!', W/2 + 2, 200 + bounce + 2);
  ctx.fillStyle = 'rgb(255,220,50)'; ctx.font = 'bold 56px Arial';
  ctx.fillText('AMAZING!', W/2, 200 + bounce);

  // Subtitle
  ctx.fillStyle = '#fff'; ctx.font = 'bold 30px Arial';
  ctx.fillText('You reached the summit!', W/2, 260);

  // Star rating (3 stars for fun)
  for (let i = 0; i < 3; i++) {
    const sx = W/2 - 50 + i * 50;
    const sy = 310;
    const starScale = 1 + 0.1 * Math.sin(t * 4 + i * 0.8);
    ctx.save();
    ctx.translate(sx, sy);
    ctx.scale(starScale, starScale);
    ctx.fillStyle = 'rgb(255,215,40)';
    ctx.beginPath();
    for (let j = 0; j < 5; j++) {
      const angle = -Math.PI/2 + (j * 2 * Math.PI / 5);
      const r = j === 0 ? 16 : 16;
      ctx.lineTo(Math.cos(angle) * r, Math.sin(angle) * r);
      const innerAngle = angle + Math.PI / 5;
      ctx.lineTo(Math.cos(innerAngle) * 7, Math.sin(innerAngle) * 7);
    }
    ctx.closePath(); ctx.fill();
    // Star highlight
    ctx.fillStyle = 'rgba(255,255,200,0.4)';
    ctx.beginPath(); ctx.arc(-3, -4, 5, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // Play again button
  const pulse = 0.75 + 0.25 * Math.sin(t * 2.5);
  ctx.fillStyle = `rgba(80,180,255,${pulse})`;
  ctx.beginPath(); ctx.roundRect(W/2 - 130, 355, 260, 50, 12); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.font = 'bold 22px Arial';
  ctx.fillText(isTouchDevice ? 'Tap to Play Again' : 'Press SPACE to Play Again', W/2, 387);

  ctx.textAlign = 'left';
}

// Update
function update(dt) {
  if (state === 'knockback') {
    updateKnockback(dt);
    return;
  }

  let moving = false;
  if (keys['ArrowRight'] || keys['KeyD']) { playerWX += PLAYER_SPEED * dt; facingRight = true; moving = true; }
  if (keys['ArrowLeft'] || keys['KeyA']) { playerWX -= PLAYER_SPEED * dt; facingRight = false; moving = true; }
  playerMoving = moving;
  if (moving) walkTimer += dt;
  playerWX = Math.max(0, Math.min(playerWX, LEVEL_LENGTH));

  const groundY = trailY(playerWX);
  if (onGround) {
    playerWY = groundY;
    playerVY = 0;
  } else {
    playerVY += GRAVITY * dt;
    playerWY += playerVY * dt;
    if (playerWY >= groundY) { playerWY = groundY; playerVY = 0; onGround = true; }
  }

  if (invincibleTimer > 0) invincibleTimer -= dt;
  if (tutorialTimer > 0) tutorialTimer -= dt;

  // Goats
  for (const g of goats) {
    if (!g.active) continue;
    const dist = g.wx - playerWX;
    const triggerDist = g.angry ? GOAT_TRIGGER_DIST * 1.5 : GOAT_TRIGGER_DIST;
    if (dist > 0 && dist < triggerDist && !g.charging && g.windupTimer === 0) {
      if (g.angry) { g.windupTimer = 0.3; }  // angry goat barely pauses before charging
      else { g.charging = true; }
    }
    if (g.angry && g.windupTimer > 0) {
      g.windupTimer -= dt;
      if (g.windupTimer <= 0) { g.windupTimer = 0; g.charging = true; }
    }
    if (g.charging) { g.wx -= (g.angry ? GOAT_CHARGE_SPEED * 3 : GOAT_CHARGE_SPEED) * dt; g.wy = trailY(g.wx); }
    if (g.wx < playerWX - 300) g.active = false;
  }

  // Collision → knockback
  const pRect = { x: playerWX - 14, y: playerWY - 48, w: 28, h: 50 };
  if (invincibleTimer <= 0) {
    for (const g of goats) {
      if (!g.active) continue;
      const gRect = { x: g.wx - g.width/2, y: g.wy - g.height, w: g.width, h: g.height };
      if (rectsOverlap(pRect, gRect)) {
        lives--;
        g.active = false;
        if (lives <= 0) { onGameOver(); return; }
        // Launch knockback — fly back and down the slope
        kbX = playerWX; kbY = playerWY;
        kbVX = -(facingRight ? 1 : -1) * 300;  // pushed back
        kbVY = -500;                             // launched upward
        kbTimer = 2.0;
        state = 'knockback';
        return;
      }
    }
  }

  if (playerWX >= LEVEL_LENGTH) { state = 'win'; initConfetti(); }
}

function updateKnockback(dt) {
  kbVY += GRAVITY * dt;
  kbX += kbVX * dt;
  kbY += kbVY * dt;
  kbTimer -= dt;
  if (kbTimer <= 0) {
    // Reappear on the trail a little behind where they were hit
    playerWY = trailY(playerWX);
    playerVY = 0;
    onGround = true;
    invincibleTimer = INVINCIBILITY_TIME;
    state = 'playing';
  }
}

function rectsOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

// Main draw
function draw(dt) {
  if (state === 'start') { drawStartScreen(); return; }

  const progress = playerWX / LEVEL_LENGTH;
  const camWX = playerWX;
  // Intentionally under-follow Y so the trail visibly rises on screen as
  // the player climbs — at the summit the player is ~190px from top vs
  // 390px at the start, giving a real sense of gained altitude.
  const camWY = playerWY + progress * 120;
  // During knockback, gently pan camera toward flying player's X
  if (state === 'knockback') {
    // camera stays locked to playerWX (the stable ground position)
    // so the trail stays visible while the player flies off
  }

  drawGradientSky();
  drawClouds(camWX, camWY, progress);
  drawDistantMountains(camWX, camWY);
  drawMidMountains(camWX, camWY);
  drawTerrain(camWX, camWY, progress);
  drawAlpineItems(camWX, camWY);
  drawTrees(camWX, camWY, progress);
  drawSummitFlag(camWX, camWY);

  for (const g of goats) {
    if (!g.active) continue;
    const [sx, sy] = worldToScreen(g.wx, g.wy, camWX, camWY);
    if (sx > -60 && sx < W + 60) drawGoat(Math.round(sx), Math.round(sy), true, g.angry, g.windupTimer);
  }

  if (state === 'knockback') {
    // Draw the player tumbling off the mountain
    const [ksx, ksy] = worldToScreen(kbX, kbY, camWX, camWY);
    const tumble = (2.0 - kbTimer) / 2.0; // 0→1 as timer counts down
    ctx.save();
    ctx.translate(ksx, ksy);
    ctx.rotate(tumble * Math.PI * 3 * (facingRight ? 1 : -1));
    ctx.translate(-ksx, -ksy);
    drawPlayer(Math.round(ksx), Math.round(ksy), facingRight, false, false, walkTimer);
    ctx.restore();
  } else {
    const [psx, psy] = worldToScreen(playerWX, playerWY, camWX, camWY);
    drawPlayer(Math.round(psx), Math.round(psy), facingRight, invincibleTimer > 0, playerMoving, walkTimer);
  }

  drawHearts(lives);
  drawProgressBar(progress);

  // Tutorial
  if (state === 'playing' && tutorialTimer > 0) {
    const alpha = Math.min(1, tutorialTimer / 0.5);
    ctx.globalAlpha = alpha;
    // Friendly tutorial bubble
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.beginPath(); ctx.roundRect(W/2 - 240, H - 75, 480, 45, 12); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 20px Arial'; ctx.textAlign = 'center';
    const tutText = isTouchDevice
      ? 'Use the buttons to move and jump over goats!'
      : 'Arrow keys to move  ~  SPACE to jump over goats!';
    ctx.fillText(tutText, W/2, H - 46);
    ctx.textAlign = 'left'; ctx.globalAlpha = 1;
  }

  if (state === 'gameover') drawGameOver();
  if (state === 'win') drawWin(dt);
}

// ── Alpine Music System (Web Audio API) ──────────────────────────────────────
// Original melody, CC0. Inspired by traditional Austrian Ländler folk music.
// Uses scheduled oscillators — no audio files required.
let _audioCtx = null;
let _musicOn = false;
let _schedTimer = null;
let _noteIdx = 0;
let _nextNoteAt = 0;

const _BPM = 118;
const _BEAT = 60 / _BPM;

// G major Ländler melody: [frequency_Hz, duration_beats]
// Phrase A: bright ascending leap + descent
// Phrase B: waltz-feel with thirds
// Total: 16 beats ≈ 8 seconds, loops seamlessly
const _MELODY = [
  [392,0.5],[494,0.5],[587,0.5],[784,0.5],  // G4 B4 D5 G5  (leap up)
  [740,0.5],[659,0.5],[587,0.5],[494,0.5],  // F#5 E5 D5 B4 (cascade down)
  [523,0.5],[659,0.5],[784,0.5],[659,0.5],  // C5 E5 G5 E5
  [587,1.0],[392,0.5],[294,0.5],            // D5. G4 D4
  [392,0.5],[494,0.5],[587,0.5],[784,0.5],  // repeat phrase A
  [740,0.5],[659,0.5],[587,0.5],[494,0.5],
  [523,0.5],[440,0.5],[494,0.5],[587,0.5],  // C5 A4 B4 D5 (resolve)
  [392,2.0],                                // G4 hold (loop back)
];

// Oom-pah bass pattern: root on odd beats, fifth on even
const _BASS = [[196,0.45,0.12],[147,0.30,0.07]]; // G3 oom / D3 pah

function _note(freq, start, dur, gain, type) {
  if (!_audioCtx) return;
  const o = _audioCtx.createOscillator();
  const g = _audioCtx.createGain();
  o.connect(g); g.connect(_audioCtx.destination);
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(0, start);
  g.gain.linearRampToValueAtTime(gain, start + 0.025);
  g.gain.setValueAtTime(gain * 0.85, start + dur * 0.65);
  g.gain.linearRampToValueAtTime(0, start + dur);
  o.start(start); o.stop(start + dur + 0.02);
}

function _sched() {
  if (!_musicOn || !_audioCtx) return;
  const now = _audioCtx.currentTime;
  while (_nextNoteAt < now + 0.3) {
    const [freq, beats] = _MELODY[_noteIdx % _MELODY.length];
    _note(freq, _nextNoteAt, beats * _BEAT * 0.86, 0.13, 'triangle');
    // Bass oom-pah every beat
    const beatNum = Math.round(_nextNoteAt / _BEAT);
    const [bf, bd, bg] = _BASS[beatNum % 2];
    _note(bf, _nextNoteAt, bd, bg, 'sine');
    _nextNoteAt += beats * _BEAT;
    _noteIdx++;
  }
  _schedTimer = setTimeout(_sched, 100);
}

function startMusic() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (_audioCtx.state === 'suspended') _audioCtx.resume();
  if (_musicOn) return;
  _musicOn = true; _noteIdx = 0; _nextNoteAt = _audioCtx.currentTime + 0.05;
  _sched();
}

function stopMusic() {
  _musicOn = false;
  if (_schedTimer) { clearTimeout(_schedTimer); _schedTimer = null; }
}

// Game loop
function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;

  if (state === 'playing' || state === 'knockback') update(dt);
  draw(dt);
  requestAnimationFrame(gameLoop);
}

// Input
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (state === 'start' && (e.code === 'Space' || e.code === 'Enter')) {
    resetLevel();
    state = 'playing';
    startMusic(); // requires user gesture — safe to init here
  } else if (state === 'playing' && (e.code === 'Space' || e.code === 'ArrowUp')) {
    if (onGround) { playerVY = JUMP_VELOCITY; onGround = false; }
  } else if ((state === 'gameover' || state === 'win') && (e.code === 'Space' || e.code === 'Enter')) {
    stopMusic();
    state = 'start';
  }
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// ── Touch controls ─────────────────────────────────────────────────────────
// Map touch buttons to key codes
document.querySelectorAll('.touch-btn').forEach(btn => {
  const key = btn.dataset.key;
  btn.addEventListener('touchstart', e => {
    e.preventDefault();
    keys[key] = true;
    // Handle state transitions (same as keydown)
    if (state === 'start' && key === 'Space') {
      resetLevel(); state = 'playing'; startMusic();
    } else if (state === 'playing' && key === 'Space') {
      if (onGround) { playerVY = JUMP_VELOCITY; onGround = false; }
    } else if ((state === 'gameover' || state === 'win') && key === 'Space') {
      stopMusic(); state = 'start';
    }
  });
  btn.addEventListener('touchend', e => { e.preventDefault(); keys[key] = false; });
  btn.addEventListener('touchcancel', e => { keys[key] = false; });
});

// Tap canvas to start/restart on mobile
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (state === 'start') { resetLevel(); state = 'playing'; startMusic(); }
  else if (state === 'gameover' || state === 'win') { stopMusic(); state = 'start'; }
});

// Also stop music on game over (called from update)
function onGameOver() { stopMusic(); state = 'gameover'; }

// Start
resetLevel();
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
