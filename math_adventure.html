<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Math Adventure">
<link rel="apple-touch-icon" id="touchIcon">
<title>Math Adventure! 🚀</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { height: 100%; }
  body {
    font-family: 'Arial Rounded MT Bold', 'Nunito', Arial, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100%;
    min-height: 100dvh;
    display: flex;
    justify-content: center;
    align-items: safe center;
    overflow-y: auto;
    overflow-x: hidden;
    touch-action: manipulation;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  .screen { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 700px; padding: 30px 20px; }
  .screen.active { display: flex; }

  /* START SCREEN */
  .title {
    font-size: clamp(2rem, 8vw, 3.5rem);
    color: #fff;
    text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
    margin-bottom: 10px;
    text-align: center;
  }
  .subtitle {
    font-size: clamp(1rem, 3.5vw, 1.4rem);
    color: #e0d4f7;
    margin-bottom: 30px;
    text-align: center;
  }
  .mode-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 14px;
    width: 100%;
    max-width: 580px;
    margin-bottom: 30px;
  }
  .mode-btn {
    background: #fff;
    border: none;
    border-radius: 20px;
    padding: 20px 12px;
    font-size: clamp(1rem, 3vw, 1.3rem);
    font-weight: bold;
    color: #444;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    transition: transform 0.15s, box-shadow 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .mode-btn:active { transform: scale(0.95); box-shadow: 0 3px 10px rgba(0,0,0,0.15); }
  .mode-icon { font-size: clamp(2rem, 6vw, 3rem); }
  .mode-label { font-size: clamp(0.75rem, 2.5vw, 1rem); color: #888; font-weight: normal; }

  /* Back button */
  .back-btn {
    background: rgba(255,255,255,0.2);
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 8px 14px;
    font-size: clamp(0.85rem, 2.5vw, 1rem);
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.12s, background 0.12s;
    white-space: nowrap;
  }
  .back-btn:active { transform: scale(0.93); background: rgba(255,255,255,0.3); }

  /* GAME SCREEN */
  .game-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    margin-bottom: 20px;
  }
  .timer-bar {
    background: rgba(255,255,255,0.25);
    border-radius: 20px;
    height: 18px;
    flex: 1;
    margin: 0 15px;
    overflow: hidden;
  }
  .timer-fill {
    height: 100%;
    background: linear-gradient(90deg, #43e97b, #38f9d7);
    border-radius: 20px;
    transition: width 1s linear;
  }
  .timer-fill.warning { background: linear-gradient(90deg, #f7971e, #ffd200); }
  .timer-fill.danger { background: linear-gradient(90deg, #f85032, #e73827); }
  .stat-badge {
    background: rgba(255,255,255,0.2);
    color: #fff;
    padding: 8px 16px;
    border-radius: 30px;
    font-size: 1.1rem;
    font-weight: bold;
    min-width: 60px;
    text-align: center;
  }

  .streak-display {
    color: #ffd700;
    font-size: 1.2rem;
    font-weight: bold;
    height: 30px;
    display: flex;
    align-items: center;
    gap: 4px;
    margin-bottom: 5px;
  }

  .problem-card {
    background: #fff;
    border-radius: 24px;
    padding: 30px 20px 24px;
    width: 100%;
    max-width: 500px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.15);
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
  }
  .problem-text {
    font-size: clamp(2.2rem, 8vw, 4rem);
    font-weight: bold;
    color: #333;
    margin-bottom: 20px;
    letter-spacing: 4px;
  }
  .problem-text .op { color: #764ba2; }

  .answer-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    width: 100%;
    max-width: 400px;
  }
  .answer-btn {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff;
    border: none;
    border-radius: 18px;
    padding: clamp(14px, 4vw, 22px);
    font-size: clamp(1.4rem, 5vw, 2rem);
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.12s, opacity 0.12s;
    box-shadow: 0 4px 15px rgba(102,126,234,0.4);
  }
  .answer-btn:active { transform: scale(0.93); }
  .answer-btn.correct {
    background: linear-gradient(135deg, #43e97b, #38f9d7) !important;
    color: #fff;
  }
  .answer-btn.wrong {
    background: linear-gradient(135deg, #f85032, #e73827) !important;
    opacity: 0.7;
  }

  .feedback {
    position: absolute;
    top: -20px;
    font-size: 2.5rem;
    animation: popIn 0.4s ease-out;
    pointer-events: none;
  }
  @keyframes popIn {
    0% { transform: scale(0) rotate(-20deg); opacity: 0; }
    60% { transform: scale(1.3) rotate(5deg); opacity: 1; }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }

  .floating-star {
    position: fixed;
    font-size: 2rem;
    pointer-events: none;
    animation: floatUp 1.2s ease-out forwards;
    z-index: 100;
  }
  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-200px) scale(1.5); }
  }

  /* RESULTS SCREEN */
  .results-card {
    background: #fff;
    border-radius: 24px;
    padding: 30px 20px;
    width: 100%;
    max-width: 500px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.15);
    text-align: center;
  }
  .results-emoji { font-size: clamp(3rem, 10vw, 5rem); margin-bottom: 10px; }
  .results-title { font-size: clamp(1.6rem, 5vw, 2.2rem); font-weight: bold; color: #333; margin-bottom: 6px; }
  .results-subtitle { font-size: clamp(0.95rem, 3vw, 1.2rem); color: #888; margin-bottom: 20px; }
  .results-stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }
  .result-stat {
    background: #f5f3ff;
    border-radius: 14px;
    padding: 12px 8px;
  }
  .result-stat .num { font-size: clamp(1.4rem, 4vw, 2rem); font-weight: bold; color: #764ba2; }
  .result-stat .label { font-size: 0.8rem; color: #999; margin-top: 4px; }

  .stars-earned {
    font-size: clamp(1.8rem, 6vw, 2.5rem);
    margin-bottom: 16px;
    letter-spacing: 4px;
  }

  .play-again-btn {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff;
    border: none;
    border-radius: 18px;
    padding: 16px 40px;
    font-size: clamp(1.1rem, 3.5vw, 1.4rem);
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(102,126,234,0.4);
    transition: transform 0.12s;
    margin: 6px;
  }
  .play-again-btn:active { transform: scale(0.95); }
  .play-again-btn.secondary {
    background: #e8e4f0;
    color: #764ba2;
    box-shadow: none;
  }

  /* Speed high score section */
  .speed-results { width: 100%; margin-top: 10px; display: none; }
  .speed-results.visible { display: block; }
  .speed-time {
    font-size: clamp(1.4rem, 4vw, 1.8rem);
    font-weight: bold;
    color: #764ba2;
    margin-bottom: 12px;
  }
  .name-input-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    align-items: center;
    margin-bottom: 10px;
  }
  .name-input {
    border: 2px solid #ddd;
    border-radius: 14px;
    padding: 12px 16px;
    font-size: 1.1rem;
    font-weight: bold;
    width: 160px;
    text-align: center;
    outline: none;
    font-family: inherit;
    color: #333;
  }
  .name-input:focus { border-color: #764ba2; }
  .save-score-btn {
    background: linear-gradient(135deg, #43e97b, #38f9d7);
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 12px 20px;
    font-size: 1.1rem;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.12s;
  }
  .save-score-btn:active { transform: scale(0.93); }
  .save-score-btn:disabled { opacity: 0.5; }
  .saved-msg { color: #43e97b; font-weight: bold; font-size: 1rem; margin-top: 4px; }

  /* Leaderboard */
  .leaderboard-card {
    background: #fff;
    border-radius: 24px;
    padding: 30px 20px;
    width: 100%;
    max-width: 500px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.15);
    text-align: center;
  }
  .leaderboard-title {
    font-size: clamp(1.6rem, 5vw, 2.2rem);
    font-weight: bold;
    color: #333;
    margin-bottom: 20px;
  }
  .leaderboard-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 20px;
  }
  .leaderboard-table th {
    color: #999;
    font-size: 0.85rem;
    text-transform: uppercase;
    padding: 8px 6px;
    border-bottom: 2px solid #eee;
  }
  .leaderboard-table td {
    padding: 10px 6px;
    font-size: clamp(1rem, 3vw, 1.15rem);
    border-bottom: 1px solid #f0f0f0;
    color: #444;
  }
  .leaderboard-table tr:first-child td { color: #764ba2; font-weight: bold; }
  .rank-col { width: 40px; }
  .time-col { font-variant-numeric: tabular-nums; font-weight: bold; }
  .lb-tabs {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 16px;
  }
  .lb-tab {
    background: #f0ecf5;
    border: none;
    border-radius: 12px;
    padding: 8px 16px;
    font-size: clamp(0.85rem, 2.5vw, 1rem);
    font-weight: bold;
    color: #999;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .lb-tab.active {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff;
  }
  .lb-tab:active { transform: scale(0.95); }
  .no-scores { color: #bbb; font-size: 1.1rem; padding: 30px 0; }
  .view-leaderboard-btn {
    background: rgba(255,255,255,0.2);
    color: #fff;
    border: none;
    border-radius: 16px;
    padding: 12px 28px;
    font-size: clamp(1rem, 3vw, 1.2rem);
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.12s;
    margin-top: 5px;
  }
  .view-leaderboard-btn:active { transform: scale(0.95); }

  /* Level badge */
  .level-badge {
    background: linear-gradient(135deg, #ffd700, #ffaa00);
    color: #7a5600;
    padding: 6px 18px;
    border-radius: 20px;
    font-size: 1rem;
    font-weight: bold;
    margin-bottom: 15px;
  }

  /* Progress dots */
  .progress-dots {
    display: flex;
    gap: 6px;
    margin-bottom: 15px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 350px;
  }
  .dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
    transition: background 0.3s;
  }
  .dot.correct { background: #43e97b; }
  .dot.wrong { background: #f85032; }

  /* Confetti */
  .confetti-piece {
    position: fixed;
    width: 12px; height: 12px;
    border-radius: 3px;
    pointer-events: none;
    animation: confettiFall 2s ease-out forwards;
    z-index: 200;
  }
  @keyframes confettiFall {
    0% { opacity: 1; transform: translateY(0) rotate(0deg); }
    100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
  }

  /* Small phones */
  @media (max-height: 600px) {
    .screen { padding: 16px 14px; }
    .game-header { margin-bottom: 10px; }
    .progress-dots { margin-bottom: 8px; }
    .streak-display { height: 22px; font-size: 1rem; margin-bottom: 2px; }
    .problem-card { padding: 18px 14px 16px; border-radius: 18px; }
    .problem-text { margin-bottom: 14px; }
    .answer-grid { gap: 8px; }
    .dot { width: 10px; height: 10px; }
    .mode-btn { padding: 14px 10px; gap: 4px; }
    .results-card { padding: 20px 16px; }
    .results-stats { gap: 6px; margin-bottom: 14px; }
  }

  /* Landscape orientation — keep everything visible */
  @media (orientation: landscape) and (max-height: 500px) {
    .screen { padding: 10px 16px; }
    .title { margin-bottom: 4px; }
    .subtitle { margin-bottom: 14px; }
    .mode-grid { gap: 10px; }
    .mode-btn { padding: 10px 8px; gap: 2px; border-radius: 14px; }
    .mode-icon { font-size: 1.8rem; }
    .mode-label { font-size: 0.7rem; }
    .game-header { margin-bottom: 6px; }
    .progress-dots { margin-bottom: 4px; }
    .streak-display { height: 18px; font-size: 0.9rem; margin-bottom: 0; }
    .problem-card { padding: 12px 14px 10px; border-radius: 16px; }
    .problem-text { font-size: 2rem; margin-bottom: 10px; }
    .answer-grid { gap: 8px; }
    .answer-btn { padding: 10px; font-size: 1.3rem; border-radius: 12px; }
    .results-card { padding: 16px 14px; border-radius: 18px; }
    .results-emoji { font-size: 2.5rem; margin-bottom: 4px; }
    .results-title { font-size: 1.4rem; }
    .results-subtitle { margin-bottom: 10px; }
    .stars-earned { font-size: 1.5rem; margin-bottom: 8px; }
    .result-stat { padding: 8px 6px; }
    .result-stat .num { font-size: 1.2rem; }
    .play-again-btn { padding: 10px 30px; font-size: 1rem; }
  }

  /* Times table hint */
  .hint-btn {
    background: rgba(255,255,255,0.2);
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 8px 14px;
    font-size: clamp(0.85rem, 2.5vw, 1rem);
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.12s;
    display: none;
  }
  .hint-btn.visible { display: inline-block; }
  .hint-btn:active { transform: scale(0.93); }

  .times-table-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 300;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }
  .times-table-overlay.open { display: flex; }
  .times-table-card {
    background: #fff;
    border-radius: 20px;
    padding: 20px;
    max-width: 95vw;
    max-height: 85vh;
    overflow: auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    position: relative;
  }
  .times-table-close {
    position: absolute;
    top: 10px;
    right: 14px;
    background: none;
    border: none;
    font-size: 1.8rem;
    cursor: pointer;
    color: #999;
    line-height: 1;
  }
  .times-table-close:active { color: #333; }
  .times-table-title {
    font-size: clamp(1.1rem, 3.5vw, 1.4rem);
    font-weight: bold;
    color: #764ba2;
    margin-bottom: 12px;
    text-align: center;
  }
  .times-table {
    border-collapse: collapse;
    width: 100%;
  }
  .times-table th, .times-table td {
    padding: clamp(4px, 1.2vw, 8px);
    text-align: center;
    font-size: clamp(0.7rem, 2vw, 0.95rem);
    border: 1px solid #eee;
    min-width: 28px;
  }
  .times-table th {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff;
    font-weight: bold;
  }
  .times-table .corner {
    background: #764ba2;
    color: rgba(255,255,255,0.6);
    font-size: clamp(0.6rem, 1.5vw, 0.8rem);
  }
  .times-table td { color: #444; }
  .times-table tr:nth-child(even) td { background: #f9f7ff; }
</style>
</head>
<body>
<script>
(function() {
  var c = document.createElement('canvas');
  c.width = 180; c.height = 180;
  var g = c.getContext('2d');
  // Background gradient
  var bg = g.createLinearGradient(0, 0, 180, 180);
  bg.addColorStop(0, '#667eea');
  bg.addColorStop(1, '#764ba2');
  g.fillStyle = bg;
  // Rounded rect
  var r = 36;
  g.beginPath();
  g.moveTo(r, 0); g.lineTo(180 - r, 0);
  g.quadraticCurveTo(180, 0, 180, r);
  g.lineTo(180, 180 - r);
  g.quadraticCurveTo(180, 180, 180 - r, 180);
  g.lineTo(r, 180);
  g.quadraticCurveTo(0, 180, 0, 180 - r);
  g.lineTo(0, r);
  g.quadraticCurveTo(0, 0, r, 0);
  g.closePath();
  g.fill();
  // White circle
  g.fillStyle = 'rgba(255,255,255,0.15)';
  g.beginPath(); g.arc(90, 82, 50, 0, Math.PI * 2); g.fill();
  // Math symbols
  g.fillStyle = '#fff';
  g.font = 'bold 52px Arial, sans-serif';
  g.textAlign = 'center';
  g.textBaseline = 'middle';
  g.fillText('+', 55, 68);
  g.fillText('\u00d7', 125, 68);
  g.font = 'bold 36px Arial, sans-serif';
  g.fillText('\u2212', 55, 110);
  g.fillText('\u00f7', 125, 110);
  // Title
  g.font = 'bold 22px Arial, sans-serif';
  g.fillText('MATH', 90, 156);
  // Set icon
  document.getElementById('touchIcon').href = c.toDataURL('image/png');
})();
</script>

<!-- START SCREEN -->
<div id="startScreen" class="screen active">
  <div class="title">Math Adventure!</div>
  <div class="subtitle">Pick a challenge, math hero!</div>
  <div class="mode-grid">
    <button class="mode-btn" onclick="startGame('add')">
      <span class="mode-icon">➕</span>
      <span>Addition</span>
      <span class="mode-label">Put numbers together</span>
    </button>
    <button class="mode-btn" onclick="startGame('sub')">
      <span class="mode-icon">➖</span>
      <span>Subtraction</span>
      <span class="mode-label">Take numbers away</span>
    </button>
    <button class="mode-btn" onclick="startGame('mul')">
      <span class="mode-icon">✖️</span>
      <span>Multiply</span>
      <span class="mode-label">Groups of numbers</span>
    </button>
    <button class="mode-btn" onclick="startGame('div')">
      <span class="mode-icon">➗</span>
      <span>Division</span>
      <span class="mode-label">Split numbers up</span>
    </button>
    <button class="mode-btn" onclick="startGame('mix')">
      <span class="mode-icon">🎲</span>
      <span>Mixed!</span>
      <span class="mode-label">All four types</span>
    </button>
    <button class="mode-btn" onclick="startGame('challenge')">
      <span class="mode-icon">🏆</span>
      <span>Challenge</span>
      <span class="mode-label">Gets harder as you go!</span>
    </button>
    <button class="mode-btn" onclick="startGame('speed-add')">
      <span class="mode-icon">⚡➕</span>
      <span>Speed Add</span>
      <span class="mode-label">10 questions, beat the clock!</span>
    </button>
    <button class="mode-btn" onclick="startGame('speed-sub')">
      <span class="mode-icon">⚡➖</span>
      <span>Speed Sub</span>
      <span class="mode-label">10 questions, beat the clock!</span>
    </button>
    <button class="mode-btn" onclick="startGame('speed-mix')">
      <span class="mode-icon">⚡🎲</span>
      <span>Speed Mix</span>
      <span class="mode-label">10 questions, all types!</span>
    </button>
  </div>
  <button class="view-leaderboard-btn" onclick="showLeaderboard()">⚡ Speed Leaderboard</button>
</div>

<!-- GAME SCREEN -->
<div id="gameScreen" class="screen">
  <div class="game-header">
    <button class="back-btn" onclick="goHome()">&#9664; Back</button>
    <div class="stat-badge" id="scoreDisplay">0</div>
    <div class="timer-bar"><div class="timer-fill" id="timerFill"></div></div>
    <div class="stat-badge" id="questionCount">1/20</div>
    <button class="hint-btn" id="hintBtn" onclick="openTimesTable()">&#215; Table</button>
  </div>
  <div class="progress-dots" id="progressDots"></div>
  <div class="streak-display" id="streakDisplay"></div>
  <div class="problem-card" id="problemCard">
    <div class="problem-text" id="problemText"></div>
    <div class="answer-grid" id="answerGrid"></div>
  </div>
</div>

<!-- RESULTS SCREEN -->
<div id="resultsScreen" class="screen">
  <div class="results-card">
    <div class="results-emoji" id="resultsEmoji"></div>
    <div class="results-title" id="resultsTitle"></div>
    <div class="results-subtitle" id="resultsSubtitle"></div>
    <div class="stars-earned" id="starsEarned"></div>
    <div class="results-stats">
      <div class="result-stat">
        <div class="num" id="resultCorrect">0</div>
        <div class="label">Correct</div>
      </div>
      <div class="result-stat">
        <div class="num" id="resultStreak">0</div>
        <div class="label">Best Streak</div>
      </div>
      <div class="result-stat">
        <div class="num" id="resultScore">0</div>
        <div class="label">Score</div>
      </div>
    </div>
    <div class="speed-results" id="speedResults">
      <div class="speed-time" id="speedTime"></div>
      <div class="name-input-row" id="nameInputRow">
        <input class="name-input" id="playerName" type="text" placeholder="Your name" maxlength="12" autocomplete="off">
        <button class="save-score-btn" id="saveBtn" onclick="saveHighScore()">Save</button>
      </div>
      <div class="saved-msg" id="savedMsg"></div>
    </div>
    <button class="play-again-btn" onclick="startGame(lastMode)">Play Again!</button>
    <button class="play-again-btn secondary" onclick="showStart()">Home</button>
  </div>
</div>

<!-- LEADERBOARD SCREEN -->
<div id="leaderboardScreen" class="screen">
  <div class="leaderboard-card">
    <div class="leaderboard-title">⚡ Speed Leaderboard</div>
    <div id="leaderboardBody"></div>
    <button class="play-again-btn" onclick="showStart()">Back to Menu</button>
    <button class="play-again-btn secondary" onclick="startGame('speed')">Play Speed</button>
  </div>
</div>

<script>
  let totalQuestions, gameTime;
  let speedStartTime, speedElapsed;

  let mode, score, questionNum, streak, bestStreak, correctCount;
  let timeLeft, timerInterval;
  let currentAnswer, answered;
  let difficulty; // for challenge mode
  let lastMode = 'add';
  let results = [];

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function showStart() { showScreen('startScreen'); }

  function goHome() {
    clearInterval(timerInterval);
    showScreen('startScreen');
  }

  function startGame(m) {
    mode = m;
    lastMode = m;
    const isSpeed = m.startsWith('speed');
    totalQuestions = isSpeed ? 10 : 20;
    gameTime = isSpeed ? 120 : 600;
    score = 0;
    questionNum = 0;
    streak = 0;
    bestStreak = 0;
    correctCount = 0;
    difficulty = 1;
    timeLeft = gameTime;
    speedStartTime = Date.now();
    speedElapsed = 0;
    results = [];

    // Build progress dots
    const dotsEl = document.getElementById('progressDots');
    dotsEl.innerHTML = '';
    for (let i = 0; i < totalQuestions; i++) {
      const dot = document.createElement('div');
      dot.className = 'dot';
      dotsEl.appendChild(dot);
    }

    updateScore();
    updateTimer();
    updateHintBtn();
    showScreen('gameScreen');
    nextQuestion();

    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      timeLeft--;
      updateTimer();
      if (timeLeft <= 0) endGame();
    }, 1000);
  }

  function updateScore() {
    document.getElementById('scoreDisplay').textContent = score;
  }

  function updateTimer() {
    const pct = (timeLeft / gameTime) * 100;
    const fill = document.getElementById('timerFill');
    fill.style.width = pct + '%';
    fill.className = 'timer-fill' + (pct < 15 ? ' danger' : pct < 35 ? ' warning' : '');
  }

  function updateStreak() {
    const el = document.getElementById('streakDisplay');
    if (streak >= 3) {
      el.textContent = '🔥 ' + streak + ' in a row!';
    } else {
      el.textContent = '';
    }
  }

  function generateProblem() {
    let a, b, op, answer;
    const isChallenge = mode === 'challenge';
    const maxNum = isChallenge ? Math.min(10 + difficulty * 5, 50) : 20;
    const mulMax = isChallenge ? Math.min(3 + difficulty, 12) : 5;

    // Pick operation
    if (mode === 'add' || mode === 'speed-add') op = '+';
    else if (mode === 'sub' || mode === 'speed-sub') op = '-';
    else if (mode === 'mul') op = 'x';
    else if (mode === 'div') op = '/';
    else {
      // Mixed, challenge, speed-mix: randomly pick from all four
      const r = Math.random();
      op = r < 0.25 ? '+' : r < 0.5 ? '-' : r < 0.75 ? 'x' : '/';
    }

    if (op === '+') {
      a = randInt(1, maxNum);
      b = randInt(1, maxNum);
      answer = a + b;
    } else if (op === '-') {
      // Ensure no negative answers for second graders
      a = randInt(2, maxNum);
      b = randInt(1, a);
      answer = a - b;
    } else if (op === 'x') {
      // Multiplication: keep factors small for 2nd graders
      a = randInt(1, mulMax);
      b = randInt(1, mulMax);
      answer = a * b;
    } else {
      // Division: generate as multiplication in reverse so answers are always whole numbers
      answer = randInt(1, mulMax);
      b = randInt(1, mulMax);
      a = answer * b;
    }

    return { a, b, op, answer };
  }

  function randInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  function generateChoices(correct) {
    const choices = new Set([correct]);
    // Spread must be at least 4 so we can always find 3 unique distractors
    const minSpread = correct < 4 ? 5 : 3;
    const spread = correct > 20 ? randInt(minSpread, 8) : randInt(minSpread, 6);
    let attempts = 0;
    while (choices.size < 4 && attempts < 100) {
      attempts++;
      let offset = randInt(1, spread) * (Math.random() < 0.5 ? 1 : -1);
      let wrong = correct + offset;
      if (wrong >= 0 && wrong !== correct) choices.add(wrong);
    }
    // Fallback: fill with sequential numbers if loop exhausted
    let fallback = correct + 1;
    while (choices.size < 4) {
      if (!choices.has(fallback)) choices.add(fallback);
      fallback++;
    }
    return shuffle([...choices]);
  }

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function nextQuestion() {
    if (questionNum >= totalQuestions) { endGame(); return; }
    questionNum++;
    answered = false;
    document.getElementById('questionCount').textContent = questionNum + '/' + totalQuestions;

    const problem = generateProblem();
    currentAnswer = problem.answer;

    const displayOp = problem.op === 'x' ? '&times;' : problem.op === '/' ? '&divide;' : problem.op;
    document.getElementById('problemText').innerHTML =
      problem.a + ' <span class="op">' + displayOp + '</span> ' + problem.b + ' = ?';

    // Remove old feedback
    const oldFb = document.querySelector('.feedback');
    if (oldFb) oldFb.remove();

    const choices = generateChoices(problem.answer);
    const grid = document.getElementById('answerGrid');
    grid.innerHTML = '';
    choices.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'answer-btn';
      btn.textContent = c;
      btn.onclick = () => pickAnswer(btn, c);
      grid.appendChild(btn);
    });
  }

  function pickAnswer(btn, value) {
    if (answered) return;
    answered = true;

    const isCorrect = value === currentAnswer;
    const card = document.getElementById('problemCard');
    const dots = document.querySelectorAll('.dot');

    if (isCorrect) {
      btn.classList.add('correct');
      streak++;
      if (streak > bestStreak) bestStreak = streak;
      correctCount++;
      // Bonus points for streaks
      const points = 10 + (streak >= 5 ? 15 : streak >= 3 ? 10 : 0);
      score += points;
      if (mode === 'challenge') difficulty++;

      dots[questionNum - 1].classList.add('correct');
      showFeedback(card, ['⭐', '🌟', '✨', '💫', '🎉'][Math.min(streak - 1, 4)]);
      spawnFloatingStar(btn);
    } else {
      btn.classList.add('wrong');
      streak = 0;
      dots[questionNum - 1].classList.add('wrong');
      showFeedback(card, '😅');
      // Highlight correct answer
      document.querySelectorAll('.answer-btn').forEach(b => {
        if (parseInt(b.textContent) === currentAnswer) b.classList.add('correct');
      });
    }

    updateScore();
    updateStreak();
    results.push(isCorrect);

    setTimeout(nextQuestion, isCorrect ? 600 : 1200);
  }

  function showFeedback(parent, emoji) {
    const fb = document.createElement('div');
    fb.className = 'feedback';
    fb.textContent = emoji;
    parent.appendChild(fb);
  }

  function spawnFloatingStar(btn) {
    const rect = btn.getBoundingClientRect();
    const star = document.createElement('div');
    star.className = 'floating-star';
    star.textContent = '⭐';
    star.style.left = (rect.left + rect.width / 2 - 16) + 'px';
    star.style.top = rect.top + 'px';
    document.body.appendChild(star);
    setTimeout(() => star.remove(), 1200);
  }

  function endGame() {
    clearInterval(timerInterval);
    const pct = correctCount / totalQuestions;
    const stars = pct >= 0.95 ? 5 : pct >= 0.8 ? 4 : pct >= 0.65 ? 3 : pct >= 0.5 ? 2 : 1;

    let emoji, title, subtitle;
    if (pct >= 0.95) { emoji = '🏆'; title = 'AMAZING!'; subtitle = 'You are a math superstar!'; }
    else if (pct >= 0.8) { emoji = '🌟'; title = 'Great Job!'; subtitle = 'You really know your math!'; }
    else if (pct >= 0.65) { emoji = '😊'; title = 'Good Work!'; subtitle = 'Keep practicing, you\'re getting better!'; }
    else if (pct >= 0.5) { emoji = '💪'; title = 'Nice Try!'; subtitle = 'Practice makes perfect!'; }
    else { emoji = '🤗'; title = 'Keep Going!'; subtitle = 'Every try makes you smarter!'; }

    document.getElementById('resultsEmoji').textContent = emoji;
    document.getElementById('resultsTitle').textContent = title;
    document.getElementById('resultsSubtitle').textContent = subtitle;
    document.getElementById('starsEarned').textContent = '⭐'.repeat(stars) + '☆'.repeat(5 - stars);
    document.getElementById('resultCorrect').textContent = correctCount + '/' + totalQuestions;
    document.getElementById('resultStreak').textContent = bestStreak;
    document.getElementById('resultScore').textContent = score;

    // Speed mode: show elapsed time and save option
    const speedSection = document.getElementById('speedResults');
    const isSpeed = mode.startsWith('speed');
    if (isSpeed) {
      speedElapsed = ((Date.now() - speedStartTime) / 1000);
      document.getElementById('speedTime').textContent = 'Time: ' + formatTime(speedElapsed);
      document.getElementById('nameInputRow').style.display = 'flex';
      document.getElementById('savedMsg').textContent = '';
      document.getElementById('saveBtn').disabled = false;
      // Pre-fill last used name
      const lastN = localStorage.getItem('mathAdventureLastName');
      if (lastN) document.getElementById('playerName').value = lastN;
      speedSection.classList.add('visible');
    } else {
      speedSection.classList.remove('visible');
    }

    showScreen('resultsScreen');
    if (pct >= 0.65) launchConfetti();
  }

  function formatTime(seconds) {
    const m = Math.floor(seconds / 60);
    const s = Math.floor(seconds % 60);
    const ms = Math.floor((seconds % 1) * 10);
    return (m > 0 ? m + ':' : '') + (m > 0 ? String(s).padStart(2, '0') : s) + '.' + ms + 's';
  }

  const speedModes = {
    'speed-add': { key: 'SpeedAdd', label: 'Addition' },
    'speed-sub': { key: 'SpeedSub', label: 'Subtraction' },
    'speed-mix': { key: 'SpeedMix', label: 'Mixed' }
  };
  let leaderboardTab = 'speed-add';

  function getHighScores(m) {
    const k = speedModes[m] ? speedModes[m].key : 'SpeedMix';
    try { return JSON.parse(localStorage.getItem('mathAdventure' + k + 'Scores') || '[]'); }
    catch { return []; }
  }

  function saveHighScore() {
    const nameEl = document.getElementById('playerName');
    const name = nameEl.value.trim() || 'Player';
    localStorage.setItem('mathAdventureLastName', name);

    const scores = getHighScores(mode);
    scores.push({ name, time: speedElapsed, correct: correctCount, total: totalQuestions, date: Date.now() });
    scores.sort((a, b) => {
      if (b.correct !== a.correct) return b.correct - a.correct;
      return a.time - b.time;
    });
    if (scores.length > 10) scores.length = 10;
    const k = speedModes[mode] ? speedModes[mode].key : 'SpeedMix';
    localStorage.setItem('mathAdventure' + k + 'Scores', JSON.stringify(scores));

    document.getElementById('saveBtn').disabled = true;
    document.getElementById('savedMsg').textContent = 'Saved!';
  }

  function showLeaderboard(tab) {
    leaderboardTab = tab || leaderboardTab || 'speed-add';
    const body = document.getElementById('leaderboardBody');

    // Build tabs
    let tabsHtml = '<div class="lb-tabs">';
    for (const [m, info] of Object.entries(speedModes)) {
      tabsHtml += '<button class="lb-tab' + (m === leaderboardTab ? ' active' : '') + '" onclick="showLeaderboard(\'' + m + '\')">' + info.label + '</button>';
    }
    tabsHtml += '</div>';

    const scores = getHighScores(leaderboardTab);
    let tableHtml;
    if (scores.length === 0) {
      tableHtml = '<div class="no-scores">No scores yet! Play Speed ' + speedModes[leaderboardTab].label + ' to set a record.</div>';
    } else {
      tableHtml = '<table class="leaderboard-table"><tr><th class="rank-col">#</th><th>Name</th><th>Score</th><th>Time</th></tr>';
      scores.forEach((s, i) => {
        const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i + 1);
        tableHtml += '<tr><td class="rank-col">' + medal + '</td><td>' + escapeHtml(s.name) + '</td><td>' + s.correct + '/' + s.total + '</td><td class="time-col">' + formatTime(s.time) + '</td></tr>';
      });
      tableHtml += '</table>';
    }
    body.innerHTML = tabsHtml + tableHtml;
    showScreen('leaderboardScreen');
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // Times table hint
  const showHintModes = ['mul', 'mix', 'challenge', 'speed-mix'];
  function updateHintBtn() {
    const btn = document.getElementById('hintBtn');
    btn.classList.toggle('visible', showHintModes.includes(mode));
  }

  function buildTimesTable() {
    const table = document.getElementById('timesTableGrid');
    if (table.rows.length > 0) return; // already built
    let html = '<tr><th class="corner">&times;</th>';
    for (let i = 1; i <= 10; i++) html += '<th>' + i + '</th>';
    html += '</tr>';
    for (let r = 1; r <= 10; r++) {
      html += '<tr><th>' + r + '</th>';
      for (let c = 1; c <= 10; c++) html += '<td>' + (r * c) + '</td>';
      html += '</tr>';
    }
    table.innerHTML = html;
  }

  function openTimesTable() {
    buildTimesTable();
    document.getElementById('timesTableOverlay').classList.add('open');
  }

  function closeTimesTable(e) {
    if (e && e.target !== document.getElementById('timesTableOverlay')) return;
    document.getElementById('timesTableOverlay').classList.remove('open');
  }

  function launchConfetti() {
    const colors = ['#667eea', '#764ba2', '#43e97b', '#ffd700', '#f85032', '#38f9d7', '#ff6b6b'];
    for (let i = 0; i < 50; i++) {
      setTimeout(() => {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.left = Math.random() * 100 + 'vw';
        piece.style.top = '-20px';
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDuration = (1.5 + Math.random()) + 's';
        piece.style.transform = 'rotate(' + Math.random() * 360 + 'deg)';
        document.body.appendChild(piece);
        setTimeout(() => piece.remove(), 3000);
      }, i * 40);
    }
  }
</script>

<div class="times-table-overlay" id="timesTableOverlay" onclick="closeTimesTable(event)">
  <div class="times-table-card" id="timesTableCard">
    <button class="times-table-close" onclick="closeTimesTable()">&times;</button>
    <div class="times-table-title">Times Table</div>
    <table class="times-table" id="timesTableGrid"></table>
  </div>
</div>
</body>
</html>
