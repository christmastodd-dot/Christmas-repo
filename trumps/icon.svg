<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="card-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffef5"/>
      <stop offset="100%" stop-color="#f0e8d8"/>
    </linearGradient>
    <linearGradient id="felt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a6b3c"/>
      <stop offset="100%" stop-color="#0f4d28"/>
    </linearGradient>
  </defs>
  <!-- Green felt background -->
  <rect width="512" height="512" rx="96" fill="url(#felt)"/>
  <!-- Card -->
  <rect x="116" y="56" width="280" height="400" rx="24" fill="url(#card-bg)" stroke="#c9b88c" stroke-width="4"/>
  <!-- Spade symbol -->
  <path d="M256 140 c0 0 -90 70 -90 140 c0 50 40 75 75 60 c-10 30 -35 52 -35 52 h100 c0 0 -25-22 -35-52 c35 15 75-10 75-60 c0-70 -90-140 -90-140z" fill="#1a1a1a"/>
  <!-- Corner rank -->
  <text x="148" y="130" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="#1a1a1a">A</text>
  <text x="348" y="420" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="#1a1a1a" transform="rotate(180 348 400)">A</text>
</svg>
