{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2>Choose Your Franchise</h2>
    <div class="team-cards">
        {% for t in teams %}
        <form method="post" action="{{ url_for('select_team') }}" class="team-card">
            <input type="hidden" name="team_id" value="{{ t.id }}">
            <div class="team-card-info">
                <div class="team-card-name">{{ t.full_name }}</div>
                <div class="team-card-meta">{{ t.conference }} &middot; {{ t.division }} &middot; OVR <strong>{{ t.overall }}</strong></div>
            </div>
            <button type="submit" class="btn btn-sm">Select</button>
        </form>
        {% endfor %}
    </div>
</div>

<style>
    .team-cards { display: flex; flex-direction: column; gap: 0.5rem; }
    .team-card {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.7rem 0.8rem;
        background: #0f1923;
        border: 1px solid #2c3e50;
        border-radius: 6px;
        gap: 0.8rem;
    }
    .team-card:hover { border-color: #e67e22; }
    .team-card-name { font-weight: 600; font-size: 0.9rem; }
    .team-card-meta { color: #7f8c8d; font-size: 0.78rem; margin-top: 0.15rem; }
</style>
{% endblock %}
