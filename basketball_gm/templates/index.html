{% extends "base.html" %}
{% block content %}
<div style="text-align: center; padding: 3rem 1rem;">
    <img src="{{ url_for('static', filename='basketball-icon.svg') }}" alt="Basketball" style="width: 80px; height: 80px; margin-bottom: 1.5rem;">
    <h1 style="color: #e67e22; font-size: clamp(1.6rem, 6vw, 2.5rem); margin-bottom: 0.5rem;">BASKETBALL FRANCHISE MANAGER</h1>
    <p style="color: #7f8c8d; font-size: 1rem; margin-bottom: 2.5rem;">Build a dynasty. Win championships.</p>
    <form method="post" action="{{ url_for('new_game') }}">
        <button type="submit" class="btn" style="font-size: 1.1rem; padding: 0.9rem 3rem;">New Game</button>
    </form>
</div>
{% endblock %}
