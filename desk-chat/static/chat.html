<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cap Chat</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="chat-layout">
        <div class="sidebar-toggle" id="sidebar-toggle">&#9776;</div>
        <div class="sidebar-overlay" id="sidebar-overlay"></div>
        <div class="sidebar" id="sidebar">
            <h2>Members</h2>
            <div class="room-code" id="room-label"></div>
            <div class="e2e-badge">&#128274; E2E encrypted</div>
            <ul id="member-list"></ul>
            <div class="quiet-toggle" id="quiet-toggle">Quiet mode</div>
        </div>
        <div class="main">
            <div class="tabs" id="tabs"></div>
            <div class="reconnecting" id="reconnecting">Reconnecting...</div>
            <div class="messages" id="messages"></div>
            <div class="typing-indicator" id="typing"></div>
            <div class="input-bar">
                <div class="action-buttons">
                    <button class="action-btn" id="gavel-btn" title="Gavel"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#d4d4d4" stroke-width="2" stroke-linecap="round"><path d="M14.5 3.5L20.5 9.5L18 12L12 6L14.5 3.5Z" fill="#8B6914"/><path d="M12 6L6 12" stroke="#8B6914"/><path d="M3 21L10 14" stroke="#6B4F12" stroke-width="2.5"/><path d="M17 17H21V19H17V17Z" fill="#6B4F12"/></svg></button>
                    <button class="action-btn" id="countdown-btn" title="5 min countdown">&#9201;</button>
                </div>
                <input type="text" id="msg-input" placeholder="Message..." autofocus>
                <button id="send-btn">Send</button>
            </div>
        </div>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
