<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cap Chat</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="chat-layout">
        <div class="sidebar-toggle" id="sidebar-toggle">&#9776;</div>
        <div class="sidebar-overlay" id="sidebar-overlay"></div>
        <div class="sidebar" id="sidebar">
            <h2>Members</h2>
            <div class="room-code" id="room-label"></div>
            <div class="e2e-badge">&#128274; E2E encrypted</div>
            <ul id="member-list"></ul>
            <div class="quiet-toggle" id="quiet-toggle">Quiet mode</div>
        </div>
        <div class="main">
            <div class="tabs" id="tabs"></div>
            <div class="reconnecting" id="reconnecting">Reconnecting...</div>
            <div class="messages" id="messages"></div>
            <div class="typing-indicator" id="typing"></div>
            <div class="input-bar">
                <div class="action-buttons">
                    <button class="action-btn" id="gavel-btn" title="Gavel"><svg width="22" height="22" viewBox="0 0 50 50"><path d="M28 8 L38 18 L34 22 L24 12 Z" fill="#8B5E3C" stroke="#6B3F1F" stroke-width="0.5"/><rect x="26" y="7" width="14" height="5" rx="2" transform="rotate(45 33 10)" fill="#8B5E3C" stroke="#6B3F1F" stroke-width="0.5"/><line x1="29.5" y1="9.5" x2="36.5" y2="9.5" stroke="#F0A830" stroke-width="1.2" transform="rotate(45 33 10)"/><line x1="29.5" y1="12.5" x2="36.5" y2="12.5" stroke="#F0A830" stroke-width="1.2" transform="rotate(45 33 10)"/><line x1="22" y1="20" x2="36" y2="6" stroke="#9B6B42" stroke-width="3" stroke-linecap="round"/><circle cx="37.5" cy="4.5" r="3" fill="#F0A830"/><path d="M12 38 Q25 38 25 32 Q25 38 38 38 L38 42 Q25 42 25 42 Q25 42 12 42 Z" fill="#8B5E3C" stroke="#6B3F1F" stroke-width="0.5"/><path d="M15 34 Q25 34 25 30 Q25 34 35 34 L35 38 Q25 38 25 38 Q25 38 15 38 Z" fill="#9B6B42"/></svg></button>
                    <button class="action-btn" id="countdown-btn" title="5 min countdown">&#9201;</button>
                </div>
                <input type="text" id="msg-input" placeholder="Message..." autofocus>
                <button id="send-btn">Send</button>
            </div>
        </div>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
