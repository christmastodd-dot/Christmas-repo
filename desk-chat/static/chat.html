<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cap Chat</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="apple-touch-icon" href="/static/icon-180.png">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Cap Chat">
</head>
<body>
    <div class="chat-layout">
        <div class="sidebar-toggle" id="sidebar-toggle">&#9776;</div>
        <div class="sidebar-overlay" id="sidebar-overlay"></div>
        <div class="sidebar" id="sidebar">
            <h2>Members</h2>
            <div class="room-code" id="room-label"></div>
            <div class="e2e-badge">&#128274; E2E encrypted</div>
            <ul id="member-list"></ul>
            <div class="quiet-toggle" id="quiet-toggle">Quiet mode</div>
        </div>
        <div class="main">
            <div class="tabs" id="tabs"></div>
            <div class="reconnecting" id="reconnecting">Reconnecting...</div>
            <div class="messages" id="messages"></div>
            <div class="typing-indicator" id="typing"></div>
            <div class="action-bar">
                <button class="action-btn" id="celebrate-btn" title="Celebrate!">&#127878;</button>
                <button class="action-btn" id="countdown-btn" title="5 min countdown">&#9201;</button>
                <button class="action-btn" id="bingo-btn" title="Legislative Bingo">B</button>
            </div>
            <div class="input-bar">
                <input type="text" id="msg-input" placeholder="Message..." autofocus>
                <button id="send-btn">Send</button>
            </div>
        </div>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
