<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cap Chat</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="apple-touch-icon" href="/static/icon-180.png">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Cap Chat">
</head>
<body>
    <!-- Landing: Create or Join -->
    <div class="join-container" id="landing">
        <div class="join-card">
            <h1>Cap Chat</h1>
            <input type="text" id="name" placeholder="Display name" maxlength="24" autofocus>
            <label class="caps-label"><input type="checkbox" id="caps-check"> Display name in ALL CAPS</label>
            <div class="landing-buttons">
                <button id="create-btn">Create Room</button>
                <button id="join-btn" class="secondary">Join Room</button>
            </div>
        </div>
    </div>

    <!-- Create Room: user picks room code, key is generated -->
    <div class="join-container" id="create-screen" style="display:none">
        <div class="join-card">
            <h1>Create Room</h1>
            <input type="text" id="create-room" placeholder="Room code" maxlength="32">
            <div class="generated-field">
                <label>Encryption Key (auto-generated)</label>
                <div class="copyable" id="gen-key"></div>
            </div>
            <div class="e2e-hint">Share both with your participants</div>
            <button id="copy-invite-btn">Copy Invite Link</button>
            <button id="enter-room-btn" class="secondary">Enter Room</button>
            <button id="create-back-btn" class="secondary">Back</button>
            <div class="copied-msg" id="copied-msg"></div>
        </div>
    </div>

    <!-- Join Room: enter room code + key -->
    <div class="join-container" id="join-screen" style="display:none">
        <div class="join-card">
            <h1>Join Room</h1>
            <input type="text" id="join-room" placeholder="Room code" maxlength="32">
            <input type="password" id="join-secret" placeholder="Encryption key" maxlength="64">
            <div class="e2e-hint">Enter the code and key shared with you</div>
            <button id="join-go-btn">Join</button>
            <button id="join-back-btn" class="secondary">Back</button>
        </div>
    </div>

    <script>
        const nameEl = document.getElementById("name");
        const capsCheck = document.getElementById("caps-check");
        let displayName = "";

        function getDisplayName() {
            let name = nameEl.value.trim();
            if (capsCheck.checked) name = name.toUpperCase();
            return name;
        }

        // Auto-uppercase as you type when checked
        capsCheck.addEventListener("change", () => {
            if (capsCheck.checked) {
                nameEl.style.textTransform = "uppercase";
            } else {
                nameEl.style.textTransform = "";
            }
        });

        const WORDS = [
            "anchor", "barrel", "canyon", "dagger", "falcon", "garden",
            "harbor", "island", "justice", "knight", "lantern", "marble",
            "neptune", "oracle", "pardon", "quorum", "raven", "summit",
            "thunder", "union", "verdict", "walnut", "zenith", "atlas",
            "beacon", "cedar", "delta", "ember", "forge", "granite",
            "herald", "iron", "jasper", "keystone", "liberty", "mason",
            "noble", "obsidian", "pioneer", "quarry", "ridge", "silver",
            "timber", "valor", "warden", "yield", "cobalt", "drift"
        ];

        function generateKey() {
            const arr = crypto.getRandomValues(new Uint8Array(6));
            const w1 = WORDS[arr[0] % WORDS.length];
            const w2 = WORDS[arr[1] % WORDS.length];
            const w3 = WORDS[arr[2] % WORDS.length];
            const num = ((arr[3] << 16) | (arr[4] << 8) | arr[5]) % 10000;
            const pad = String(num).padStart(4, "0");
            return w1 + "-" + w2 + "-" + w3 + "-" + pad;
        }

        function goToChat(name, room, secret) {
            const params = new URLSearchParams({ name, room });
            window.location.href = "/chat?" + params.toString() + "#" + encodeURIComponent(secret);
        }

        // Check if arriving via invite link with pre-filled params
        const urlParams = new URLSearchParams(window.location.search);
        const inviteRoom = urlParams.get("room") || "";
        const inviteKey = decodeURIComponent(window.location.hash.slice(1));

        if (inviteRoom && inviteKey) {
            // Pre-fill join screen
            document.getElementById("landing").style.display = "none";
            document.getElementById("join-screen").style.display = "";
            document.getElementById("join-room").value = inviteRoom;
            document.getElementById("join-secret").value = inviteKey;
            // Still need name
            const joinNameInput = document.createElement("input");
            joinNameInput.type = "text";
            joinNameInput.placeholder = "Display name";
            joinNameInput.maxLength = 24;
            joinNameInput.id = "join-name";
            joinNameInput.autofocus = true;
            const joinCard = document.getElementById("join-screen").querySelector(".join-card");
            joinCard.insertBefore(joinNameInput, joinCard.querySelector("h1").nextSibling);
            history.replaceState(null, "", window.location.pathname);
        }

        // Landing
        document.getElementById("create-btn").addEventListener("click", () => {
            displayName = getDisplayName();
            if (!displayName) { nameEl.focus(); return; }

            const encKey = generateKey();
            document.getElementById("gen-key").textContent = encKey;

            document.getElementById("landing").style.display = "none";
            document.getElementById("create-screen").style.display = "";
            document.getElementById("create-room").focus();
        });

        document.getElementById("join-btn").addEventListener("click", () => {
            displayName = getDisplayName();
            if (!displayName) { nameEl.focus(); return; }

            document.getElementById("landing").style.display = "none";
            document.getElementById("join-screen").style.display = "";
        });

        // Create screen
        document.getElementById("copy-invite-btn").addEventListener("click", () => {
            const room = document.getElementById("create-room").value.trim();
            const key = document.getElementById("gen-key").textContent;
            if (!room) { document.getElementById("create-room").focus(); return; }
            const link = window.location.origin + "/?room=" + encodeURIComponent(room) + "#" + encodeURIComponent(key);
            navigator.clipboard.writeText(link).then(() => {
                const msg = document.getElementById("copied-msg");
                msg.textContent = "Invite link copied!";
                setTimeout(() => { msg.textContent = ""; }, 2000);
            });
        });

        document.getElementById("enter-room-btn").addEventListener("click", () => {
            const room = document.getElementById("create-room").value.trim();
            const key = document.getElementById("gen-key").textContent;
            if (!room) { document.getElementById("create-room").focus(); return; }
            goToChat(displayName, room, key);
        });

        document.getElementById("create-back-btn").addEventListener("click", () => {
            document.getElementById("create-screen").style.display = "none";
            document.getElementById("landing").style.display = "";
        });

        // Join screen
        document.getElementById("join-go-btn").addEventListener("click", () => {
            const nameOverride = document.getElementById("join-name");
            const name = nameOverride ? nameOverride.value.trim() : displayName;
            const room = document.getElementById("join-room").value.trim();
            const secret = document.getElementById("join-secret").value;
            if (!name || !room || !secret) return;
            goToChat(name, room, secret);
        });

        document.getElementById("join-back-btn").addEventListener("click", () => {
            document.getElementById("join-screen").style.display = "none";
            document.getElementById("landing").style.display = "";
        });

        nameEl.addEventListener("keydown", (e) => { if (e.key === "Enter") document.getElementById("create-btn").focus(); });
    </script>
</body>
</html>
