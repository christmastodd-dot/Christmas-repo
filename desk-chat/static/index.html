<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cap Chat</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="join-container">
        <div class="join-card">
            <h1>Cap Chat</h1>
            <input type="text" id="name" placeholder="Display name" maxlength="24" autofocus>
            <input type="text" id="room" placeholder="Room code" maxlength="32">
            <input type="password" id="secret" placeholder="Encryption key" maxlength="64">
            <div class="e2e-hint">Shared secret — never sent to the server</div>
            <button id="join">Join</button>
        </div>
    </div>
    <script>
        const nameEl = document.getElementById("name");
        const roomEl = document.getElementById("room");
        const secretEl = document.getElementById("secret");
        const joinBtn = document.getElementById("join");

        function join() {
            const name = nameEl.value.trim();
            const room = roomEl.value.trim();
            const secret = secretEl.value;
            if (!name || !room || !secret) return;
            const params = new URLSearchParams({ name, room });
            // Encryption key goes in the hash — never sent to the server
            window.location.href = "/chat?" + params.toString() + "#" + encodeURIComponent(secret);
        }

        joinBtn.addEventListener("click", join);
        nameEl.addEventListener("keydown", (e) => { if (e.key === "Enter") roomEl.focus(); });
        roomEl.addEventListener("keydown", (e) => { if (e.key === "Enter") secretEl.focus(); });
        secretEl.addEventListener("keydown", (e) => { if (e.key === "Enter") join(); });
    </script>
</body>
</html>
