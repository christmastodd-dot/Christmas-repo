<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BroFit">
  <title>BroFit — No Excuses</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💪</text></svg>">
  <link rel="apple-touch-icon" id="apple-touch-icon">
  <script>
    // Generate apple-touch-icon: bicep on dark background
    (function() {
      var c = document.createElement('canvas');
      c.width = 180; c.height = 180;
      var ctx = c.getContext('2d');
      // Dark rounded background
      ctx.fillStyle = '#0a0a0f';
      ctx.beginPath();
      ctx.roundRect(0, 0, 180, 180, 36);
      ctx.fill();
      // Orange-to-red gradient circle
      var grad = ctx.createRadialGradient(90, 90, 20, 90, 90, 70);
      grad.addColorStop(0, '#ff6b35');
      grad.addColorStop(1, '#ff3366');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(90, 90, 65, 0, Math.PI * 2);
      ctx.fill();
      // Bicep emoji
      ctx.font = '90px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('\uD83D\uDCAA', 90, 95);
      // Set as apple-touch-icon
      document.getElementById('apple-touch-icon').href = c.toDataURL('image/png');
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
  <style>
    /* ===== CSS Custom Properties ===== */
    :root {
      --bg-primary: #0a0a0f;
      --bg-card: #1a1a2e;
      --bg-card-hover: #222240;
      --bg-surface: #12121c;

      --color-orange: #ff6b35;
      --color-green: #00ff88;
      --color-purple: #7b2ff7;
      --color-red: #ff3366;
      --color-gold: #ffd700;
      --color-blue: #00bfff;

      --text-primary: #f0f0f0;
      --text-secondary: #888;
      --text-muted: #555;

      --radius-sm: 8px;
      --radius-md: 16px;
      --radius-lg: 24px;

      --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-display: 'Space Grotesk', 'Inter', sans-serif;

      --shadow-card: 0 4px 20px rgba(0, 0, 0, 0.4);
      --shadow-glow-orange: 0 0 20px rgba(255, 107, 53, 0.3);
      --shadow-glow-green: 0 0 20px rgba(0, 255, 136, 0.3);
      --shadow-glow-purple: 0 0 20px rgba(123, 47, 247, 0.3);
      --shadow-glow-red: 0 0 20px rgba(255, 51, 102, 0.3);
      --shadow-glow-gold: 0 0 20px rgba(255, 215, 0, 0.3);
      --shadow-glow-blue: 0 0 20px rgba(0, 191, 255, 0.3);
    }

    /* ===== Reset & Base ===== */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      font-size: 16px;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== Layout Container ===== */
    .app {
      max-width: 480px;
      margin: 0 auto;
      padding: 0 16px;
      padding-bottom: 40px;
    }

    /* ===== Header ===== */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 0 12px;
      position: sticky;
      top: 0;
      z-index: 100;
      background: linear-gradient(to bottom, var(--bg-primary) 70%, transparent);
      padding-bottom: 24px;
    }

    .header__logo {
      font-family: var(--font-display);
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -1px;
      background: linear-gradient(135deg, var(--color-orange), var(--color-red));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header__stats {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header__streak {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--color-orange);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .header__xp {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--bg-primary);
      background: var(--color-green);
      padding: 3px 10px;
      border-radius: 20px;
    }

    /* ===== Greeting ===== */
    .greeting {
      padding: 8px 0 20px;
    }

    .greeting__time {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    .greeting__name {
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 700;
    }

    /* ===== Profile Section ===== */
    .profile {
      background: var(--bg-card);
      border-radius: var(--radius-md);
      padding: 16px;
      margin-bottom: 24px;
      box-shadow: var(--shadow-card);
    }

    .profile__row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .profile__name-input {
      background: var(--bg-surface);
      border: 1px solid var(--text-muted);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 0.95rem;
      font-weight: 600;
      padding: 8px 12px;
      width: 60%;
      outline: none;
      transition: border-color 0.2s;
    }

    .profile__name-input:focus {
      border-color: var(--color-orange);
    }

    .profile__rank {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--color-purple);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .profile__progress-bar {
      width: 100%;
      height: 6px;
      background: var(--bg-surface);
      border-radius: 3px;
      overflow: hidden;
    }

    .profile__progress-fill {
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, var(--color-purple), var(--color-orange));
      transition: width 0.6s ease;
      width: 0%;
    }

    .profile__progress-label {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 6px;
      text-align: right;
    }

    /* ===== Section Titles ===== */
    .section-title {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ===== Daily Challenge (Featured) ===== */
    .featured-challenge {
      background: var(--bg-card);
      border: 2px solid var(--color-gold);
      border-radius: var(--radius-md);
      padding: 20px;
      margin-bottom: 32px;
      box-shadow: var(--shadow-glow-gold);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .featured-challenge::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: conic-gradient(from 0deg, transparent, rgba(255, 215, 0, 0.05), transparent);
      animation: rotateBg 6s linear infinite;
    }

    .featured-challenge__label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--color-gold);
      margin-bottom: 8px;
      position: relative;
    }

    .featured-challenge__icon {
      font-size: 2.5rem;
      margin-bottom: 8px;
      position: relative;
    }

    .featured-challenge__text {
      font-size: 1.05rem;
      font-weight: 600;
      line-height: 1.5;
      margin-bottom: 16px;
      position: relative;
    }

    .featured-challenge__timer {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-bottom: 12px;
      position: relative;
    }

    .featured-challenge__btn {
      background: var(--color-gold);
      color: var(--bg-primary);
      font-family: var(--font-body);
      font-size: 0.9rem;
      font-weight: 700;
      padding: 10px 28px;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      position: relative;
      transition: transform 0.15s;
    }

    .featured-challenge__btn:active {
      transform: scale(0.95);
    }

    .featured-challenge__btn--done {
      background: var(--color-green);
      pointer-events: none;
    }

    /* ===== Leaderboard ===== */

    /* ===== Macrocycle / Training Program ===== */
    .macrocycle {
      margin-bottom: 32px;
    }

    .macrocycle__phase {
      background: var(--bg-card);
      border-radius: var(--radius-md);
      padding: 16px;
      margin-bottom: 10px;
      box-shadow: var(--shadow-card);
      border-left: 4px solid var(--text-muted);
      transition: background 0.2s;
    }

    .macrocycle__phase--active {
      border-left-color: var(--color-orange);
      background: var(--bg-card-hover);
      box-shadow: var(--shadow-glow-orange);
    }

    .macrocycle__phase-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
    }

    .macrocycle__phase-title {
      font-family: var(--font-display);
      font-size: 0.95rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .macrocycle__phase-weeks {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .macrocycle__phase-tag {
      font-size: 0.6rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .macrocycle__phase-tag--cut { background: var(--color-red); color: #fff; }
    .macrocycle__phase-tag--build { background: var(--color-orange); color: var(--bg-primary); }
    .macrocycle__phase-tag--power { background: var(--color-purple); color: #fff; }
    .macrocycle__phase-tag--peak { background: var(--color-gold); color: var(--bg-primary); }

    .macrocycle__phase-detail {
      display: none;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--text-muted);
    }

    .macrocycle__phase-detail--open {
      display: block;
    }

    .macrocycle__split {
      margin-bottom: 10px;
    }

    .macrocycle__split-title {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--color-orange);
      margin-bottom: 4px;
    }

    .macrocycle__split-exercises {
      font-size: 0.82rem;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    .macrocycle__nutrition-note {
      font-size: 0.78rem;
      color: var(--color-green);
      font-weight: 600;
      margin-top: 8px;
      padding: 8px;
      background: rgba(0, 255, 136, 0.08);
      border-radius: var(--radius-sm);
    }

    .macrocycle__progress {
      display: flex;
      gap: 3px;
      margin-bottom: 16px;
    }

    .macrocycle__progress-seg {
      flex: 1;
      height: 6px;
      border-radius: 3px;
      background: var(--bg-card);
    }

    .macrocycle__progress-seg--done {
      background: var(--color-green);
    }

    .macrocycle__progress-seg--active {
      background: var(--color-orange);
      animation: pulse 1.5s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .macrocycle__week-label {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 12px;
    }

    .leaderboard {
      margin-bottom: 32px;
    }

    .leaderboard__list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .leaderboard__item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg-card);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      transition: background 0.2s;
    }

    .leaderboard__item--you {
      background: var(--bg-card-hover);
      border: 1px solid var(--color-orange);
      box-shadow: var(--shadow-glow-orange);
    }

    .leaderboard__pos {
      font-size: 1rem;
      font-weight: 900;
      width: 28px;
      text-align: center;
      color: var(--text-secondary);
    }

    .leaderboard__item:nth-child(1) .leaderboard__pos { color: var(--color-gold); }
    .leaderboard__item:nth-child(2) .leaderboard__pos { color: #c0c0c0; }
    .leaderboard__item:nth-child(3) .leaderboard__pos { color: #cd7f32; }

    .leaderboard__name {
      flex: 1;
      font-weight: 600;
      font-size: 0.9rem;
    }

    .leaderboard__xp {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--color-green);
    }

    .leaderboard__rank-badge {
      font-size: 0.65rem;
      font-weight: 700;
      color: var(--color-purple);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ===== Footer ===== */
    .footer {
      text-align: center;
      padding: 24px 0;
      border-top: 1px solid var(--text-muted);
    }

    .footer__tagline {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-secondary);
      font-style: italic;
      transition: opacity 0.3s;
    }

    .footer__brand {
      font-size: 0.65rem;
      color: var(--text-muted);
      margin-top: 8px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* ===== PR Log Toggle ===== */
    .pr-log-toggle {
      background: transparent;
      color: var(--color-gold);
      font-family: var(--font-body);
      font-size: 0.7rem;
      font-weight: 700;
      padding: 3px 10px;
      border: 1.5px solid var(--color-gold);
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    .pr-log-toggle:active {
      transform: scale(0.95);
    }

    .pr-log-toggle--open {
      background: var(--color-gold);
      color: var(--bg-primary);
    }

    .weighin-toggle {
      background: transparent;
      color: var(--color-green);
      font-family: var(--font-body);
      font-size: 0.7rem;
      font-weight: 700;
      padding: 3px 10px;
      border: 1.5px solid var(--color-green);
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    .weighin-toggle:active {
      transform: scale(0.95);
    }

    .weighin-toggle--open {
      background: var(--color-green);
      color: var(--bg-primary);
    }

    .weighin-panel {
      display: none;
      margin-bottom: 8px;
    }

    .weighin-panel--open {
      display: block;
    }

    .pr-log {
      display: none;
      margin-bottom: 8px;
    }

    .pr-log--open {
      display: block;
    }

    /* ===== PR Tracker ===== */
    .pr-tracker {
      margin-bottom: 32px;
    }

    .pr-tracker__lift {
      background: var(--bg-card);
      border-radius: var(--radius-md);
      padding: 16px;
      margin-bottom: 10px;
      box-shadow: var(--shadow-card);
    }

    .pr-tracker__lift-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .pr-tracker__lift-name {
      font-family: var(--font-display);
      font-size: 0.95rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .pr-tracker__lift-best {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--color-gold);
    }

    .pr-tracker__input-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
    }

    .pr-tracker__input {
      flex: 1;
      min-width: 0;
      background: var(--bg-surface);
      border: 1px solid var(--text-muted);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 0.9rem;
      padding: 8px 10px;
      outline: none;
      transition: border-color 0.2s;
    }

    .pr-tracker__input:focus {
      border-color: var(--color-gold);
    }

    .pr-tracker__input--date {
      flex: 0 0 auto;
      width: 100%;
      color-scheme: dark;
      font-size: 0.8rem;
      padding: 6px 10px;
      color: var(--text-secondary);
    }

    .pr-tracker__add-btn {
      background: var(--color-gold);
      color: var(--bg-primary);
      font-family: var(--font-body);
      font-size: 0.8rem;
      font-weight: 700;
      padding: 8px 14px;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      white-space: nowrap;
      transition: transform 0.15s;
    }

    .pr-tracker__add-btn:active {
      transform: scale(0.95);
    }

    .pr-tracker__history {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }

    .pr-tracker__history--open {
      max-height: 500px;
    }

    .pr-tracker__history-toggle {
      font-size: 0.75rem;
      color: var(--text-secondary);
      cursor: pointer;
      background: none;
      border: none;
      font-family: var(--font-body);
      padding: 4px 0;
      margin-bottom: 6px;
    }

    .pr-tracker__history-toggle:hover {
      color: var(--text-primary);
    }

    .pr-tracker__entry {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 0.8rem;
    }

    .pr-tracker__entry-value {
      font-weight: 700;
      color: var(--text-primary);
    }

    .pr-tracker__entry-date {
      color: var(--text-muted);
    }

    .pr-tracker__entry-badge {
      font-size: 0.65rem;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 8px;
      background: var(--color-gold);
      color: var(--bg-primary);
    }

    .pr-tracker__entry-delete {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.75rem;
      padding: 2px 4px;
      transition: color 0.15s;
    }

    .pr-tracker__entry-delete:hover {
      color: var(--color-red);
    }

    .pr-tracker__chart {
      height: 60px;
      display: flex;
      align-items: flex-end;
      gap: 3px;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    .pr-tracker__chart-bar {
      flex: 1;
      background: var(--color-purple);
      border-radius: 2px 2px 0 0;
      min-height: 4px;
      transition: height 0.3s;
      position: relative;
    }

    .pr-tracker__chart-bar--best {
      background: var(--color-gold);
    }

    /* ===== PR Leaderboard ===== */
    .pr-leaderboard {
      margin-bottom: 32px;
    }

    .pr-leaderboard__tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .pr-leaderboard__tab {
      background: var(--bg-card);
      border: 1px solid var(--text-muted);
      border-radius: 20px;
      color: var(--text-secondary);
      font-family: var(--font-body);
      font-size: 0.75rem;
      font-weight: 700;
      padding: 6px 14px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .pr-leaderboard__tab--active {
      background: var(--color-gold);
      color: var(--bg-primary);
      border-color: var(--color-gold);
    }

    .pr-leaderboard__table {
      width: 100%;
      background: var(--bg-card);
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: var(--shadow-card);
    }

    .pr-leaderboard__row {
      display: flex;
      align-items: center;
      padding: 12px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      gap: 10px;
    }

    .pr-leaderboard__row:last-child {
      border-bottom: none;
    }

    .pr-leaderboard__row--you {
      background: var(--bg-card-hover);
      box-shadow: inset 3px 0 0 var(--color-orange);
    }

    .pr-leaderboard__row--1st {
      box-shadow: inset 3px 0 0 var(--color-gold);
    }

    .pr-leaderboard__rank {
      font-size: 1rem;
      font-weight: 900;
      width: 28px;
      text-align: center;
    }

    .pr-leaderboard__name {
      flex: 1;
      font-weight: 600;
      font-size: 0.85rem;
    }

    .pr-leaderboard__value {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--color-gold);
    }

    .pr-leaderboard__delta {
      font-size: 0.7rem;
      color: var(--color-green);
      font-weight: 600;
    }

    /* ===== Weight Tracker ===== */
    .weight-tracker {
      margin-bottom: 32px;
    }

    .weight-tracker__card {
      background: var(--bg-card);
      border-radius: var(--radius-md);
      padding: 16px;
      box-shadow: var(--shadow-card);
      margin-bottom: 10px;
    }

    .weight-tracker__stats {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
    }

    .weight-tracker__stat {
      flex: 1;
      text-align: center;
      padding: 10px 6px;
      background: var(--bg-surface);
      border-radius: var(--radius-sm);
    }

    .weight-tracker__stat-value {
      font-family: var(--font-display);
      font-size: 1.3rem;
      font-weight: 700;
    }

    .weight-tracker__stat-value--green { color: var(--color-green); }
    .weight-tracker__stat-value--gold { color: var(--color-gold); }
    .weight-tracker__stat-value--orange { color: var(--color-orange); }

    .weight-tracker__stat-label {
      font-size: 0.65rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 2px;
    }

    .weight-tracker__input-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }

    .weight-tracker__input {
      flex: 1;
      min-width: 0;
      background: var(--bg-surface);
      border: 1px solid var(--text-muted);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 0.9rem;
      padding: 8px 10px;
      outline: none;
      transition: border-color 0.2s;
    }

    .weight-tracker__input:focus {
      border-color: var(--color-green);
    }

    .weight-tracker__input--date {
      flex: 0 0 auto;
      width: 100%;
      color-scheme: dark;
      font-size: 0.8rem;
      padding: 6px 10px;
      color: var(--text-secondary);
    }

    .weight-tracker__log-btn {
      background: var(--color-green);
      color: var(--bg-primary);
      font-family: var(--font-body);
      font-size: 0.8rem;
      font-weight: 700;
      padding: 8px 14px;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      white-space: nowrap;
      transition: transform 0.15s;
    }

    .weight-tracker__log-btn:active {
      transform: scale(0.95);
    }

    .weight-tracker__chart {
      height: 70px;
      display: flex;
      align-items: flex-end;
      gap: 2px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    .weight-tracker__chart-bar {
      flex: 1;
      background: var(--color-green);
      border-radius: 2px 2px 0 0;
      min-height: 4px;
      transition: height 0.3s;
      opacity: 0.6;
    }

    .weight-tracker__chart-bar--latest {
      opacity: 1;
      background: var(--color-orange);
    }

    .weight-tracker__history-toggle {
      font-size: 0.75rem;
      color: var(--text-secondary);
      cursor: pointer;
      background: none;
      border: none;
      font-family: var(--font-body);
      padding: 4px 0;
      margin-top: 8px;
    }

    .weight-tracker__history {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }

    .weight-tracker__history--open {
      max-height: 400px;
      overflow-y: auto;
    }

    .weight-tracker__entry {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 0.8rem;
    }

    .weight-tracker__entry-value {
      font-weight: 700;
    }

    .weight-tracker__entry-date {
      color: var(--text-muted);
    }

    .weight-tracker__entry-delta {
      font-size: 0.75rem;
      font-weight: 600;
    }

    .weight-tracker__entry-delta--loss { color: var(--color-green); }
    .weight-tracker__entry-delta--gain { color: var(--color-red); }

    .weight-tracker__entry-delete {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.75rem;
      padding: 2px 4px;
    }

    .weight-tracker__entry-delete:hover {
      color: var(--color-red);
    }

    /* ===== Weight Loss Leaderboard ===== */
    .weight-lb {
      margin-bottom: 32px;
    }

    .weight-lb__tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }

    .weight-lb__tab {
      flex: 1;
      background: var(--bg-card);
      border: 1px solid var(--text-muted);
      border-radius: 20px;
      color: var(--text-secondary);
      font-family: var(--font-body);
      font-size: 0.75rem;
      font-weight: 700;
      padding: 6px 14px;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
    }

    .weight-lb__tab--active {
      background: var(--color-green);
      color: var(--bg-primary);
      border-color: var(--color-green);
    }

    .weight-lb__table {
      background: var(--bg-card);
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: var(--shadow-card);
    }

    .weight-lb__row {
      display: flex;
      align-items: center;
      padding: 12px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      gap: 10px;
    }

    .weight-lb__row:last-child { border-bottom: none; }

    .weight-lb__row--you {
      background: var(--bg-card-hover);
      box-shadow: inset 3px 0 0 var(--color-green);
    }

    .weight-lb__row--1st {
      box-shadow: inset 3px 0 0 var(--color-gold);
    }

    .weight-lb__rank {
      font-size: 1rem;
      font-weight: 900;
      width: 28px;
      text-align: center;
    }

    .weight-lb__name {
      flex: 1;
      font-weight: 600;
      font-size: 0.85rem;
    }

    .weight-lb__value {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--color-green);
    }

    .weight-lb__detail {
      font-size: 0.7rem;
      color: var(--text-secondary);
      text-align: right;
      min-width: 60px;
    }

    /* ===== Animations ===== */
    @keyframes slideUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes rotateBg {
      to { transform: rotate(360deg); }
    }

    @keyframes confettiBurst {
      0% { transform: scale(0); opacity: 1; }
      50% { transform: scale(1.3); opacity: 0.8; }
      100% { transform: scale(1.6); opacity: 0; }
    }

    .confetti-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 80px;
      height: 80px;
      margin: -40px 0 0 -40px;
      border-radius: 50%;
      border: 4px solid var(--color-green);
      animation: confettiBurst 0.6s ease-out forwards;
      pointer-events: none;
    }

    /* ===== Responsive: Tablet ===== */
    @media (min-width: 768px) {
      .app {
        max-width: 700px;
      }

    }

    /* ===== Responsive: Desktop ===== */
    @media (min-width: 1024px) {
      .app {
        max-width: 800px;
        padding: 0 32px;
      }

      .header__logo {
        font-size: 2.2rem;
      }
    }
  </style>
</head>
<body>
  <div class="app">

    <!-- Header -->
    <header class="header">
      <div class="header__logo">BROFIT</div>
      <div class="header__stats">
        <button class="pr-log-toggle" id="pr-log-toggle" onclick="togglePRLog()">PR Log</button>
        <button class="weighin-toggle" id="weighin-toggle" onclick="toggleWeighIn()">Weigh-In</button>
        <div class="header__streak" id="header-streak"></div>
        <div class="header__xp" id="header-xp">0 XP</div>
      </div>
    </header>

    <!-- PR Log (appears near top when opened) -->
    <div class="pr-log" id="pr-log">
      <div class="section-title">2026 PR</div>
      <div class="pr-tracker" id="pr-tracker"></div>
      <div class="section-title">PR Leaderboard</div>
      <div class="pr-leaderboard" id="pr-leaderboard">
        <div class="pr-leaderboard__tabs" id="pr-leaderboard-tabs"></div>
        <div class="pr-leaderboard__table" id="pr-leaderboard-table"></div>
      </div>
    </div>

    <!-- Weight Tracker (appears near top when opened) -->
    <div class="weighin-panel" id="weighin-panel">
      <div class="section-title">Weigh-In</div>
      <div class="weight-tracker" id="weight-tracker"></div>
      <div class="section-title">Weight Loss Leaderboard</div>
      <div class="weight-lb" id="weight-lb">
        <div class="weight-lb__tabs" id="weight-lb-tabs"></div>
        <div class="weight-lb__table" id="weight-lb-table"></div>
      </div>
    </div>

    <!-- Greeting -->
    <div class="greeting">
      <div class="greeting__time" id="greeting-time"></div>
      <div class="greeting__name" id="greeting-name">What's good, king</div>
    </div>

    <!-- Profile -->
    <section class="profile" id="profile">
      <div class="profile__row">
        <input class="profile__name-input" id="name-input" type="text" placeholder="Your name" maxlength="20">
        <span class="profile__rank" id="profile-rank">NEWBIE</span>
      </div>
      <div class="profile__progress-bar">
        <div class="profile__progress-fill" id="progress-fill"></div>
      </div>
      <div class="profile__progress-label" id="progress-label">0 / 100 XP to next rank</div>
    </section>

    <!-- Daily Challenge -->
    <div class="section-title">Daily Challenge</div>
    <div class="featured-challenge" id="featured-challenge">
      <div class="featured-challenge__label">Today's Challenge</div>
      <div class="featured-challenge__icon" id="challenge-icon">💪</div>
      <div class="featured-challenge__text" id="challenge-text">Loading...</div>
      <div class="featured-challenge__timer" id="challenge-timer"></div>
      <button class="featured-challenge__btn" id="challenge-btn">I Did This (+50 XP)</button>
    </div>

    <!-- Macrocycle / Training Program -->
    <div class="section-title">The Program</div>
    <div class="macrocycle" id="macrocycle">
      <div class="macrocycle__week-label" id="macro-week-label"></div>
      <div class="macrocycle__progress" id="macro-progress"></div>
      <!-- Phases rendered by JS -->
    </div>

    <!-- Leaderboard -->
    <div class="section-title">The Crew</div>
    <section class="leaderboard" id="leaderboard">
      <ol class="leaderboard__list" id="leaderboard-list">
        <!-- Rendered by JS -->
      </ol>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <div class="footer__tagline" id="footer-tagline">No excuses. No days off. No mercy.</div>
      <div class="footer__brand">BroFit 2026</div>
    </footer>

  </div>

  <script>
    // ===== Daily Challenges =====

    const dailyChallenges = [
      { text: "100 pushups today. Split them however you want. First to finish screenshots the crew.", icon: "💪", category: "challenge", spice: 2, xp: 50 },
      { text: "10-minute plank challenge. Accumulated. Timer's running.", icon: "⏱️", category: "challenge", spice: 2, xp: 50 },
      { text: "Walk 10,000 steps today. No excuses. Screenshot your step counter tonight.", icon: "🚶", category: "challenge", spice: 1, xp: 50 },
      { text: "Cold shower after your workout. 60 seconds minimum. You won't.", icon: "🥶", category: "challenge", spice: 3, xp: 50 },
      { text: "200 bodyweight squats today. Your legs should be shaking by dinner.", icon: "🦵", category: "challenge", spice: 2, xp: 50 },
      { text: "No sugar today. Zero. Read the labels. Report back to the crew tonight.", icon: "🚫", category: "challenge", spice: 3, xp: 50 },
      { text: "Max pull-ups in one set. Post your number. Lowest number buys post-workout shakes.", icon: "🏆", category: "challenge", spice: 2, xp: 50 },
      { text: "Stretch for 15 minutes. Actually stretch. Not just touching your toes once and calling it.", icon: "🧘", category: "challenge", spice: 1, xp: 50 },
      { text: "Cook every meal from scratch today. No takeout, no frozen stuff. Chef mode activated.", icon: "👨‍🍳", category: "challenge", spice: 2, xp: 50 },
      { text: "50 burpees. Yeah, burpees. The exercise everyone hates because it actually works.", icon: "🫠", category: "challenge", spice: 3, xp: 50 },
      { text: "Drink a gallon of water today. Carry the jug. Own it. Hydration is not optional.", icon: "💧", category: "challenge", spice: 1, xp: 50 },
      { text: "Morning workout today. Before 8 AM. Set the alarm. Be a morning person for once.", icon: "🌅", category: "challenge", spice: 2, xp: 50 },
      { text: "Tabata finisher after your workout. 4 minutes of hell. Pick any exercise. Go.", icon: "🔔", category: "challenge", spice: 3, xp: 50 },
      { text: "Hit a muscle group you've been neglecting. You know which one. Don't lie to yourself.", icon: "🪞", category: "challenge", spice: 1, xp: 50 },
      { text: "No phone during your workout. Leave it in the locker. Focus mode.", icon: "📵", category: "challenge", spice: 2, xp: 50 }
    ];

    // ===== Time Greeting =====

    function getTimeGreeting() {
      const hour = new Date().getHours();
      if (hour >= 5 && hour < 12) return 'Rise and grind ☀️';
      if (hour >= 12 && hour < 17) return 'Fuel up 🔥';
      if (hour >= 17 && hour < 22) return 'Finish strong 💪';
      return 'Rest up king 😴';
    }

    // ===== Pick Daily Challenge =====

    function getDailyChallenge() {
      // Use the date as a seed so everyone sees the same challenge each day
      const today = new Date();
      const seed = today.getFullYear() * 10000 + (today.getMonth() + 1) * 100 + today.getDate();
      const idx = seed % dailyChallenges.length;
      return dailyChallenges[idx];
    }

    // ===== Rank System =====

    const ranks = [
      { name: 'NEWBIE', threshold: 0 },
      { name: 'GYM BRO', threshold: 100 },
      { name: 'IRON ADDICT', threshold: 300 },
      { name: 'ABSOLUTE UNIT', threshold: 600 },
      { name: 'GREEK GOD', threshold: 1000 },
      { name: 'TITAN', threshold: 2000 }
    ];

    function getRank(xp) {
      for (let i = ranks.length - 1; i >= 0; i--) {
        if (xp >= ranks[i].threshold) return ranks[i];
      }
      return ranks[0];
    }

    function getNextRank(xp) {
      for (let i = 0; i < ranks.length; i++) {
        if (xp < ranks[i].threshold) return ranks[i];
      }
      return null; // maxed out
    }

    // ===== localStorage Persistence =====

    function loadState() {
      return {
        name: localStorage.getItem('brofit_name') || '',
        xp: parseInt(localStorage.getItem('brofit_xp') || '0', 10),
        streak: parseInt(localStorage.getItem('brofit_streak') || '0', 10),
        lastVisit: localStorage.getItem('brofit_last_visit') || '',
        dailyChallengeCompleted: localStorage.getItem('brofit_daily_done') || '',
        regenCount: parseInt(localStorage.getItem('brofit_regen_count') || '0', 10)
      };
    }

    function saveState(state) {
      localStorage.setItem('brofit_name', state.name);
      localStorage.setItem('brofit_xp', state.xp.toString());
      localStorage.setItem('brofit_streak', state.streak.toString());
      localStorage.setItem('brofit_last_visit', state.lastVisit);
      localStorage.setItem('brofit_daily_done', state.dailyChallengeCompleted);
      localStorage.setItem('brofit_regen_count', state.regenCount.toString());
    }

    let appState = loadState();

    // ===== Streak Tracking =====

    function getTodayString() {
      const d = new Date();
      return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }

    function getYesterdayString() {
      const d = new Date();
      d.setDate(d.getDate() - 1);
      return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }

    function updateStreak() {
      const today = getTodayString();
      const yesterday = getYesterdayString();

      if (appState.lastVisit === today) {
        // Already visited today, no change
        return;
      }

      if (appState.lastVisit === yesterday) {
        // Consecutive day
        appState.streak += 1;
      } else if (appState.lastVisit === '') {
        // First visit
        appState.streak = 1;
      } else {
        // Streak broken
        appState.streak = 1;
      }

      appState.lastVisit = today;

      // Reset daily challenge completion for new day
      if (appState.dailyChallengeCompleted !== today) {
        appState.dailyChallengeCompleted = '';
        appState.regenCount = 0;
      }

      // Daily open XP
      addXP(10);
    }

    // ===== Weigh-In Toggle =====

    function toggleWeighIn() {
      var panel = document.getElementById('weighin-panel');
      var btn = document.getElementById('weighin-toggle');
      // Close PR log if open
      var prLog = document.getElementById('pr-log');
      if (prLog.classList.contains('pr-log--open')) {
        prLog.classList.remove('pr-log--open');
        document.getElementById('pr-log-toggle').classList.remove('pr-log-toggle--open');
        document.getElementById('pr-log-toggle').textContent = 'PR Log';
      }
      var isOpen = panel.classList.toggle('weighin-panel--open');
      btn.classList.toggle('weighin-toggle--open', isOpen);
      btn.textContent = isOpen ? 'Close' : 'Weigh-In';
      if (isOpen) setTimeout(function() {
        var top = panel.getBoundingClientRect().top + window.scrollY - document.querySelector('.header').offsetHeight - 8;
        window.scrollTo({ top: top, behavior: 'smooth' });
      }, 10);
    }

    // ===== PR Log Toggle =====

    function togglePRLog() {
      var log = document.getElementById('pr-log');
      var btn = document.getElementById('pr-log-toggle');
      // Close weigh-in if open
      var weighin = document.getElementById('weighin-panel');
      if (weighin.classList.contains('weighin-panel--open')) {
        weighin.classList.remove('weighin-panel--open');
        document.getElementById('weighin-toggle').classList.remove('weighin-toggle--open');
        document.getElementById('weighin-toggle').textContent = 'Weigh-In';
      }
      var isOpen = log.classList.toggle('pr-log--open');
      btn.classList.toggle('pr-log-toggle--open', isOpen);
      btn.textContent = isOpen ? 'Close' : 'PR Log';
      if (isOpen) setTimeout(function() {
        var top = log.getBoundingClientRect().top + window.scrollY - document.querySelector('.header').offsetHeight - 8;
        window.scrollTo({ top: top, behavior: 'smooth' });
      }, 10);
    }

    // ===== PR Tracker =====

    const liftDefs = [
      { key: 'bench', name: 'Bench Press', icon: '🏋️', unit: 'lbs' },
      { key: 'squat', name: 'Squat', icon: '🦵', unit: 'lbs' },
      { key: 'deadlift', name: 'Deadlift', icon: '💀', unit: 'lbs' },
      { key: 'mile', name: 'Mile Time', icon: '🏃', unit: 'time' }
    ];

    // Mock crew PRs for leaderboard
    const crewPRs = {
      bench:    [{ name: 'Jake', value: 275 }, { name: 'Marcus', value: 315 }, { name: 'Dev', value: 225 }, { name: 'Tyler', value: 255 }, { name: 'Chris', value: 195 }, { name: 'Aiden', value: 185 }],
      squat:    [{ name: 'Jake', value: 365 }, { name: 'Marcus', value: 405 }, { name: 'Dev', value: 315 }, { name: 'Tyler', value: 345 }, { name: 'Chris', value: 275 }, { name: 'Aiden', value: 245 }],
      deadlift: [{ name: 'Jake', value: 425 }, { name: 'Marcus', value: 495 }, { name: 'Dev', value: 365 }, { name: 'Tyler', value: 405 }, { name: 'Chris', value: 335 }, { name: 'Aiden', value: 295 }],
      mile:     [{ name: 'Jake', value: 398 }, { name: 'Marcus', value: 372 }, { name: 'Dev', value: 445 }, { name: 'Tyler', value: 410 }, { name: 'Chris', value: 480 }, { name: 'Aiden', value: 520 }]
    };

    function loadPRHistory(liftKey) {
      const raw = localStorage.getItem('brofit_pr_' + liftKey);
      return raw ? JSON.parse(raw) : [];
    }

    function savePRHistory(liftKey, history) {
      localStorage.setItem('brofit_pr_' + liftKey, JSON.stringify(history));
    }

    function formatTime(totalSeconds) {
      const mins = Math.floor(totalSeconds / 60);
      const secs = totalSeconds % 60;
      return mins + ':' + String(secs).padStart(2, '0');
    }

    function parseTimeInput(str) {
      // Accept "M:SS" or just seconds
      str = str.trim();
      if (str.indexOf(':') !== -1) {
        var parts = str.split(':');
        return parseInt(parts[0], 10) * 60 + parseInt(parts[1], 10);
      }
      return parseInt(str, 10);
    }

    function formatPRValue(value, unit) {
      if (unit === 'time') return formatTime(value);
      return value + ' lbs';
    }

    function getBestPR(history, unit) {
      if (history.length === 0) return null;
      if (unit === 'time') {
        return history.reduce(function(best, e) { return e.value < best.value ? e : best; });
      }
      return history.reduce(function(best, e) { return e.value > best.value ? e : best; });
    }

    function renderPRTracker() {
      var container = document.getElementById('pr-tracker');
      container.innerHTML = '';

      liftDefs.forEach(function(lift) {
        var history = loadPRHistory(lift.key);
        var best = getBestPR(history, lift.unit);
        var today = getTodayString();

        var liftEl = document.createElement('div');
        liftEl.className = 'pr-tracker__lift';

        // Header
        var bestDisplay = best ? formatPRValue(best.value, lift.unit) : '—';
        var headerHTML =
          '<div class="pr-tracker__lift-header">' +
            '<div class="pr-tracker__lift-name"><span>' + lift.icon + '</span> ' + lift.name + '</div>' +
            '<div class="pr-tracker__lift-best">PR: ' + bestDisplay + '</div>' +
          '</div>';

        // Input row
        var placeholder = lift.unit === 'time' ? 'M:SS (e.g. 6:30)' : 'Weight (lbs)';
        var inputHTML =
          '<div class="pr-tracker__input-row">' +
            '<input class="pr-tracker__input" type="text" placeholder="' + placeholder + '" data-lift="' + lift.key + '" data-unit="' + lift.unit + '">' +
            '<input class="pr-tracker__input pr-tracker__input--date" type="date" value="' + today + '" data-lift-date="' + lift.key + '">' +
            '<button class="pr-tracker__add-btn" onclick="addPR(\'' + lift.key + '\')">Log</button>' +
          '</div>';

        // Mini chart (last 10 entries)
        var chartHTML = '';
        if (history.length > 1) {
          var recent = history.slice(-10);
          var values = recent.map(function(e) { return e.value; });
          var maxVal = Math.max.apply(null, values);
          var minVal = Math.min.apply(null, values);
          var range = maxVal - minVal || 1;
          var bestVal = best ? best.value : null;

          chartHTML = '<div class="pr-tracker__chart">';
          recent.forEach(function(e) {
            var pct;
            if (lift.unit === 'time') {
              pct = ((maxVal - e.value) / range) * 80 + 20;
            } else {
              pct = ((e.value - minVal) / range) * 80 + 20;
            }
            var isBest = e.value === bestVal;
            chartHTML += '<div class="pr-tracker__chart-bar' + (isBest ? ' pr-tracker__chart-bar--best' : '') + '" style="height:' + pct + '%" title="' + formatPRValue(e.value, lift.unit) + ' — ' + e.date + '"></div>';
          });
          chartHTML += '</div>';
        }

        // History entries
        var historyHTML = '';
        if (history.length > 0) {
          var sorted = history.slice().reverse();
          historyHTML =
            '<button class="pr-tracker__history-toggle" onclick="togglePRHistory(this)">Show history (' + history.length + ')</button>' +
            '<div class="pr-tracker__history">';
          sorted.forEach(function(e, i) {
            var isBest = best && e.value === best.value && e.date === best.date;
            var realIdx = history.length - 1 - i;
            historyHTML +=
              '<div class="pr-tracker__entry">' +
                '<span class="pr-tracker__entry-value">' + formatPRValue(e.value, lift.unit) + '</span>' +
                (isBest ? ' <span class="pr-tracker__entry-badge">PR</span>' : '') +
                '<span class="pr-tracker__entry-date">' + e.date + '</span>' +

        }

        liftEl.innerHTML = headerHTML + inputHTML + chartHTML + historyHTML;
        container.appendChild(liftEl);

    function addPR(liftKey) {
      var lift = liftDefs.find(function(l) { return l.key === liftKey; });
      var input = document.querySelector('[data-lift="' + liftKey + '"]');
      var dateInput = document.querySelector('[data-lift-date="' + liftKey + '"]');
      var raw = input.value.trim();
      if (!raw) return;

      var value;
      if (lift.unit === 'time') {
        value = parseTimeInput(raw);
      } else {
        value = parseInt(raw, 10);
      }
      if (isNaN(value) || value <= 0) return;

      var history = loadPRHistory(liftKey);
      var prevBest = getBestPR(history, lift.unit);

      history.push({ value: value, date: dateInput.value });
      savePRHistory(liftKey, history);

      // Check if new PR
      var newBest = getBestPR(history, lift.unit);
      if (!prevBest || (lift.unit === 'time' ? newBest.value < prevBest.value : newBest.value > prevBest.value)) {
        addXP(25);
      }

      input.value = '';
      renderPRTracker();
      renderPRLeaderboard(activePRTab);
    }

    function deletePR(liftKey, idx) {
      var history = loadPRHistory(liftKey);
      history.splice(idx, 1);
      savePRHistory(liftKey, history);
      renderPRTracker();
      renderPRLeaderboard(activePRTab);
    }

        tab.textContent = lift.icon + ' ' + lift.name;

          renderPRLeaderboard(lift.key);

    function renderPRLeaderboard(liftKey) {
      var lift = liftDefs.find(function(l) { return l.key === liftKey; });
      var table = document.getElementById('pr-leaderboard-table');
      table.innerHTML = '';

      // Gather crew entries
      var entries = crewPRs[liftKey].map(function(c) {
        return { name: c.name, value: c.value, isUser: false };
      });

      // Add user's best
      var history = loadPRHistory(liftKey);
      var userBest = getBestPR(history, lift.unit);
      var userName = appState.name || 'You';
      entries.push({
        name: userName,
        value: userBest ? userBest.value : (lift.unit === 'time' ? 9999 : 0),
        isUser: true
      });

      // Sort: for time lower is better, for weight higher is better
      if (lift.unit === 'time') {
        entries.sort(function(a, b) { return a.value - b.value; });
      } else {
        entries.sort(function(a, b) { return b.value - a.value; });
      }

      entries.forEach(function(entry, i) {
        var row = document.createElement('div');
        var classes = 'pr-leaderboard__row';
        if (entry.isUser) classes += ' pr-leaderboard__row--you';
        if (i === 0) classes += ' pr-leaderboard__row--1st';
        row.className = classes;

        var posEmoji = i === 0 ? '👑' : (i === 1 ? '🥈' : (i === 2 ? '🥉' : ''));
        var displayVal = (entry.isUser && !userBest) ? '—' : formatPRValue(entry.value, lift.unit);

        row.innerHTML =
          '<span class="pr-leaderboard__rank">' + (posEmoji || (i + 1)) + '</span>' +
          '<span class="pr-leaderboard__name">' + entry.name + (entry.isUser ? ' (you)' : '') + '</span>' +
          '<span class="pr-leaderboard__value">' + displayVal + '</span>';

        table.appendChild(row);

    // ===== Weight Tracker =====

      var currentWeight = history.length > 0 ? history[history.length - 1].value : null;

      var statsHTML =
        '<div class="weight-tracker__stats">' +

          '</div>' +
          '<div class="weight-tracker__stat">' +
            '<div class="weight-tracker__stat-value weight-tracker__stat-value--green">' + (lostLbs > 0 ? '-' + lostLbs.toFixed(1) : lostLbs === 0 && startWeight ? '0' : '—') + '</div>' +
            '<div class="weight-tracker__stat-label">lbs lost</div>' +

          '<div class="weight-tracker__stat">' +
            '<div class="weight-tracker__stat-value weight-tracker__stat-value--green">' + (startWeight ? lostPct.toFixed(1) + '%' : '—') + '</div>' +
            '<div class="weight-tracker__stat-label">% lost</div>' +
          '</div>' +
        '</div>';

      // Input row
      var inputHTML =
        '<div class="weight-tracker__input-row">' +
          '<input class="weight-tracker__input" id="weight-input" type="number" step="0.1" placeholder="Weight (lbs)">' +
          '<input class="weight-tracker__input weight-tracker__input--date" id="weight-date" type="date" value="' + today + '">' +
          '<button class="weight-tracker__log-btn" onclick="addWeight()">Log</button>' +
        '</div>';

      // Chart (last 20 entries)
      var chartHTML = '';
      if (history.length > 1) {
        var recent = history.slice(-20);
        var vals = recent.map(function(e) { return e.value; });
        var maxW = Math.max.apply(null, vals);
        var minW = Math.min.apply(null, vals);
        var range = maxW - minW || 1;

        chartHTML = '<div class="weight-tracker__chart">';
        recent.forEach(function(e, i) {
          // Invert: lower weight = taller bar (progress)
          var pct = ((maxW - e.value) / range) * 80 + 20;
          var isLatest = i === recent.length - 1;
          chartHTML += '<div class="weight-tracker__chart-bar' + (isLatest ? ' weight-tracker__chart-bar--latest' : '') + '" style="height:' + pct + '%" title="' + e.value + ' lbs — ' + e.date + '"></div>';
        });
        chartHTML += '</div>';
      }

      // History
      var historyHTML = '';
      if (history.length > 0) {
        var sorted = history.slice().reverse();
        historyHTML =
          '<button class="weight-tracker__history-toggle" onclick="toggleWeightHistory(this)">Show history (' + history.length + ')</button>' +
          '<div class="weight-tracker__history">';
        sorted.forEach(function(e, i) {
          var realIdx = history.length - 1 - i;
          var delta = '';
          var deltaClass = '';
          if (realIdx > 0) {
            var diff = e.value - history[realIdx - 1].value;
            if (diff < 0) { delta = diff.toFixed(1) + ' lbs'; deltaClass = 'weight-tracker__entry-delta--loss'; }
            else if (diff > 0) { delta = '+' + diff.toFixed(1) + ' lbs'; deltaClass = 'weight-tracker__entry-delta--gain'; }
            else { delta = '0'; }
          }
          historyHTML +=
            '<div class="weight-tracker__entry">' +
              '<span class="weight-tracker__entry-value">' + e.value + ' lbs</span>' +
              (delta ? '<span class="weight-tracker__entry-delta ' + deltaClass + '">' + delta + '</span>' : '') +
              '<span class="weight-tracker__entry-date">' + e.date + '</span>' +
              '<button class="weight-tracker__entry-delete" onclick="deleteWeight(' + realIdx + ')" title="Delete">x</button>' +
            '</div>';
        });
        historyHTML += '</div>';
      }

      card.innerHTML = statsHTML + inputHTML + chartHTML + historyHTML;
      container.appendChild(card);
    }

    function addWeight() {

    function renderWeightLossLeaderboard(mode) {
      var table = document.getElementById('weight-lb-table');
      table.innerHTML = '';

      // Build entries from crew
      var entries = crewWeights.map(function(c) {
        var lost = c.start - c.current;
        var pct = (lost / c.start) * 100;
        return { name: c.name, lbs: lost, pct: pct, start: c.start, current: c.current, isUser: false };
      });

      // Add user
      var history = loadWeightHistory();
      var userName = appState.name || 'You';
      if (history.length >= 2) {
        var uStart = history[0].value;
        var uCurrent = history[history.length - 1].value;
        var uLost = uStart - uCurrent;
        var uPct = (uLost / uStart) * 100;
        entries.push({ name: userName, lbs: uLost, pct: uPct, start: uStart, current: uCurrent, isUser: true });
      } else if (history.length === 1) {
        entries.push({ name: userName, lbs: 0, pct: 0, start: history[0].value, current: history[0].value, isUser: true });
      } else {
        entries.push({ name: userName, lbs: 0, pct: 0, start: 0, current: 0, isUser: true });
      }

      // Sort: most lost first
      if (mode === 'lbs') {
        entries.sort(function(a, b) { return b.lbs - a.lbs; });
      } else {
        entries.sort(function(a, b) { return b.pct - a.pct; });

        table.appendChild(row);

    // ===== Macrocycle Program =====
    // 16-week periodized program: Fat Loss → Shoulder Hypertrophy → Explosive Power → Peak/Game Ready
    // Goals: fat loss, big shoulders, explosiveness for basketball

    const macrocycleStartKey = 'brofit_macro_start';

    function getMacroStartDate() {
      let stored = localStorage.getItem(macrocycleStartKey);
      if (!stored) {
        // Start on the most recent Monday
        const now = new Date();
        const day = now.getDay();
        const diff = (day === 0 ? 6 : day - 1);
        const monday = new Date(now);
        monday.setDate(now.getDate() - diff);
        monday.setHours(0, 0, 0, 0);
        stored = monday.toISOString().split('T')[0];
        localStorage.setItem(macrocycleStartKey, stored);
      }
      return new Date(stored + 'T00:00:00');
    }

    function getCurrentWeek() {
      const start = getMacroStartDate();
      const now = new Date();
      const diffMs = now - start;
      const week = Math.floor(diffMs / (7 * 24 * 60 * 60 * 1000)) + 1;
      return Math.max(1, Math.min(week, 16));
    }

    function getPhaseForWeek(week) {

    function renderMacrocycle() {
      const currentWeek = getCurrentWeek();
      const container = document.getElementById('macrocycle');

      // Week label
      document.getElementById('macro-week-label').textContent = 'Week ' + currentWeek + ' of 16';

      // Progress bar
      const progressEl = document.getElementById('macro-progress');
      progressEl.innerHTML = '';
      for (let w = 1; w <= 16; w++) {
        const seg = document.createElement('div');
        seg.className = 'macrocycle__progress-seg';

      macroPhases.forEach(function(phase) {

    // ===== XP System =====

    function addXP(amount) {
      appState.xp += amount;
      saveState(appState);
      refreshUI();

    // ===== UI Refresh =====

    function refreshUI() {
      // Header streak
      const streakEl = document.getElementById('header-streak');
      if (appState.streak > 0) {
        const fires = '🔥'.repeat(Math.min(appState.streak, 7));
        streakEl.textContent = fires + ' ' + appState.streak + 'd';
      } else {
        streakEl.textContent = '';
      }

      // Header XP
      document.getElementById('header-xp').textContent = appState.xp + ' XP';

      // Rank
      const rank = getRank(appState.xp);
      const nextRank = getNextRank(appState.xp);
      document.getElementById('profile-rank').textContent = rank.name;

      // Progress bar
      if (nextRank) {
        const progress = ((appState.xp - rank.threshold) / (nextRank.threshold - rank.threshold)) * 100;
        document.getElementById('progress-fill').style.width = Math.min(progress, 100) + '%';
        document.getElementById('progress-label').textContent =
          appState.xp + ' / ' + nextRank.threshold + ' XP to ' + nextRank.name;
      } else {
        document.getElementById('progress-fill').style.width = '100%';
        document.getElementById('progress-label').textContent = 'MAX RANK — ' + appState.xp + ' XP';
      }

      // Greeting name
      const name = appState.name || 'king';
      document.getElementById('greeting-name').textContent =
        getTimeGreeting().replace(/[☀️🔥💪😴]/g, '').trim() + ', ' + name;

      // Name input
      document.getElementById('name-input').value = appState.name;

      // Daily challenge button state
      const today = getTodayString();
      if (appState.dailyChallengeCompleted === today) {
        const btn = document.getElementById('challenge-btn');
        btn.textContent = 'Crushed It! 💚';
        btn.classList.add('featured-challenge__btn--done');
      }

      // Leaderboard
      renderLeaderboard();
    }

    // ===== Render Daily Challenge =====

    function renderDailyChallenge(challenge) {
      document.getElementById('challenge-icon').textContent = challenge.icon;
      document.getElementById('challenge-text').textContent = challenge.text;
      updateChallengeTimer();
    }

    function updateChallengeTimer() {
      const now = new Date();
      const midnight = new Date(now);
      midnight.setHours(24, 0, 0, 0);
      const diff = midnight - now;
      const hours = Math.floor(diff / 3600000);
      const mins = Math.floor((diff % 3600000) / 60000);
      document.getElementById('challenge-timer').textContent = hours + 'h ' + mins + 'm left today';
    }

    // ===== Crew Leaderboard =====

    const crewMembers = [
      { name: 'Jake', xp: 840 },
      { name: 'Marcus', xp: 1250 },
      { name: 'Dev', xp: 430 },
      { name: 'Tyler', xp: 670 },
      { name: 'Chris', xp: 310 },
      { name: 'Aiden', xp: 95 }
    ];

    function renderLeaderboard() {
      const userName = appState.name || 'You';
      const userEntry = { name: userName, xp: appState.xp, isUser: true };

      const board = [...crewMembers, userEntry].sort(function(a, b) { return b.xp - a.xp; });

      const list = document.getElementById('leaderboard-list');
      list.innerHTML = '';

      board.forEach(function(entry, i) {
        const li = document.createElement('li');
        li.className = 'leaderboard__item' + (entry.isUser ? ' leaderboard__item--you' : '');

        const posEmoji = i === 0 ? '👑' : (i === 1 ? '🥈' : (i === 2 ? '🥉' : ''));
        const rank = getRank(entry.xp);

        li.innerHTML =
          '<span class="leaderboard__pos">' + (posEmoji || (i + 1)) + '</span>' +
          '<span class="leaderboard__name">' + entry.name + (entry.isUser ? ' (you)' : '') + '</span>' +
          '<span class="leaderboard__rank-badge">' + rank.name + '</span>' +
          '<span class="leaderboard__xp">' + entry.xp + ' XP</span>';

        list.appendChild(li);
      });
    }

    // ===== Rotating Footer Taglines =====

    const taglines = [
      "No excuses. No days off. No mercy.",
      "Iron sharpens iron.",
      "Your only competition is yesterday's you.",
      "Suffer the pain of discipline or the pain of regret.",
      "The crew that lifts together, grows together.",
      "Nobody said it would be easy. They said it would be worth it.",
      "Be the hardest worker in the room.",
      "Shut up and squat.",
      "Excuses don't burn calories.",
      "Sore today. Strong tomorrow."
    ];

    let taglineIndex = 0;

    function rotateTagline() {
      taglineIndex = (taglineIndex + 1) % taglines.length;
      const el = document.getElementById('footer-tagline');
      el.style.opacity = '0';
      setTimeout(function() {
        el.textContent = taglines[taglineIndex];
        el.style.opacity = '1';
      }, 300);
    }

    // ===== Daily Challenge Button =====

    function handleChallengeComplete() {
      const btn = document.getElementById('challenge-btn');
      btn.textContent = 'Crushed It! 💚';
      btn.classList.add('featured-challenge__btn--done');

      // Confetti ring
      const container = document.getElementById('featured-challenge');
      const ring = document.createElement('div');
      ring.className = 'confetti-ring';
      container.appendChild(ring);
      setTimeout(function() { ring.remove(); }, 700);

      appState.dailyChallengeCompleted = getTodayString();
      saveState(appState);
      addXP(50);
    }

    // ===== Init =====

    document.addEventListener('DOMContentLoaded', function() {
      // Load state and update streak
      appState = loadState();
      updateStreak();
      saveState(appState);

      // Greeting
      document.getElementById('greeting-time').textContent = getTimeGreeting();

      // Refresh all UI from state
      refreshUI();

      // Render daily challenge
      renderDailyChallenge(getDailyChallenge());

      // Render PR tracker & leaderboard
      renderPRTracker();
      renderPRLeaderboardTabs();
      renderPRLeaderboard(activePRTab);

      // Render weight tracker & leaderboard
      renderWeightTracker();
      renderWeightLBTabs();
      renderWeightLossLeaderboard(activeWeightLBTab);

      // Render macrocycle
      renderMacrocycle();

      // Update challenge timer every minute
      setInterval(updateChallengeTimer, 60000);

      // Wire up buttons
      document.getElementById('challenge-btn').addEventListener('click', handleChallengeComplete);

      // Name input saves to state
      document.getElementById('name-input').addEventListener('input', function(e) {
        appState.name = e.target.value.trim();
        saveState(appState);
        refreshUI();
      });

      // Rotating footer taglines
      taglineIndex = Math.floor(Math.random() * taglines.length);
      document.getElementById('footer-tagline').textContent = taglines[taglineIndex];
      setInterval(rotateTagline, 5000);
    });
  </script>
</body>
</html>
