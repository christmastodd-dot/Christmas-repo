<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>BroFit — No Excuses</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
  <style>
    /* ===== CSS Custom Properties ===== */
    :root {
      --bg-primary: #0a0a0f;
      --bg-card: #1a1a2e;
      --bg-card-hover: #222240;
      --bg-surface: #12121c;

      --color-orange: #ff6b35;
      --color-green: #00ff88;
      --color-purple: #7b2ff7;
      --color-red: #ff3366;
      --color-gold: #ffd700;
      --color-blue: #00bfff;

      --text-primary: #f0f0f0;
      --text-secondary: #888;
      --text-muted: #555;

      --radius-sm: 8px;
      --radius-md: 16px;
      --radius-lg: 24px;

      --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-display: 'Space Grotesk', 'Inter', sans-serif;

      --shadow-card: 0 4px 20px rgba(0, 0, 0, 0.4);
      --shadow-glow-orange: 0 0 20px rgba(255, 107, 53, 0.3);
      --shadow-glow-green: 0 0 20px rgba(0, 255, 136, 0.3);
      --shadow-glow-purple: 0 0 20px rgba(123, 47, 247, 0.3);
      --shadow-glow-red: 0 0 20px rgba(255, 51, 102, 0.3);
      --shadow-glow-gold: 0 0 20px rgba(255, 215, 0, 0.3);
      --shadow-glow-blue: 0 0 20px rgba(0, 191, 255, 0.3);
    }

    /* ===== Reset & Base ===== */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      font-size: 16px;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== Layout Container ===== */
    .app {
      max-width: 480px;
      margin: 0 auto;
      padding: 0 16px;
      padding-bottom: 40px;
    }

    /* ===== Header ===== */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 0 12px;
      position: sticky;
      top: 0;
      z-index: 100;
      background: linear-gradient(to bottom, var(--bg-primary) 70%, transparent);
      padding-bottom: 24px;
    }

    .header__logo {
      font-family: var(--font-display);
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -1px;
      background: linear-gradient(135deg, var(--color-orange), var(--color-red));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header__stats {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header__streak {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--color-orange);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .header__xp {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--bg-primary);
      background: var(--color-green);
      padding: 3px 10px;
      border-radius: 20px;
    }

    /* ===== Greeting ===== */
    .greeting {
      padding: 8px 0 20px;
    }

    .greeting__time {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    .greeting__name {
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 700;
    }

    /* ===== Profile Section ===== */
    .profile {
      background: var(--bg-card);
      border-radius: var(--radius-md);
      padding: 16px;
      margin-bottom: 24px;
      box-shadow: var(--shadow-card);
    }

    .profile__row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .profile__name-input {
      background: var(--bg-surface);
      border: 1px solid var(--text-muted);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 0.95rem;
      font-weight: 600;
      padding: 8px 12px;
      width: 60%;
      outline: none;
      transition: border-color 0.2s;
    }

    .profile__name-input:focus {
      border-color: var(--color-orange);
    }

    .profile__rank {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--color-purple);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .profile__progress-bar {
      width: 100%;
      height: 6px;
      background: var(--bg-surface);
      border-radius: 3px;
      overflow: hidden;
    }

    .profile__progress-fill {
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, var(--color-purple), var(--color-orange));
      transition: width 0.6s ease;
      width: 0%;
    }

    .profile__progress-label {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 6px;
      text-align: right;
    }

    /* ===== Section Titles ===== */
    .section-title {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ===== Recommendation Cards ===== */
    .cards-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }

    .card {
      background: var(--bg-card);
      border-radius: var(--radius-md);
      padding: 16px;
      border-left: 4px solid var(--text-muted);
      box-shadow: var(--shadow-card);
      opacity: 0;
      transform: translateY(20px);
      animation: slideUp 0.4s ease forwards;
      transition: background 0.2s, transform 0.2s;
      position: relative;
      overflow: hidden;
    }

    .card:active {
      transform: scale(0.98);
      background: var(--bg-card-hover);
    }

    .card--workout  { border-left-color: var(--color-orange); }
    .card--nutrition { border-left-color: var(--color-green); }
    .card--motivation { border-left-color: var(--color-purple); }
    .card--callout  { border-left-color: var(--color-red); }
    .card--challenge { border-left-color: var(--color-gold); }
    .card--recovery { border-left-color: var(--color-blue); }

    .card__top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .card__badge {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      padding: 3px 10px;
      border-radius: 20px;
      color: var(--bg-primary);
    }

    .card__badge--workout  { background: var(--color-orange); }
    .card__badge--nutrition { background: var(--color-green); }
    .card__badge--motivation { background: var(--color-purple); color: #fff; }
    .card__badge--callout  { background: var(--color-red); color: #fff; }
    .card__badge--challenge { background: var(--color-gold); }
    .card__badge--recovery { background: var(--color-blue); }

    .card__icon {
      font-size: 1.6rem;
    }

    .card__text {
      font-size: 0.95rem;
      line-height: 1.5;
      color: var(--text-primary);
    }

    .card__spice {
      font-size: 0.75rem;
      margin-top: 8px;
      color: var(--text-muted);
    }

    .card__action {
      display: inline-block;
      margin-top: 12px;
      background: var(--color-gold);
      color: var(--bg-primary);
      font-family: var(--font-body);
      font-size: 0.8rem;
      font-weight: 700;
      padding: 8px 16px;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .card__action:active {
      transform: scale(0.95);
    }

    .card__action--done {
      background: var(--color-green);
      pointer-events: none;
    }

    /* ===== Regenerate Button ===== */
    .regenerate {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 16px;
      margin-bottom: 32px;
      background: linear-gradient(135deg, var(--color-orange), var(--color-red));
      color: #fff;
      font-family: var(--font-body);
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s;
      box-shadow: var(--shadow-glow-orange);
    }

    .regenerate:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 30px rgba(255, 107, 53, 0.5);
    }

    .regenerate:active {
      transform: scale(0.97);
    }

    .regenerate__icon {
      display: inline-block;
      transition: transform 0.5s ease;
    }

    .regenerate__icon--spin {
      transform: rotate(720deg);
    }

    /* ===== Daily Challenge (Featured) ===== */
    .featured-challenge {
      background: var(--bg-card);
      border: 2px solid var(--color-gold);
      border-radius: var(--radius-md);
      padding: 20px;
      margin-bottom: 32px;
      box-shadow: var(--shadow-glow-gold);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .featured-challenge::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: conic-gradient(from 0deg, transparent, rgba(255, 215, 0, 0.05), transparent);
      animation: rotateBg 6s linear infinite;
    }

    .featured-challenge__label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--color-gold);
      margin-bottom: 8px;
      position: relative;
    }

    .featured-challenge__icon {
      font-size: 2.5rem;
      margin-bottom: 8px;
      position: relative;
    }

    .featured-challenge__text {
      font-size: 1.05rem;
      font-weight: 600;
      line-height: 1.5;
      margin-bottom: 16px;
      position: relative;
    }

    .featured-challenge__timer {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-bottom: 12px;
      position: relative;
    }

    .featured-challenge__btn {
      background: var(--color-gold);
      color: var(--bg-primary);
      font-family: var(--font-body);
      font-size: 0.9rem;
      font-weight: 700;
      padding: 10px 28px;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      position: relative;
      transition: transform 0.15s;
    }

    .featured-challenge__btn:active {
      transform: scale(0.95);
    }

    .featured-challenge__btn--done {
      background: var(--color-green);
      pointer-events: none;
    }

    /* ===== Leaderboard ===== */
    .leaderboard {
      margin-bottom: 32px;
    }

    .leaderboard__list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .leaderboard__item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg-card);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      transition: background 0.2s;
    }

    .leaderboard__item--you {
      background: var(--bg-card-hover);
      border: 1px solid var(--color-orange);
      box-shadow: var(--shadow-glow-orange);
    }

    .leaderboard__pos {
      font-size: 1rem;
      font-weight: 900;
      width: 28px;
      text-align: center;
      color: var(--text-secondary);
    }

    .leaderboard__item:nth-child(1) .leaderboard__pos { color: var(--color-gold); }
    .leaderboard__item:nth-child(2) .leaderboard__pos { color: #c0c0c0; }
    .leaderboard__item:nth-child(3) .leaderboard__pos { color: #cd7f32; }

    .leaderboard__name {
      flex: 1;
      font-weight: 600;
      font-size: 0.9rem;
    }

    .leaderboard__xp {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--color-green);
    }

    .leaderboard__rank-badge {
      font-size: 0.65rem;
      font-weight: 700;
      color: var(--color-purple);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ===== Footer ===== */
    .footer {
      text-align: center;
      padding: 24px 0;
      border-top: 1px solid var(--text-muted);
    }

    .footer__tagline {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-secondary);
      font-style: italic;
      transition: opacity 0.3s;
    }

    .footer__brand {
      font-size: 0.65rem;
      color: var(--text-muted);
      margin-top: 8px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* ===== Animations ===== */
    @keyframes slideUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes rotateBg {
      to { transform: rotate(360deg); }
    }

    @keyframes confettiBurst {
      0% { transform: scale(0); opacity: 1; }
      50% { transform: scale(1.3); opacity: 0.8; }
      100% { transform: scale(1.6); opacity: 0; }
    }

    .confetti-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 80px;
      height: 80px;
      margin: -40px 0 0 -40px;
      border-radius: 50%;
      border: 4px solid var(--color-green);
      animation: confettiBurst 0.6s ease-out forwards;
      pointer-events: none;
    }

    /* ===== Responsive: Tablet ===== */
    @media (min-width: 768px) {
      .app {
        max-width: 700px;
      }

      .cards-container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }
    }

    /* ===== Responsive: Desktop ===== */
    @media (min-width: 1024px) {
      .app {
        max-width: 800px;
        padding: 0 32px;
      }

      .header__logo {
        font-size: 2.2rem;
      }

      .card {
        padding: 20px;
      }

      .card:hover {
        background: var(--bg-card-hover);
        transform: translateY(-2px);
      }
    }
  </style>
</head>
<body>
  <div class="app">

    <!-- Header -->
    <header class="header">
      <div class="header__logo">BROFIT</div>
      <div class="header__stats">
        <div class="header__streak" id="header-streak"></div>
        <div class="header__xp" id="header-xp">0 XP</div>
      </div>
    </header>

    <!-- Greeting -->
    <div class="greeting">
      <div class="greeting__time" id="greeting-time"></div>
      <div class="greeting__name" id="greeting-name">What's good, king</div>
    </div>

    <!-- Profile -->
    <section class="profile" id="profile">
      <div class="profile__row">
        <input class="profile__name-input" id="name-input" type="text" placeholder="Your name" maxlength="20">
        <span class="profile__rank" id="profile-rank">NEWBIE</span>
      </div>
      <div class="profile__progress-bar">
        <div class="profile__progress-fill" id="progress-fill"></div>
      </div>
      <div class="profile__progress-label" id="progress-label">0 / 100 XP to next rank</div>
    </section>

    <!-- Recommendations -->
    <div class="section-title">Your 10 for Today</div>
    <div class="cards-container" id="cards-container">
      <!-- Cards rendered by JS -->
    </div>

    <!-- Regenerate -->
    <button class="regenerate" id="regenerate-btn">
      <span class="regenerate__icon" id="regenerate-icon">🎲</span>
      Hit Me Again
    </button>

    <!-- Daily Challenge -->
    <div class="section-title">Daily Challenge</div>
    <div class="featured-challenge" id="featured-challenge">
      <div class="featured-challenge__label">Today's Challenge</div>
      <div class="featured-challenge__icon" id="challenge-icon">💪</div>
      <div class="featured-challenge__text" id="challenge-text">Loading...</div>
      <div class="featured-challenge__timer" id="challenge-timer"></div>
      <button class="featured-challenge__btn" id="challenge-btn">I Did This (+50 XP)</button>
    </div>

    <!-- Leaderboard -->
    <div class="section-title">The Crew</div>
    <section class="leaderboard" id="leaderboard">
      <ol class="leaderboard__list" id="leaderboard-list">
        <!-- Rendered by JS -->
      </ol>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <div class="footer__tagline" id="footer-tagline">No excuses. No days off. No mercy.</div>
      <div class="footer__brand">BroFit 2026</div>
    </footer>

  </div>

  <script>
    // Milestone 1: Placeholder JS — full logic comes in later milestones
    document.addEventListener('DOMContentLoaded', function() {
      // Time-of-day greeting
      const hour = new Date().getHours();
      const greetEl = document.getElementById('greeting-time');
      if (hour >= 5 && hour < 12) greetEl.textContent = 'Rise and grind ☀️';
      else if (hour >= 12 && hour < 17) greetEl.textContent = 'Fuel up 🔥';
      else if (hour >= 17 && hour < 22) greetEl.textContent = 'Finish strong 💪';
      else greetEl.textContent = 'Rest up king 😴';
    });
  </script>
</body>
</html>
