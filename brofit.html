<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>BroFit — No Excuses</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
  <style>
    /* ===== CSS Custom Properties ===== */
    :root {
      --bg-primary: #0a0a0f;
      --bg-card: #1a1a2e;
      --bg-card-hover: #222240;
      --bg-surface: #12121c;

      --color-orange: #ff6b35;
      --color-green: #00ff88;
      --color-purple: #7b2ff7;
      --color-red: #ff3366;
      --color-gold: #ffd700;
      --color-blue: #00bfff;

      --text-primary: #f0f0f0;
      --text-secondary: #888;
      --text-muted: #555;

      --radius-sm: 8px;
      --radius-md: 16px;
      --radius-lg: 24px;

      --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-display: 'Space Grotesk', 'Inter', sans-serif;

      --shadow-card: 0 4px 20px rgba(0, 0, 0, 0.4);
      --shadow-glow-orange: 0 0 20px rgba(255, 107, 53, 0.3);
      --shadow-glow-green: 0 0 20px rgba(0, 255, 136, 0.3);
      --shadow-glow-purple: 0 0 20px rgba(123, 47, 247, 0.3);
      --shadow-glow-red: 0 0 20px rgba(255, 51, 102, 0.3);
      --shadow-glow-gold: 0 0 20px rgba(255, 215, 0, 0.3);
      --shadow-glow-blue: 0 0 20px rgba(0, 191, 255, 0.3);
    }

    /* ===== Reset & Base ===== */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      font-size: 16px;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== Layout Container ===== */
    .app {
      max-width: 480px;
      margin: 0 auto;
      padding: 0 16px;
      padding-bottom: 40px;
    }

    /* ===== Header ===== */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 0 12px;
      position: sticky;
      top: 0;
      z-index: 100;
      background: linear-gradient(to bottom, var(--bg-primary) 70%, transparent);
      padding-bottom: 24px;
    }

    .header__logo {
      font-family: var(--font-display);
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -1px;
      background: linear-gradient(135deg, var(--color-orange), var(--color-red));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header__stats {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header__streak {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--color-orange);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .header__xp {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--bg-primary);
      background: var(--color-green);
      padding: 3px 10px;
      border-radius: 20px;
    }

    /* ===== Greeting ===== */
    .greeting {
      padding: 8px 0 20px;
    }

    .greeting__time {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    .greeting__name {
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 700;
    }

    /* ===== Profile Section ===== */
    .profile {
      background: var(--bg-card);
      border-radius: var(--radius-md);
      padding: 16px;
      margin-bottom: 24px;
      box-shadow: var(--shadow-card);
    }

    .profile__row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .profile__name-input {
      background: var(--bg-surface);
      border: 1px solid var(--text-muted);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 0.95rem;
      font-weight: 600;
      padding: 8px 12px;
      width: 60%;
      outline: none;
      transition: border-color 0.2s;
    }

    .profile__name-input:focus {
      border-color: var(--color-orange);
    }

    .profile__rank {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--color-purple);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .profile__progress-bar {
      width: 100%;
      height: 6px;
      background: var(--bg-surface);
      border-radius: 3px;
      overflow: hidden;
    }

    .profile__progress-fill {
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, var(--color-purple), var(--color-orange));
      transition: width 0.6s ease;
      width: 0%;
    }

    .profile__progress-label {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 6px;
      text-align: right;
    }

    /* ===== Section Titles ===== */
    .section-title {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ===== Recommendation Cards ===== */
    .cards-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }

    .card {
      background: var(--bg-card);
      border-radius: var(--radius-md);
      padding: 16px;
      border-left: 4px solid var(--text-muted);
      box-shadow: var(--shadow-card);
      opacity: 0;
      transform: translateY(20px);
      animation: slideUp 0.4s ease forwards;
      transition: background 0.2s, transform 0.2s;
      position: relative;
      overflow: hidden;
    }

    .card:active {
      transform: scale(0.98);
      background: var(--bg-card-hover);
    }

    .card--workout  { border-left-color: var(--color-orange); }
    .card--nutrition { border-left-color: var(--color-green); }
    .card--motivation { border-left-color: var(--color-purple); }
    .card--callout  { border-left-color: var(--color-red); }
    .card--challenge { border-left-color: var(--color-gold); }
    .card--recovery { border-left-color: var(--color-blue); }

    .card__top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .card__badge {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      padding: 3px 10px;
      border-radius: 20px;
      color: var(--bg-primary);
    }

    .card__badge--workout  { background: var(--color-orange); }
    .card__badge--nutrition { background: var(--color-green); }
    .card__badge--motivation { background: var(--color-purple); color: #fff; }
    .card__badge--callout  { background: var(--color-red); color: #fff; }
    .card__badge--challenge { background: var(--color-gold); }
    .card__badge--recovery { background: var(--color-blue); }

    .card__icon {
      font-size: 1.6rem;
    }

    .card__text {
      font-size: 0.95rem;
      line-height: 1.5;
      color: var(--text-primary);
    }

    .card__spice {
      font-size: 0.75rem;
      margin-top: 8px;
      color: var(--text-muted);
    }

    .card__action {
      display: inline-block;
      margin-top: 12px;
      background: var(--color-gold);
      color: var(--bg-primary);
      font-family: var(--font-body);
      font-size: 0.8rem;
      font-weight: 700;
      padding: 8px 16px;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .card__action:active {
      transform: scale(0.95);
    }

    .card__action--done {
      background: var(--color-green);
      pointer-events: none;
    }

    /* ===== Regenerate Button ===== */
    .regenerate {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 16px;
      margin-bottom: 32px;
      background: linear-gradient(135deg, var(--color-orange), var(--color-red));
      color: #fff;
      font-family: var(--font-body);
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s;
      box-shadow: var(--shadow-glow-orange);
    }

    .regenerate:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 30px rgba(255, 107, 53, 0.5);
    }

    .regenerate:active {
      transform: scale(0.97);
    }

    .regenerate__icon {
      display: inline-block;
      transition: transform 0.5s ease;
    }

    .regenerate__icon--spin {
      transform: rotate(720deg);
    }

    /* ===== Daily Challenge (Featured) ===== */
    .featured-challenge {
      background: var(--bg-card);
      border: 2px solid var(--color-gold);
      border-radius: var(--radius-md);
      padding: 20px;
      margin-bottom: 32px;
      box-shadow: var(--shadow-glow-gold);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .featured-challenge::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: conic-gradient(from 0deg, transparent, rgba(255, 215, 0, 0.05), transparent);
      animation: rotateBg 6s linear infinite;
    }

    .featured-challenge__label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--color-gold);
      margin-bottom: 8px;
      position: relative;
    }

    .featured-challenge__icon {
      font-size: 2.5rem;
      margin-bottom: 8px;
      position: relative;
    }

    .featured-challenge__text {
      font-size: 1.05rem;
      font-weight: 600;
      line-height: 1.5;
      margin-bottom: 16px;
      position: relative;
    }

    .featured-challenge__timer {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-bottom: 12px;
      position: relative;
    }

    .featured-challenge__btn {
      background: var(--color-gold);
      color: var(--bg-primary);
      font-family: var(--font-body);
      font-size: 0.9rem;
      font-weight: 700;
      padding: 10px 28px;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      position: relative;
      transition: transform 0.15s;
    }

    .featured-challenge__btn:active {
      transform: scale(0.95);
    }

    .featured-challenge__btn--done {
      background: var(--color-green);
      pointer-events: none;
    }

    /* ===== Leaderboard ===== */

    /* ===== Macrocycle / Training Program ===== */
    .macrocycle {
      margin-bottom: 32px;
    }

    .macrocycle__phase {
      background: var(--bg-card);
      border-radius: var(--radius-md);
      padding: 16px;
      margin-bottom: 10px;
      box-shadow: var(--shadow-card);
      border-left: 4px solid var(--text-muted);
      transition: background 0.2s;
    }

    .macrocycle__phase--active {
      border-left-color: var(--color-orange);
      background: var(--bg-card-hover);
      box-shadow: var(--shadow-glow-orange);
    }

    .macrocycle__phase-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
    }

    .macrocycle__phase-title {
      font-family: var(--font-display);
      font-size: 0.95rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .macrocycle__phase-weeks {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .macrocycle__phase-tag {
      font-size: 0.6rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .macrocycle__phase-tag--cut { background: var(--color-red); color: #fff; }
    .macrocycle__phase-tag--build { background: var(--color-orange); color: var(--bg-primary); }
    .macrocycle__phase-tag--power { background: var(--color-purple); color: #fff; }
    .macrocycle__phase-tag--peak { background: var(--color-gold); color: var(--bg-primary); }

    .macrocycle__phase-detail {
      display: none;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--text-muted);
    }

    .macrocycle__phase-detail--open {
      display: block;
    }

    .macrocycle__split {
      margin-bottom: 10px;
    }

    .macrocycle__split-title {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--color-orange);
      margin-bottom: 4px;
    }

    .macrocycle__split-exercises {
      font-size: 0.82rem;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    .macrocycle__nutrition-note {
      font-size: 0.78rem;
      color: var(--color-green);
      font-weight: 600;
      margin-top: 8px;
      padding: 8px;
      background: rgba(0, 255, 136, 0.08);
      border-radius: var(--radius-sm);
    }

    .macrocycle__progress {
      display: flex;
      gap: 3px;
      margin-bottom: 16px;
    }

    .macrocycle__progress-seg {
      flex: 1;
      height: 6px;
      border-radius: 3px;
      background: var(--bg-card);
    }

    .macrocycle__progress-seg--done {
      background: var(--color-green);
    }

    .macrocycle__progress-seg--active {
      background: var(--color-orange);
      animation: pulse 1.5s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .macrocycle__week-label {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 12px;
    }

    .leaderboard {
      margin-bottom: 32px;
    }

    .leaderboard__list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .leaderboard__item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg-card);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      transition: background 0.2s;
    }

    .leaderboard__item--you {
      background: var(--bg-card-hover);
      border: 1px solid var(--color-orange);
      box-shadow: var(--shadow-glow-orange);
    }

    .leaderboard__pos {
      font-size: 1rem;
      font-weight: 900;
      width: 28px;
      text-align: center;
      color: var(--text-secondary);
    }

    .leaderboard__item:nth-child(1) .leaderboard__pos { color: var(--color-gold); }
    .leaderboard__item:nth-child(2) .leaderboard__pos { color: #c0c0c0; }
    .leaderboard__item:nth-child(3) .leaderboard__pos { color: #cd7f32; }

    .leaderboard__name {
      flex: 1;
      font-weight: 600;
      font-size: 0.9rem;
    }

    .leaderboard__xp {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--color-green);
    }

    .leaderboard__rank-badge {
      font-size: 0.65rem;
      font-weight: 700;
      color: var(--color-purple);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ===== Footer ===== */
    .footer {
      text-align: center;
      padding: 24px 0;
      border-top: 1px solid var(--text-muted);
    }

    .footer__tagline {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-secondary);
      font-style: italic;
      transition: opacity 0.3s;
    }

    .footer__brand {
      font-size: 0.65rem;
      color: var(--text-muted);
      margin-top: 8px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* ===== PR Tracker ===== */
    .pr-tracker {
      margin-bottom: 32px;
    }

    .pr-tracker__lift {
      background: var(--bg-card);
      border-radius: var(--radius-md);
      padding: 16px;
      margin-bottom: 10px;
      box-shadow: var(--shadow-card);
    }

    .pr-tracker__lift-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .pr-tracker__lift-name {
      font-family: var(--font-display);
      font-size: 0.95rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .pr-tracker__lift-best {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--color-gold);
    }

    .pr-tracker__input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    .pr-tracker__input {
      flex: 1;
      background: var(--bg-surface);
      border: 1px solid var(--text-muted);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 0.9rem;
      padding: 8px 10px;
      outline: none;
      transition: border-color 0.2s;
    }

    .pr-tracker__input:focus {
      border-color: var(--color-gold);
    }

    .pr-tracker__input--date {
      max-width: 140px;
      color-scheme: dark;
    }

    .pr-tracker__add-btn {
      background: var(--color-gold);
      color: var(--bg-primary);
      font-family: var(--font-body);
      font-size: 0.8rem;
      font-weight: 700;
      padding: 8px 14px;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      white-space: nowrap;
      transition: transform 0.15s;
    }

    .pr-tracker__add-btn:active {
      transform: scale(0.95);
    }

    .pr-tracker__history {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }

    .pr-tracker__history--open {
      max-height: 500px;
    }

    .pr-tracker__history-toggle {
      font-size: 0.75rem;
      color: var(--text-secondary);
      cursor: pointer;
      background: none;
      border: none;
      font-family: var(--font-body);
      padding: 4px 0;
      margin-bottom: 6px;
    }

    .pr-tracker__history-toggle:hover {
      color: var(--text-primary);
    }

    .pr-tracker__entry {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 0.8rem;
    }

    .pr-tracker__entry-value {
      font-weight: 700;
      color: var(--text-primary);
    }

    .pr-tracker__entry-date {
      color: var(--text-muted);
    }

    .pr-tracker__entry-badge {
      font-size: 0.65rem;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 8px;
      background: var(--color-gold);
      color: var(--bg-primary);
    }

    .pr-tracker__entry-delete {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.75rem;
      padding: 2px 4px;
      transition: color 0.15s;
    }

    .pr-tracker__entry-delete:hover {
      color: var(--color-red);
    }

    .pr-tracker__chart {
      height: 60px;
      display: flex;
      align-items: flex-end;
      gap: 3px;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    .pr-tracker__chart-bar {
      flex: 1;
      background: var(--color-purple);
      border-radius: 2px 2px 0 0;
      min-height: 4px;
      transition: height 0.3s;
      position: relative;
    }

    .pr-tracker__chart-bar--best {
      background: var(--color-gold);
    }

    /* ===== PR Leaderboard ===== */
    .pr-leaderboard {
      margin-bottom: 32px;
    }

    .pr-leaderboard__tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .pr-leaderboard__tab {
      background: var(--bg-card);
      border: 1px solid var(--text-muted);
      border-radius: 20px;
      color: var(--text-secondary);
      font-family: var(--font-body);
      font-size: 0.75rem;
      font-weight: 700;
      padding: 6px 14px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .pr-leaderboard__tab--active {
      background: var(--color-gold);
      color: var(--bg-primary);
      border-color: var(--color-gold);
    }

    .pr-leaderboard__table {
      width: 100%;
      background: var(--bg-card);
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: var(--shadow-card);
    }

    .pr-leaderboard__row {
      display: flex;
      align-items: center;
      padding: 12px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      gap: 10px;
    }

    .pr-leaderboard__row:last-child {
      border-bottom: none;
    }

    .pr-leaderboard__row--you {
      background: var(--bg-card-hover);
      box-shadow: inset 3px 0 0 var(--color-orange);
    }

    .pr-leaderboard__row--1st {
      box-shadow: inset 3px 0 0 var(--color-gold);
    }

    .pr-leaderboard__rank {
      font-size: 1rem;
      font-weight: 900;
      width: 28px;
      text-align: center;
    }

    .pr-leaderboard__name {
      flex: 1;
      font-weight: 600;
      font-size: 0.85rem;
    }

    .pr-leaderboard__value {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--color-gold);
    }

    .pr-leaderboard__delta {

    const distribution = [

      'motivation', 'motivation',
      'callout',
      'challenge',
      'recovery'
    ];

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function pickFromCategory(category) {
      const arr = categoryArrays[category];
      const seen = seenIndices[category];

      // Reset if all seen
      if (seen.size >= arr.length) seen.clear();

      const available = [];
      for (let i = 0; i < arr.length; i++) {
        if (!seen.has(i)) available.push(i);
      }

      const idx = available[Math.floor(Math.random() * available.length)];
      seen.add(idx);
      return arr[idx];
    }

    function getTimeOfDayBias() {
      const hour = new Date().getHours();
      if (hour >= 5 && hour < 12) return 'workout';
      if (hour >= 12 && hour < 17) return 'nutrition';
      if (hour >= 17 && hour < 22) return 'motivation';
      return 'recovery';
    }

    function generateRecommendations() {

      const dist = [...distribution];
      const bias = getTimeOfDayBias();
      // Replace the last slot with the bias category for a subtle nudge
      dist[dist.length - 1] = bias;

      const shuffledDist = shuffle(dist);
      return shuffledDist.map(cat => pickFromCategory(cat));
    }

      return dailyChallenges[idx];

      for (let i = ranks.length - 1; i >= 0; i--) {
        if (xp >= ranks[i].threshold) return ranks[i];
      }
      return ranks[0];
    }

    function getNextRank(xp) {
      for (let i = 0; i < ranks.length; i++) {
        if (xp < ranks[i].threshold) return ranks[i];
      }
      return null; // maxed out

    function getYesterdayString() {
      const d = new Date();
      d.setDate(d.getDate() - 1);

      const today = getTodayString();

        return;

        // Consecutive day
        appState.streak += 1;

      bench:    [{ name: 'Jake', value: 275 }, { name: 'Marcus', value: 315 }, { name: 'Dev', value: 225 }, { name: 'Tyler', value: 255 }, { name: 'Chris', value: 195 }, { name: 'Aiden', value: 185 }],
      squat:    [{ name: 'Jake', value: 365 }, { name: 'Marcus', value: 405 }, { name: 'Dev', value: 315 }, { name: 'Tyler', value: 345 }, { name: 'Chris', value: 275 }, { name: 'Aiden', value: 245 }],

    function loadPRHistory(liftKey) {
      const raw = localStorage.getItem('brofit_pr_' + liftKey);
      return raw ? JSON.parse(raw) : [];
    }

    function savePRHistory(liftKey, history) {
      localStorage.setItem('brofit_pr_' + liftKey, JSON.stringify(history));
    }

    function formatTime(totalSeconds) {
      const mins = Math.floor(totalSeconds / 60);
      const secs = totalSeconds % 60;
      return mins + ':' + String(secs).padStart(2, '0');
    }

    function parseTimeInput(str) {
      // Accept "M:SS" or just seconds
      str = str.trim();
      if (str.indexOf(':') !== -1) {
        var parts = str.split(':');
        return parseInt(parts[0], 10) * 60 + parseInt(parts[1], 10);
      }
      return parseInt(str, 10);
    }

    function formatPRValue(value, unit) {
      if (unit === 'time') return formatTime(value);
      return value + ' lbs';
    }

    function getBestPR(history, unit) {
      if (history.length === 0) return null;
      if (unit === 'time') {
        return history.reduce(function(best, e) { return e.value < best.value ? e : best; });
      }
      return history.reduce(function(best, e) { return e.value > best.value ? e : best; });
    }

    function renderPRTracker() {
      var container = document.getElementById('pr-tracker');
      container.innerHTML = '';

      liftDefs.forEach(function(lift) {
        var history = loadPRHistory(lift.key);
        var best = getBestPR(history, lift.unit);
        var today = getTodayString();

        var liftEl = document.createElement('div');
        liftEl.className = 'pr-tracker__lift';

        // Header
        var bestDisplay = best ? formatPRValue(best.value, lift.unit) : '—';
        var headerHTML =
          '<div class="pr-tracker__lift-header">' +
            '<div class="pr-tracker__lift-name"><span>' + lift.icon + '</span> ' + lift.name + '</div>' +
            '<div class="pr-tracker__lift-best">PR: ' + bestDisplay + '</div>' +
          '</div>';

        // Input row
        var placeholder = lift.unit === 'time' ? 'M:SS (e.g. 6:30)' : 'Weight (lbs)';
        var inputHTML =
          '<div class="pr-tracker__input-row">' +
            '<input class="pr-tracker__input" type="text" placeholder="' + placeholder + '" data-lift="' + lift.key + '" data-unit="' + lift.unit + '">' +
            '<input class="pr-tracker__input pr-tracker__input--date" type="date" value="' + today + '" data-lift-date="' + lift.key + '">' +
            '<button class="pr-tracker__add-btn" onclick="addPR(\'' + lift.key + '\')">Log</button>' +
          '</div>';

        // Mini chart (last 10 entries)
        var chartHTML = '';
        if (history.length > 1) {
          var recent = history.slice(-10);
          var values = recent.map(function(e) { return e.value; });
          var maxVal = Math.max.apply(null, values);
          var minVal = Math.min.apply(null, values);
          var range = maxVal - minVal || 1;
          var bestVal = best ? best.value : null;

          chartHTML = '<div class="pr-tracker__chart">';
          recent.forEach(function(e) {
            var pct;
            if (lift.unit === 'time') {
              pct = ((maxVal - e.value) / range) * 80 + 20;
            } else {
              pct = ((e.value - minVal) / range) * 80 + 20;
            }
            var isBest = e.value === bestVal;
            chartHTML += '<div class="pr-tracker__chart-bar' + (isBest ? ' pr-tracker__chart-bar--best' : '') + '" style="height:' + pct + '%" title="' + formatPRValue(e.value, lift.unit) + ' — ' + e.date + '"></div>';
          });
          chartHTML += '</div>';
        }

        // History entries
        var historyHTML = '';
        if (history.length > 0) {
          var sorted = history.slice().reverse();
          historyHTML =
            '<button class="pr-tracker__history-toggle" onclick="togglePRHistory(this)">Show history (' + history.length + ')</button>' +
            '<div class="pr-tracker__history">';
          sorted.forEach(function(e, i) {
            var isBest = best && e.value === best.value && e.date === best.date;
            var realIdx = history.length - 1 - i;
            historyHTML +=
              '<div class="pr-tracker__entry">' +
                '<span class="pr-tracker__entry-value">' + formatPRValue(e.value, lift.unit) + '</span>' +
                (isBest ? ' <span class="pr-tracker__entry-badge">PR</span>' : '') +
                '<span class="pr-tracker__entry-date">' + e.date + '</span>' +
                '<button class="pr-tracker__entry-delete" onclick="deletePR(\'' + lift.key + '\',' + realIdx + ')" title="Delete">x</button>' +
              '</div>';
          });
          historyHTML += '</div>';
        }

        liftEl.innerHTML = headerHTML + inputHTML + chartHTML + historyHTML;
        container.appendChild(liftEl);
      });
    }

    function addPR(liftKey) {
      var lift = liftDefs.find(function(l) { return l.key === liftKey; });
      var input = document.querySelector('[data-lift="' + liftKey + '"]');
      var dateInput = document.querySelector('[data-lift-date="' + liftKey + '"]');
      var raw = input.value.trim();
      if (!raw) return;

      var value;
      if (lift.unit === 'time') {
        value = parseTimeInput(raw);
      } else {
        value = parseInt(raw, 10);
      }
      if (isNaN(value) || value <= 0) return;

      var history = loadPRHistory(liftKey);
      var prevBest = getBestPR(history, lift.unit);

      history.push({ value: value, date: dateInput.value });
      savePRHistory(liftKey, history);

      // Check if new PR
      var newBest = getBestPR(history, lift.unit);
      if (!prevBest || (lift.unit === 'time' ? newBest.value < prevBest.value : newBest.value > prevBest.value)) {
        addXP(25);
      }

      input.value = '';
      renderPRTracker();
      renderPRLeaderboard(activePRTab);
    }

    function deletePR(liftKey, idx) {
      var history = loadPRHistory(liftKey);
      history.splice(idx, 1);
      savePRHistory(liftKey, history);
      renderPRTracker();
      renderPRLeaderboard(activePRTab);
    }

    function renderPRLeaderboard(liftKey) {
      var lift = liftDefs.find(function(l) { return l.key === liftKey; });

    // ===== Macrocycle Program =====
    // 16-week periodized program: Fat Loss → Shoulder Hypertrophy → Explosive Power → Peak/Game Ready

    const macrocycleStartKey = 'brofit_macro_start';

    function getMacroStartDate() {
      let stored = localStorage.getItem(macrocycleStartKey);
      if (!stored) {
        // Start on the most recent Monday
        const now = new Date();
        const day = now.getDay();
        const diff = (day === 0 ? 6 : day - 1);
        const monday = new Date(now);
        monday.setDate(now.getDate() - diff);
        monday.setHours(0, 0, 0, 0);
        stored = monday.toISOString().split('T')[0];
        localStorage.setItem(macrocycleStartKey, stored);
      }
      return new Date(stored + 'T00:00:00');
    }

    function getCurrentWeek() {
      const start = getMacroStartDate();
      const now = new Date();
      const diffMs = now - start;
      const week = Math.floor(diffMs / (7 * 24 * 60 * 60 * 1000)) + 1;
      return Math.max(1, Math.min(week, 16));

    function renderMacrocycle() {

      const progressEl = document.getElementById('macro-progress');
      progressEl.innerHTML = '';

        seg.className = 'macrocycle__progress-seg';

      const hours = Math.floor(diff / 3600000);
      const mins = Math.floor((diff % 3600000) / 60000);
      document.getElementById('challenge-timer').textContent = hours + 'h ' + mins + 'm left today';

      board.forEach(function(entry, i) {
        const li = document.createElement('li');
        li.className = 'leaderboard__item' + (entry.isUser ? ' leaderboard__item--you' : '');

        const posEmoji = i === 0 ? '👑' : (i === 1 ? '🥈' : (i === 2 ? '🥉' : ''));
        const rank = getRank(entry.xp);

        li.innerHTML =
          '<span class="leaderboard__pos">' + (posEmoji || (i + 1)) + '</span>' +
          '<span class="leaderboard__name">' + entry.name + (entry.isUser ? ' (you)' : '') + '</span>' +
          '<span class="leaderboard__rank-badge">' + rank.name + '</span>' +
          '<span class="leaderboard__xp">' + entry.xp + ' XP</span>';

        list.appendChild(li);
      });
    }

    // ===== Rotating Footer Taglines =====

    const taglines = [
      "No excuses. No days off. No mercy.",
      "Iron sharpens iron.",
      "Your only competition is yesterday's you.",
      "Suffer the pain of discipline or the pain of regret.",
      "The crew that lifts together, grows together.",
      "Nobody said it would be easy. They said it would be worth it.",
      "Be the hardest worker in the room.",
      "Shut up and squat.",
      "Excuses don't burn calories.",
      "Sore today. Strong tomorrow."
    ];

    let taglineIndex = 0;

    function rotateTagline() {
      taglineIndex = (taglineIndex + 1) % taglines.length;
      const el = document.getElementById('footer-tagline');
      el.style.opacity = '0';
      setTimeout(function() {
        el.textContent = taglines[taglineIndex];
        el.style.opacity = '1';
      }, 300);
    }

    // ===== Daily Challenge Button =====

    function handleChallengeComplete() {
      const btn = document.getElementById('challenge-btn');
      btn.textContent = 'Crushed It! 💚';
      btn.classList.add('featured-challenge__btn--done');

      // Confetti ring
      const container = document.getElementById('featured-challenge');
      const ring = document.createElement('div');
      ring.className = 'confetti-ring';
      container.appendChild(ring);
      setTimeout(function() { ring.remove(); }, 700);

      appState.dailyChallengeCompleted = getTodayString();
      saveState(appState);
      addXP(50);
    }

    // ===== Init =====

    document.addEventListener('DOMContentLoaded', function() {
      // Load state and update streak
      appState = loadState();
      updateStreak();
      saveState(appState);

      // Greeting
      document.getElementById('greeting-time').textContent = getTimeGreeting();

      // Refresh all UI from state
      refreshUI();

      // Render recommendations
      renderCards(generateRecommendations());

      // Render daily challenge
      renderDailyChallenge(getDailyChallenge());

      // Render PR tracker & leaderboard
      renderPRTracker();
      renderPRLeaderboardTabs();
      renderPRLeaderboard(activePRTab);

      // Render macrocycle
      renderMacrocycle();

      // Update challenge timer every minute
      setInterval(updateChallengeTimer, 60000);

      // Wire up buttons
      document.getElementById('regenerate-btn').addEventListener('click', handleRegenerate);
      document.getElementById('challenge-btn').addEventListener('click', handleChallengeComplete);

      // Name input saves to state
      document.getElementById('name-input').addEventListener('input', function(e) {
        appState.name = e.target.value.trim();
        saveState(appState);
        refreshUI();
      });

      // Rotating footer taglines
      taglineIndex = Math.floor(Math.random() * taglines.length);
      document.getElementById('footer-tagline').textContent = taglines[taglineIndex];
      setInterval(rotateTagline, 5000);
    });
  </script>
</body>
</html>
